<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lyderių lentelė — Mathematikus 11</title>
  <link rel="stylesheet" href="styles/main.css"/>
  <style>
.lb-container { max-width: 640px; margin: 0 auto; }
.lb-title { font-size: 24px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.lb-subtitle { font-size: 14px; color: var(--ink3); margin-bottom: 24px; }
.lb-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.lb-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.lb-row:hover { background: var(--bg3); }
.lb-row.top3 { background: var(--amber-bg); border-color: var(--amber-lt); }
.lb-row.me { background: var(--green-bg); border: 2px solid var(--green-lt); border-radius: var(--radius); margin-top: 8px; }
.lb-rank { width: 32px; font-size: 15px; font-weight: 600; color: var(--ink3); text-align: center; flex-shrink: 0; }
.lb-row.top3 .lb-rank { color: var(--amber); font-size: 18px; }
.lb-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.lb-name { font-size: 14px; font-weight: 500; color: var(--ink); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-xp { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; }
.lb-streak { font-size: 12px; color: var(--ink3); white-space: nowrap; }
.lb-loading { text-align: center; padding: 40px; color: var(--ink3); font-size: 14px; }
.lb-separator { padding: 8px 16px; text-align: center; font-size: 13px; color: var(--ink3); }
  </style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <a href="index.html">Mathematikus 11</a>
        <span class="sep">›</span>
        <span class="current">Lyderių lentelė</span>
      </div>
    </div>
    <div class="page">
      <div class="lb-container">
        <div class="lb-title">🏆 Lyderių lentelė</div>
        <div class="lb-subtitle">Top 50 pagal XP taškus</div>
        <div id="lb-content">
          <div class="lb-loading">Kraunama...</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
async function loadLeaderboard() {
  var container = document.getElementById('lb-content');
  try {
    var data = await Auth.getLeaderboard();
    var html = '';

    data.top.forEach(function(user, i) {
      var rank = i + 1;
      var isTop3 = rank <= 3;
      var medals = ['🥇','🥈','🥉'];
      var isMe = Auth.isLoggedIn() && Auth.getUser() && Auth.getUser().username === user.username;

      html += '<div class="lb-row' + (isTop3 ? ' top3' : '') + (isMe ? ' me' : '') + '">';
      html += '<div class="lb-rank">' + (isTop3 ? medals[rank-1] : rank) + '</div>';
      html += '<div class="lb-avatar">' + user.username.charAt(0).toUpperCase() + '</div>';
      html += '<div class="lb-name">' + user.username + (isMe ? ' (tu)' : '') + '</div>';
      html += '<div class="lb-streak">' + (user.streak_days > 0 ? '🔥' + user.streak_days + 'd' : '') + '</div>';
      html += '<div class="lb-xp">' + user.xp + ' XP</div>';
      html += '</div>';
    });

    if (data.user) {
      html += '<div class="lb-separator">· · ·</div>';
      html += '<div class="lb-row me">';
      html += '<div class="lb-rank">' + data.user.rank + '</div>';
      html += '<div class="lb-avatar">' + data.user.username.charAt(0).toUpperCase() + '</div>';
      html += '<div class="lb-name">' + data.user.username + ' (tu)</div>';
      html += '<div class="lb-streak">' + (data.user.streak_days > 0 ? '🔥' + data.user.streak_days + 'd' : '') + '</div>';
      html += '<div class="lb-xp">' + data.user.xp + ' XP</div>';
      html += '</div>';
    }

    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = '<div class="lb-loading">Nepavyko užkrauti lyderių lentelės</div>';
  }
}

loadLeaderboard();
</script>
</body>
</html>

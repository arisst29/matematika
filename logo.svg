<line x1="122" y1="105" x2="122" y2="170"/>
<line x1="158" y1="105" x2="158" y2="150"/>
</g>
<circle cx="158" cy="170" r="7" fill="#1D9E75"/>

<text x="248" y="168" font-size="96" font-weight="500" letter-spacing="-2" fill="#111111" font-family="Arial, Helvetica, sans-serif">3</text>
<circle cx="322" cy="150" r="6" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.35"/>
<text x="336" y="168" font-size="96" font-weight="500" letter-spacing="-2" fill="#111111" font-family="Arial, Helvetica, sans-serif">1415</text>
<text x="565" y="168" font-size="60" font-weight="400" fill="#1D9E75" font-family="Arial, Helvetica, sans-serif">.lt</text>

</svg>

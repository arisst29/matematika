<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>31415.lt logotipas</title>
<desc>Juodas kvadratas su balta linijine π raide kairėje, dešinėje užrašas 31415 storu šriftu su tuščiaviduriu tašku tarp 3 ir 1, ir .lt lengvesniu žalios spalvos šriftu</desc>


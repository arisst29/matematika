  <style>.exam-header{margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--border)}.exam-title{font-size:26px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-0.3px}.exam-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}.exam-meta-item{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:5px}.variant-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-left:10px}.variant-A{background:#dbeafe;color:#1d4ed8}.variant-B{background:#dcfce7;color:#15803d}.variant-C{background:#fef3c7;color:#b45309}.variant-D{background:#fce7f3;color:#9d174d}.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);padding:8px 16px;background:var(--bg3);border-radius:var(--radius);margin:20px 0 12px;border-left:3px solid var(--accent)}.progress-bar{height:5px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}.question-svg{margin-bottom:14px;display:flex;justify-content:center;padding:12px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)}.question-text{font-size:15px;color:var(--ink);line-height:1.8;margin-bottom:16px;font-weight:500}.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:0.85em;line-height:1.1}.frac sup{border-bottom:1px solid currentColor;padding:0 2px;font-size:1em}.frac sub{padding:0 2px;font-size:1em}.options{display:flex;flex-direction:column;gap:8px}.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}.option:hover{border-color:var(--accent);background:var(--accent-bg)}.option.selected{border-color:var(--accent);background:var(--accent-bg)}.option.correct{border-color:var(--green);background:var(--green-bg)}.option.wrong{border-color:var(--red);background:var(--red-bg)}.option.show-correct{border-color:var(--green);background:var(--green-bg)}.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}.option.selected .option-letter{background:var(--accent);color:#fff}.option.correct .option-letter{background:var(--green);color:#fff}.option.wrong .option-letter{background:var(--red);color:#fff}.option.show-correct .option-letter{background:var(--green);color:#fff}.option-text{font-size:14px;color:var(--ink2);line-height:1.6}.option.selected .option-text{color:var(--accent)}.option.correct .option-text{color:var(--green)}.option.wrong .option-text{color:var(--red)}.option.show-correct .option-text{color:var(--green)}.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}.submit-btn{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer}.submit-btn:hover{background:#1e40af}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}.answered-count{font-size:13px;color:var(--ink3)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:40px;max-width:520px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}.modal-score{font-size:72px;font-weight:700;line-height:1;margin-bottom:6px}.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}.modal-stats{display:flex;justify-content:center;gap:32px;margin-bottom:24px;padding:18px;background:var(--bg3);border-radius:var(--radius)}.modal-stat-val{font-size:24px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}.modal-btns{display:flex;gap:10px;justify-content:center}.modal-feedback{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:6px}</style>

<script src="../../../js/main.js"></script>
<script>var QUESTIONS=[{text:"Funkcijos f(x) = √(2x − 6) apibrėžimo sritis:",svg:null,options:["[3; +∞)", "(3; +∞)", "[−3; +∞)", "ℝ"],correct:0},{text:"Funkcijos f(x) = lg(x + 4) apibrėžimo sritis:",svg:null,options:["(−4; +∞)", "[−4; +∞)", "(4; +∞)", "ℝ"],correct:0},{text:"Funkcija f(x) = x² − 9. Reikšmių sritis:",svg:null,options:["[−9; +∞)", "ℝ", "[0; +∞)", "[9; +∞)"],correct:0},{text:"Funkcija f(x) = |x| yra:",svg:null,options:["Nelyginė", "Lyginė", "Nei lyginė, nei nelyginė", "Mažėjanti visur"],correct:1},{text:"Funkcija f(x) = x² − 4 nuliai:",svg:null,options:["x = 2", "x = 4", "x = ±2", "x = ±4"],correct:2},{text:"f(x) = 2x + 1, g(x) = x². Raskite g(f(x)).",svg:null,options:["4x² + 4x + 1", "2x² + 1", "4x² + 1", "2x + 1"],correct:0},{text:"Raskite f⁻¹, kai f(x) = 5x + 10.",svg:null,options:["<span class=\"frac\"><sup>x − 10</sup><sub>5</sub></span>", "5x − 10", "<span class=\"frac\"><sup>x</sup><sub>5</sub></span> + 10", "<span class=\"frac\"><sup>x + 10</sup><sub>5</sub></span>"],correct:0},{text:"Kokia transformacija gauna y = −f(x)?",svg:null,options:["Postūmis aukštyn", "Atspindys x ašies atžvilgiu", "Atspindys y ašies atžvilgiu", "Tempimas"],correct:1},{text:"Kokia transformacija gauna y = f(−x)?",svg:null,options:["Atspindys x ašies atžvilgiu", "Postūmis į kairę", "Atspindys y ašies atžvilgiu", "Postūmis į dešinę"],correct:2},{text:"Atpažinkite grafiką. Kokia funkcija vaizduojama?",svg:'<svg viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg" style="width:160px;height:130px"><line x1="8" y1="100" x2="154" y2="100" stroke="#aaa" stroke-width="1"/><line x1="80" y1="8" x2="80" y2="122" stroke="#aaa" stroke-width="1"/><path d="M15,100 Q80,10 145,100" fill="none" stroke="#1d4ed8" stroke-width="2.2" stroke-linecap="round"/></svg>',options:["f(x) = k/x", "f(x) = √x", "f(x) = ax²  a < 0", "f(x) = x³"],correct:2},{text:"Funkcija f(x) = <span class=\"frac\"><sup>k</sup><sub>x</sub></span>. Koks pagrindinis jos bruožas?",svg:null,options:["Apibrėžta visiems x", "Kerta koordinačių ašis", "Neapibrėžta x = 0", "Lyginė"],correct:2},{text:"Kvadratinė funkcija f(x) = x² − 6x + 8. Raskite šaknis.",svg:null,options:["x = 2 ir x = 4", "x = −2 ir x = −4", "x = 1 ir x = 8", "x = 2 ir x = −4"],correct:0},{text:"Funkcijai f(x) = ax² + bx + c. Kada parabolė atsisuka žemyn?",svg:null,options:["a > 0", "a < 0", "b > 0", "c > 0"],correct:1},{text:"Atpažinkite grafiką.",svg:'<svg viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg" style="width:160px;height:130px"><line x1="8" y1="65" x2="154" y2="65" stroke="#aaa" stroke-width="1"/><line x1="80" y1="8" x2="80" y2="122" stroke="#aaa" stroke-width="1"/><path d="M15,65 Q80,120 145,65" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round"/></svg>',options:["f(x) = ax², a > 0", "f(x) = ax², a < 0", "f(x) = k/x", "f(x) = log₂x"],correct:0},{text:"Atpažinkite grafiką. Kokia funkcija vaizduojama?",svg:'<svg viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg" style="width:160px;height:130px"><line x1="8" y1="100" x2="154" y2="100" stroke="#aaa" stroke-width="1"/><line x1="40" y1="122" x2="40" y2="8" stroke="#aaa" stroke-width="1"/><circle cx="40" cy="78" r="3" fill="#888"/><text x="44" y="77" font-size="7" fill="#888">(0;1)</text><path d="M8,3 Q25,5 40,78 Q55,97 80,99 Q110,100 148,100" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round"/></svg>',options:["f(x) = 3ˣ", "f(x) = <span class=\"frac\"><sup>1</sup><sub>3</sub></span>ˣ", "f(x) = log₃x", "f(x) = x³"],correct:1},{text:"Rodiklinės funkcijos f(x) = aˣ reikšmių sritis:",svg:null,options:["ℝ", "(0; +∞)", "[0; +∞)", "(−∞; 0)"],correct:1},{text:"Kuriame taške f(x) = 5ˣ kerta y ašį?",svg:null,options:["(1; 0)", "(0; 5)", "(0; 1)", "(5; 0)"],correct:2},{text:"Raskite lygties 5ˣ = 125 sprendinį.",svg:null,options:["x = 2", "x = 3", "x = 4", "x = 5"],correct:1},{text:"Raskite lygties 9ˣ − 10·3ˣ + 9 = 0 sprendinius.",svg:null,options:["x = 0 ir x = 2", "x = 1 ir x = 2", "x = 0 ir x = 1", "x = 3 ir x = 0"],correct:0},{text:"Išspręskite nelygybę 3ˣ ≥ 81.",svg:null,options:["x < 4", "x ≥ 4", "x > 3", "x ≤ 4"],correct:1},{text:"Išspręskite nelygybę <span class=\"frac\"><sup>1</sup><sub>2</sub></span>ˣ < <span class=\"frac\"><sup>1</sup><sub>8</sub></span>.",svg:null,options:["x > 3", "x < 3", "x > −3", "x < −3"],correct:0},{text:"Apskaičiuokite log₅125.",svg:null,options:["2", "3", "4", "5"],correct:1},{text:"Suprastinkite: log₄16 + log₄4.",svg:null,options:["4", "3", "5", "6"],correct:1},{text:"Atpažinkite grafiką.",svg:'<svg viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg" style="width:160px;height:130px"><line x1="8" y1="65" x2="154" y2="65" stroke="#aaa" stroke-width="1"/><line x1="30" y1="122" x2="30" y2="8" stroke="#aaa" stroke-width="1"/><text x="148" y="62" font-size="8" fill="#888">x</text><text x="32" y="10" font-size="8" fill="#888">y</text><circle cx="70" cy="65" r="3" fill="#888"/><text x="72" y="77" font-size="7" fill="#888">(1;0)</text><path d="M32,5 Q45,25 70,65 Q95,100 120,115 Q138,123 150,125" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round"/></svg>',options:["f(x) = 3ˣ", "f(x) = log₃x", "f(x) = log<span class=\"frac\"><sup>1</sup><sub>3</sub></span>x", "f(x) = √x"],correct:2},{text:"Raskite lygties log₄x = 3 sprendinį.",svg:null,options:["x = 12", "x = 64", "x = 16", "x = 32"],correct:1},{text:"Raskite lygties lg(x − 3) = lg(2x − 8) sprendinį.",svg:null,options:["x = 5", "x = 11", "x = 8", "Sprendinių nėra"],correct:0},{text:"Išspręskite nelygybę log₃(x + 1) > 2.",svg:null,options:["x > 8", "x > 7", "x < 8", "x > 9"],correct:0},{text:"Išspręskite nelygybę log<span class=\"frac\"><sup>1</sup><sub>4</sub></span>x ≤ −2.",svg:null,options:["x ≤ 16", "x ≥ 16", "x ≤ −16", "x ≥ 8"],correct:1},{text:"Logaritminės funkcijos f(x) = logₐx apibrėžimo sritis:",svg:null,options:["ℝ", "(0; +∞)", "[0; +∞)", "(1; +∞)"],correct:1},{text:"Kokiame taške log. funkcija kerta x ašį?",svg:null,options:["(0; 0)", "(1; 0)", "(0; 1)", "(a; 0)"],correct:1}];
var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;
function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Uždavinys ' + (qi+1) + ' iš ' + QUESTIONS.length + '</div>';
    if (q.svg) html += '<div class="question-svg">' + q.svg + '</div>';
    html += '<div class="question-text">' + q.text + '</div><div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}
function sel(qi, oi) {
  if (submitted) return; answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if(e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a = answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width = (a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent = 'Atsakyta: '+a+' / '+QUESTIONS.length;
}
function submitTest() {
  var a = answers.filter(function(x){return x!==null;}).length;
  if (a < QUESTIONS.length && !confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?')) return;
  submitted = true; document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var s = answers[qi]; if (s===q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-'+qi+'-'+oi); el.classList.remove('selected');
      if (oi===q.correct) el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if (oi===s&&s!==q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent = pct+'%';
  document.getElementById('modal-score').className = 'modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent = correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
renderQuestions();
</script>
</body>
</html>

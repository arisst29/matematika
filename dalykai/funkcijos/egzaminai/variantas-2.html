var totalPts = 0;
var earnedPts = 0;
var submitted = false;

// Track answers: mcq -> selected index, open -> entered string
var answers = {};

function renderAll() {
  var container = document.getElementById('questions');
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    totalPts += q.pts;
    html += buildCard(q, qi);
  }
  container.innerHTML = html;
  updateProgress();
}

function buildCard(q, qi) {
  var ptsClass = q.pts === 2 ? 'q-pts two' : 'q-pts';
  var h = '<div class="q-card" id="qcard-'+qi+'">';
  h += '<div class="q-header"><span class="q-num">'+q.num+'</span><span class="'+ptsClass+'">'+q.pts+' t.</span></div>';
  if (q.svg) h += '<div class="q-svg">'+q.svg+'</div>';
  h += '<div class="q-text">'+q.text+'</div>';
  if (q.hint) h += '<div class="q-hint">'+q.hint+'</div>';
  if (q.type === 'mcq') {
    h += '<div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      h += '<div class="opt" id="opt-'+qi+'-'+oi+'" onclick="selMcq('+qi+','+oi+')">';
      h += '<div class="opt-letter">'+L[oi]+'</div>';
      h += '<div class="opt-text">'+q.options[oi]+'</div></div>';
    }
    h += '</div>';
  } else {
    h += '<div class="open-answer">';
    h += '<div class="open-input">';
    h += '<input type="text" id="inp-'+qi+'" placeholder="Įrašykite atsakymą" oninput="selOpen('+qi+')" />';
    h += '</div>';
    h += '<div class="answer-feedback" id="fb-'+qi+'"></div>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function selMcq(qi, oi) {
  if (submitted) return;
  answers[qi] = oi;
  var q = QUESTIONS[qi];
  for (var i = 0; i < q.options.length; i++) {
    document.getElementById('opt-'+qi+'-'+i).className = 'opt' + (i===oi?' selected':'');
  }
  updateProgress();
}

function selOpen(qi) {
  if (submitted) return;
  var val = document.getElementById('inp-'+qi).value.trim();
  answers[qi] = val;
  updateProgress();
}

function updateProgress() {
  var answered = Object.keys(answers).filter(function(k){ var v = answers[k]; return v !== null && v !== undefined && v !== ''; }).length;
  var pct = Math.round(answered / QUESTIONS.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = 'Atsakyta: ' + answered + ' / ' + QUESTIONS.length;
}

function submitExam() {
  var answered = Object.keys(answers).filter(function(k){ var v = answers[k]; return v !== null && v !== undefined && v !== ''; }).length;
  if (answered < QUESTIONS.length && !confirm('Dar neatsakyta ' + (QUESTIONS.length - answered) + ' klausimų. Pateikti?')) return;
  submitted = true;
  document.getElementById('submit-btn').disabled = true;
  earnedPts = 0;

  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    if (q.type === 'mcq') {
      var sel = answers[qi];
      for (var oi = 0; oi < q.options.length; oi++) {
        var el = document.getElementById('opt-'+qi+'-'+oi);
        el.className = 'opt';
        if (oi === q.correct) el.className += (sel === q.correct && oi === sel) ? ' correct' : ' show-correct';
        if (oi === sel && sel !== q.correct) el.className += ' wrong';
      }
      if (sel === q.correct) earnedPts += q.pts;
    } else {
      var inp = document.getElementById('inp-'+qi);
      inp.disabled = true;
      var userVal = (answers[qi] || '').toString().trim().replace(',', '.').replace(/\s/g,'');
      var fb = document.getElementById('fb-'+qi);
      fb.className = 'answer-feedback show';
      var pts = checkOpen(userVal, q);
      earnedPts += pts;
      if (pts === q.pts) {
        inp.className = 'correct-in';
        fb.className += ' ok';
        fb.textContent = '✓ Teisingai! (' + pts + '/' + q.pts + ' t.)';
      } else if (pts > 0) {
        inp.className = 'partial-in';
        fb.className += ' partial';
        fb.textContent = '~ Iš dalies teisingai (' + pts + '/' + q.pts + ' t.) — Teisingas: ' + q.answers[0];
      } else {
        inp.className = 'wrong-in';
        fb.className += ' bad';
        fb.textContent = '✗ Neteisingai (0/' + q.pts + ' t.) — Teisingas: ' + q.answers[0];
      }
    }
  }
  showModal();
}

function checkOpen(userVal, q) {
  // Try exact match with all accepted answers
  for (var i = 0; i < q.answers.length; i++) {
    var correct = q.answers[i].toString().trim().replace(',', '.').replace(/\s/g,'');
    if (userVal === correct) return q.pts;
  }
  // Try partial (for 2pt questions with partials)
  if (q.partial) {
    for (var j = 0; j < q.partial.length; j++) {
      var part = q.partial[j].toString().trim().replace(',', '.').replace(/\s/g,'');
      if (userVal === part) return 1;
    }
  }
  return 0;
}

function showModal() {
  var pct = Math.round(earnedPts / totalPts * 100);
  var scoreEl = document.getElementById('modal-pct');
  scoreEl.textContent = earnedPts + '/' + totalPts;
  scoreEl.className = 'modal-pct ' + (pct >= 80 ? 'ex' : pct >= 50 ? 'good' : 'poor');
  document.getElementById('modal-feedback').textContent = pct >= 90 ? 'Puikiai! 🎉' : pct >= 70 ? 'Gerai! 👍' : pct >= 50 ? 'Neblogai' : 'Reikia pasimokyti 📖';
  document.getElementById('modal-sub').textContent = 'Surinkai ' + earnedPts + ' iš ' + totalPts + ' taškų (' + pct + '%)';
  document.getElementById('stat-correct').textContent = earnedPts;
  document.getElementById('stat-wrong').textContent = totalPts - earnedPts;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('modal-bg').className = 'modal-bg open';
}

function closeModal() { document.getElementById('modal-bg').className = 'modal-bg'; }
renderAll();
</script>

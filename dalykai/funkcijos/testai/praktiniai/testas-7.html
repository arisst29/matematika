<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Praktinis testas 7 — Funkcijos</title>
  <link rel="stylesheet" href="../../../../styles/main.css"/>
  <style>
    .test-header { margin-bottom: 28px; }
    .test-header h1 { font-size: 24px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .test-meta { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
    .test-meta-item { font-size: 12px; color: var(--ink3); }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
    .question-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; }
    .question-num { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; }
    .question-svg { margin-bottom: 14px; display: flex; justify-content: center; padding: 12px; background: var(--bg3); border-radius: var(--radius); border: 1px solid var(--border); }
    .question-text { font-size: 15px; color: var(--ink); line-height: 1.65; margin-bottom: 16px; font-weight: 500; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.12s; background: var(--bg); user-select: none; }
    .option:hover { border-color: var(--accent); background: var(--accent-bg); }
    .option.selected { border-color: var(--accent); background: var(--accent-bg); }
    .option.correct { border-color: var(--green); background: var(--green-bg); }
    .option.wrong { border-color: var(--red); background: var(--red-bg); }
    .option.show-correct { border-color: var(--green); background: var(--green-bg); }
    .option-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--ink2); flex-shrink: 0; }
    .option.selected .option-letter { background: var(--accent); color: #fff; }
    .option.correct .option-letter { background: var(--green); color: #fff; }
    .option.wrong .option-letter { background: var(--red); color: #fff; }
    .option.show-correct .option-letter { background: var(--green); color: #fff; }
    .option-text { font-size: 14px; color: var(--ink2); line-height: 1.5; font-family: var(--mono); }
    .option.selected .option-text { color: var(--accent); }
    .option.correct .option-text { color: var(--green); }
    .option.wrong .option-text { color: var(--red); }
    .option.show-correct .option-text { color: var(--green); }
    .submit-area { margin-top: 28px; display: flex; align-items: center; gap: 14px; padding-top: 20px; border-top: 1px solid var(--border); }
    .submit-btn { padding: 11px 28px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; font-family: var(--sans); cursor: pointer; }
    .submit-btn:hover { background: #166534; }
    .submit-btn:disabled { background: var(--ink3); cursor: not-allowed; }
    .answered-count { font-size: 13px; color: var(--ink3); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border-radius: var(--radius-lg); padding: 36px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .modal-score { font-size: 64px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .modal-score.excellent { color: var(--green); }
    .modal-score.good { color: var(--accent); }
    .modal-score.poor { color: var(--red); }
    .modal-label { font-size: 14px; color: var(--ink3); margin-bottom: 20px; }
    .modal-stats { display: flex; justify-content: center; gap: 28px; margin-bottom: 24px; padding: 16px; background: var(--bg3); border-radius: var(--radius); }
    .modal-stat-val { font-size: 22px; font-weight: 600; color: var(--ink); }
    .modal-stat-key { font-size: 11px; color: var(--ink3); margin-top: 2px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-feedback { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  </style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <a href="../../../../index.html">Matematika 11</a>
        <span class="sep">›</span><span>Funkcijos</span>
        <span class="sep">›</span><span class="current">Praktinis testas 7</span>
      </div>
      <div class="tab-switcher">
        <a href="../../temos/t4-transformacijos/teorija.html" class="tab-btn" style="text-decoration:none">Teorija</a>
        <button class="tab-btn active">Testai</button>
      </div>
    </div>
    <div class="page">
      <div class="test-header">
        <div class="topic-tag" style="background:var(--green-bg);color:var(--green);border-color:var(--green-lt)">5 skyrius · Praktinis testas 7</div>
        <h1>Funkcijų praktika — 7 testas</h1>
        <div class="test-meta">
          <div class="test-meta-item">📝 10 uždavinių</div>
          <div class="test-meta-item">📚 T4 · T5 · T6</div>
          <div class="test-meta-item">✅ Atsakymas matomas po pateikimo</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="questions"></div>
      <div class="submit-area">
        <button class="submit-btn" id="submit-btn" onclick="submitTest()">Pateikti testą</button>
        <span class="answered-count" id="answered-count">Atsakyta: 0 / 10</span>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-label">Testo rezultatas</div>
    <div class="modal-stats">
      <div><div class="modal-stat-val" id="stat-correct"></div><div class="modal-stat-key">Teisingi</div></div>
      <div><div class="modal-stat-val" id="stat-wrong"></div><div class="modal-stat-key">Neteisingi</div></div>
      <div><div class="modal-stat-val" id="stat-pct"></div><div class="modal-stat-key">Rezultatas</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Peržiūrėti atsakymus</button>
      <a href="testas-8.html" class="btn primary" style="text-decoration:none">Testas 8 →</a>
    </div>
  </div>
</div>
<script src="../../../../js/main.js"></script>
<script>
var SVG_PARABOLA_UP = '<svg viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg" style="width:160px;height:130px"><line x1="8" y1="100" x2="154" y2="100" stroke="#aaa" stroke-width="1"/><line x1="80" y1="8" x2="80" y2="124" stroke="#aaa" stroke-width="1"/><path d="M15,100 Q80,10 145,100" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/></svg>';
var SVG_SQRT = '<svg viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg" style="width:160px;height:130px"><line x1="8" y1="100" x2="154" y2="100" stroke="#aaa" stroke-width="1"/><line x1="30" y1="8" x2="30" y2="124" stroke="#aaa" stroke-width="1"/><path d="M30,100 C48,88 68,72 90,58 C110,46 130,36 150,28" fill="none" stroke="#15803d" stroke-width="2.2" stroke-linecap="round"/></svg>';

var QUESTIONS = [
  {
    "text": "Duota D(f) = [−5; 3], E(f) = [0; 6]. Raskite funkcijos y = f(x) − 4 reikšmių sritį.",
    "options": [
      "[0; 6]",
      "[−4; 2]",
      "[4; 10]",
      "[−6; 0]"
    ],
    "correct": 1
  },
  {
    "text": "Duota D(f) = [−5; 3], E(f) = [0; 6]. Raskite y = f(x + 2) apibrėžimo sritį.",
    "options": [
      "[−3; 5]",
      "[−7; 1]",
      "[−5; 3]",
      "[2; 10]"
    ],
    "correct": 1
  },
  {
    "text": "Atpažinkite grafiką. Kokia funkcija vaizduojama (šakos žemyn)?", svg: SVG_PARABOLA_UP,
    "options": [
      "f(x) = k/x",
      "f(x) = x³",
      "f(x) = ax² + bx + c, a < 0",
      "f(x) = √x"
    ],
    "correct": 2
  },
  {
    "text": "Raskite funkcijos f(x) = x⁴ − 81 nulius.",
    "options": [
      "x = 3",
      "x = ±3",
      "x = ±9",
      "x = 81"
    ],
    "correct": 1
  },
  {
    "text": "Funkcija f(x) = −x⁴ + 16. Ar ji lyginė ar nelyginė?",
    "options": [
      "Nelyginė",
      "Nei lyginė nei nelyginė",
      "Lyginė, nes f(−x) = f(x)",
      "Lyginė, nes laipsniai lyginiai"
    ],
    "correct": 2
  },
  {
    "text": "Raskite funkcijos f(x) = 8/x reikšmių sritį.",
    "options": [
      "ℝ",
      "[0; +∞)",
      "(−∞; 0) ∪ (0; +∞)",
      "(0; +∞)"
    ],
    "correct": 2
  },
  {
    "text": "Raskite funkcijos f(x) = √(2x − 10) apibrėžimo sritį.",
    "options": [
      "[5; +∞)",
      "(5; +∞)",
      "[10; +∞)",
      "[−5; +∞)"
    ],
    "correct": 0
  },
  {
    "text": "Atpažinkite grafiką. Kokia funkcija vaizduojama?", svg: SVG_SQRT,
    "options": [
      "f(x) = k/x",
      "f(x) = ax²",
      "f(x) = x³",
      "f(x) = √x"
    ],
    "correct": 3
  },
  {
    "text": "Raskite funkcijos f(x) = 2x² − 4x + 7 viršūnės koordinates.",
    "options": [
      "V(1; 5)",
      "V(−1; 13)",
      "V(1; −5)",
      "V(2; 7)"
    ],
    "correct": 0
  },
  {
    "text": "Raskite funkcijos f(x) = 3/(x − 4) apibrėžimo sritį.",
    "options": [
      "(−∞; 4) ∪ (4; +∞)",
      "ℝ",
      "(0; +∞)",
      "[4; +∞)"
    ],
    "correct": 0
  }
];

var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;

function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card" id="qcard-' + qi + '">';
    html += '<div class="question-num">Uždavinys ' + (qi + 1) + ' iš ' + QUESTIONS.length + '</div>';
    if (q.svg) { html += '<div class="question-svg">' + q.svg + '</div>'; }
    html += '<div class="question-text">' + q.text + '</div>';
    html += '<div class="options">';
    var letters = ['A', 'B', 'C', 'D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-' + qi + '-' + oi + '" onclick="selectOption(' + qi + ',' + oi + ')">';
      html += '<div class="option-letter">' + letters[oi] + '</div>';
      html += '<div class="option-text">' + q.options[oi] + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}

function selectOption(qi, oi) {
  if (submitted) return;
  answers[qi] = oi;
  for (var i = 0; i < QUESTIONS[qi].options.length; i++) {
    document.getElementById('opt-' + qi + '-' + i).classList.remove('selected');
  }
  document.getElementById('opt-' + qi + '-' + oi).classList.add('selected');
  var answered = answers.filter(function(a) { return a !== null; }).length;
  document.getElementById('progress').style.width = (answered / QUESTIONS.length * 100) + '%';
  document.getElementById('answered-count').textContent = 'Atsakyta: ' + answered + ' / ' + QUESTIONS.length;
}

function submitTest() {
  var answered = answers.filter(function(a) { return a !== null; }).length;
  if (answered < QUESTIONS.length) {
    if (!confirm('Dar neatsakyta ' + (QUESTIONS.length - answered) + ' klausimai. Pateikti?')) return;
  }
  submitted = true;
  document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    var sel = answers[qi];
    if (sel === q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-' + qi + '-' + oi);
      el.classList.remove('selected');
      if (oi === q.correct) { el.classList.add(sel === q.correct && oi === sel ? 'correct' : 'show-correct'); }
      if (oi === sel && sel !== q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct / QUESTIONS.length * 100);
  document.getElementById('modal-score').textContent = pct + '%';
  document.getElementById('modal-score').className = 'modal-score ' + (pct >= 80 ? 'excellent' : pct >= 50 ? 'good' : 'poor');
  document.getElementById('modal-feedback').textContent = pct >= 90 ? 'Puikiai! 🎉' : pct >= 70 ? 'Gerai! 👍' : pct >= 50 ? 'Neblogai, dar pasikartok' : 'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length - correct;
  document.getElementById('stat-pct').textContent = correct + '/' + QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
renderQuestions();
</script>
</body>
</html>

  <style>.test-header{margin-bottom:28px}.test-header h1{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:6px}.test-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}.test-meta-item{font-size:12px;color:var(--ink3)}.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}.question-svg{margin-bottom:14px;display:flex;justify-content:center;padding:12px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)}.question-text{font-size:15px;color:var(--ink);line-height:1.65;margin-bottom:16px;font-weight:500}.options{display:flex;flex-direction:column;gap:8px}.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}.option:hover{border-color:var(--accent);background:var(--accent-bg)}.option.selected{border-color:var(--accent);background:var(--accent-bg)}.option.correct{border-color:var(--green);background:var(--green-bg)}.option.wrong{border-color:var(--red);background:var(--red-bg)}.option.show-correct{border-color:var(--green);background:var(--green-bg)}.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}.option.selected .option-letter{background:var(--accent);color:#fff}.option.correct .option-letter{background:var(--green);color:#fff}.option.wrong .option-letter{background:var(--red);color:#fff}.option.show-correct .option-letter{background:var(--green);color:#fff}.option-text{font-size:14px;color:var(--ink2);line-height:1.5;font-family:var(--mono)}.option.selected .option-text{color:var(--accent)}.option.correct .option-text{color:var(--green)}.option.wrong .option-text{color:var(--red)}.option.show-correct .option-text{color:var(--green)}.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}.submit-btn{padding:11px 28px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}.submit-btn:hover{background:#166534}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}.answered-count{font-size:13px;color:var(--ink3)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}.modal-btns{display:flex;gap:10px;justify-content:center}.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}</style>
</head>

        <h1>Funkcijų praktika — 14 testas</h1>

<script src="../../../../js/main.js"></script>
<script>
var SVG_EXP_GROW = "<svg viewBox=\"0 0 160 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:160px;height:130px\"><line x1=\"8\" y1=\"100\" x2=\"154\" y2=\"100\" stroke=\"#aaa\" stroke-width=\"1\"/><line x1=\"40\" y1=\"122\" x2=\"40\" y2=\"8\" stroke=\"#aaa\" stroke-width=\"1\"/><circle cx=\"40\" cy=\"78\" r=\"3\" fill=\"#888\"/><text x=\"44\" y=\"77\" font-size=\"7\" fill=\"#888\">(0;1)</text><path d=\"M8,98 Q25,97 40,78 Q70,35 100,12 Q125,5 148,3\" fill=\"none\" stroke=\"#1d4ed8\" stroke-width=\"2.2\" stroke-linecap=\"round\"/></svg>";
var SVG_EXP_DECAY = "<svg viewBox=\"0 0 160 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:160px;height:130px\"><line x1=\"8\" y1=\"100\" x2=\"154\" y2=\"100\" stroke=\"#aaa\" stroke-width=\"1\"/><line x1=\"40\" y1=\"122\" x2=\"40\" y2=\"8\" stroke=\"#aaa\" stroke-width=\"1\"/><circle cx=\"40\" cy=\"78\" r=\"3\" fill=\"#888\"/><text x=\"44\" y=\"77\" font-size=\"7\" fill=\"#888\">(0;1)</text><path d=\"M8,3 Q25,5 40,78 Q55,97 80,99 Q110,100 148,100\" fill=\"none\" stroke=\"#dc2626\" stroke-width=\"2.2\" stroke-linecap=\"round\"/></svg>";

var QUESTIONS=[{text:"Raskite lygties 5^(x+1) = 125 sprendinį.",svg:null,options:["x = 3", "x = 2, nes 5³ = 125, x+1 = 3", "x = 4", "x = 1"],correct:1},{text:"Raskite lygties 4ˣ − 5·2ˣ + 4 = 0 sprendinius. Naudokite keitinį t = 2ˣ.",svg:null,options:["x = 0 ir x = 2", "x = 1 ir x = 3", "x = 0 ir x = 1", "x = −1 ir x = 2"],correct:0},{text:"Atpažinkite grafiką. Kokia funkcija vaizduojama?",svg:"<svg viewBox=\"0 0 160 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:160px;height:130px\"><line x1=\"8\" y1=\"100\" x2=\"154\" y2=\"100\" stroke=\"#aaa\" stroke-width=\"1\"/><line x1=\"40\" y1=\"122\" x2=\"40\" y2=\"8\" stroke=\"#aaa\" stroke-width=\"1\"/><circle cx=\"40\" cy=\"78\" r=\"3\" fill=\"#888\"/><text x=\"44\" y=\"77\" font-size=\"7\" fill=\"#888\">(0;1)</text><path d=\"M8,98 Q25,97 40,78 Q70,35 100,12 Q125,5 148,3\" fill=\"none\" stroke=\"#1d4ed8\" stroke-width=\"2.2\" stroke-linecap=\"round\"/></svg>",options:["f(x) = (1/4)ˣ", "f(x) = k/x", "f(x) = x³", "f(x) = 4ˣ, kerta (0;1)"],correct:3},{text:"Išspręskite nelygybę 2ˣ < 8.",svg:null,options:["x < 3, nes 2³ = 8 ir pagrindas 2 > 1", "x > 3", "x < 0", "x < 2"],correct:0},{text:"Išspręskite nelygybę (1/3)ˣ > 1/9.",svg:null,options:["x > 2", "x < 2, nes pagrindas 1/3 < 1", "x > 0", "x < 0"],correct:1},{text:"Atpažinkite grafiką. Kokia funkcija vaizduojama?",svg:"<svg viewBox=\"0 0 160 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:160px;height:130px\"><line x1=\"8\" y1=\"100\" x2=\"154\" y2=\"100\" stroke=\"#aaa\" stroke-width=\"1\"/><line x1=\"40\" y1=\"122\" x2=\"40\" y2=\"8\" stroke=\"#aaa\" stroke-width=\"1\"/><circle cx=\"40\" cy=\"78\" r=\"3\" fill=\"#888\"/><text x=\"44\" y=\"77\" font-size=\"7\" fill=\"#888\">(0;1)</text><path d=\"M8,3 Q25,5 40,78 Q55,97 80,99 Q110,100 148,100\" fill=\"none\" stroke=\"#dc2626\" stroke-width=\"2.2\" stroke-linecap=\"round\"/></svg>",options:["f(x) = 2ˣ", "f(x) = x²", "f(x) = (0,3)ˣ", "f(x) = √x"],correct:2},{text:"Raskite lygties 6ˣ − 3·2ˣ = 0 sprendinį.",svg:null,options:["x = 0", "x = 1, nes 3ˣ = 3", "x = 2", "x = −1"],correct:1},{text:"Nustatykite a reikšmę, jei f(x) = aˣ grafikas eina per tašką B(4; 4).",svg:null,options:["a = 1", "a = ⁴√4 = √2", "a = 2", "a = 4"],correct:1},{text:"Su kuriomis a reikšmėmis nelygybė 0,3^(x+3) ≥ a−2 turi sprendinių?",svg:null,options:["a > 2", "a ≤ 2, nes 0,3^(x+3) > 0", "a < 0", "a = 0"],correct:1},{text:"Raskite lygties e^(2x) − e^(x+1) = 0 sprendinį.",svg:null,options:["x = 0", "x = e", "x = 1, nes 2x = x+1", "x = −1"],correct:2}];
var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;
function renderQuestions() {
  var html='';
  for(var qi=0;qi<QUESTIONS.length;qi++){
    var q=QUESTIONS[qi];
    html+='<div class="question-card"><div class="question-num">Uždavinys '+(qi+1)+' iš '+QUESTIONS.length+'</div>';
    if(q.svg) html+='<div class="question-svg">'+q.svg+'</div>';
    html+='<div class="question-text">'+q.text+'</div><div class="options">';
    var L=['A','B','C','D'];
    for(var oi=0;oi<q.options.length;oi++){
      html+='<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html+='<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html+='</div></div>';
  }
  document.getElementById('questions').innerHTML=html;
}
function sel(qi,oi){
  if(submitted)return;answers[qi]=oi;
  for(var i=0;i<4;i++){var e=document.getElementById('opt-'+qi+'-'+i);if(e)e.classList.remove('selected');}
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a=answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width=(a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent='Atsakyta: '+a+' / '+QUESTIONS.length;
}
function submitTest(){
  var a=answers.filter(function(x){return x!==null;}).length;
  if(a<QUESTIONS.length&&!confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?'))return;
  submitted=true;document.getElementById('submit-btn').disabled=true;
  var correct=0;
  for(var qi=0;qi<QUESTIONS.length;qi++){
    var q=QUESTIONS[qi];var s=answers[qi];if(s===q.correct)correct++;
    for(var oi=0;oi<q.options.length;oi++){
      var el=document.getElementById('opt-'+qi+'-'+oi);el.classList.remove('selected');
      if(oi===q.correct)el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if(oi===s&&s!==q.correct)el.classList.add('wrong');
    }
  }
  var pct=Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent=pct+'%';
  document.getElementById('modal-score').className='modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent=pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent=correct;
  document.getElementById('stat-wrong').textContent=QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent=correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
renderQuestions();
</script>
</body>
</html>

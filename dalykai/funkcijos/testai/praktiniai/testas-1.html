<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Praktinis testas 1 — Funkcijos</title>
  <link rel="stylesheet" href="../../../../styles/main.css"/>
  <style>
    .test-header { margin-bottom: 28px; }
    .test-header h1 { font-size: 24px; font-weight: 600; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.3px; }
    .test-meta { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
    .test-meta-item { font-size: 12px; color: var(--ink3); }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
    .question-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; }
    .question-num { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; }
    .question-text { font-size: 15px; color: var(--ink); line-height: 1.65; margin-bottom: 16px; font-weight: 500; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.12s; background: var(--bg); user-select: none; }
    .option:hover { border-color: var(--accent); background: var(--accent-bg); }
    .option.selected { border-color: var(--accent); background: var(--accent-bg); }
    .option.correct { border-color: var(--green); background: var(--green-bg); }
    .option.wrong { border-color: var(--red); background: var(--red-bg); }
    .option.show-correct { border-color: var(--green); background: var(--green-bg); }
    .option-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--ink2); flex-shrink: 0; transition: all 0.12s; }
    .option.selected .option-letter { background: var(--accent); color: #fff; }
    .option.correct .option-letter { background: var(--green); color: #fff; }
    .option.wrong .option-letter { background: var(--red); color: #fff; }
    .option.show-correct .option-letter { background: var(--green); color: #fff; }
    .option-text { font-size: 14px; color: var(--ink2); line-height: 1.5; font-family: var(--mono); }
    .option.selected .option-text { color: var(--accent); }
    .option.correct .option-text { color: var(--green); }
    .option.wrong .option-text { color: var(--red); }
    .option.show-correct .option-text { color: var(--green); }
    .submit-area { margin-top: 28px; display: flex; align-items: center; gap: 14px; padding-top: 20px; border-top: 1px solid var(--border); }
    .submit-btn { padding: 11px 28px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: background 0.12s; }
    .submit-btn:hover { background: #166534; }
    .submit-btn:disabled { background: var(--ink3); cursor: not-allowed; }
    .answered-count { font-size: 13px; color: var(--ink3); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border-radius: var(--radius-lg); padding: 36px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .modal-score { font-size: 64px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .modal-score.excellent { color: var(--green); }
    .modal-score.good { color: var(--accent); }
    .modal-score.poor { color: var(--red); }
    .modal-label { font-size: 14px; color: var(--ink3); margin-bottom: 20px; }
    .modal-stats { display: flex; justify-content: center; gap: 28px; margin-bottom: 24px; padding: 16px; background: var(--bg3); border-radius: var(--radius); }
    .modal-stat-val { font-size: 22px; font-weight: 600; color: var(--ink); }
    .modal-stat-key { font-size: 11px; color: var(--ink3); margin-top: 2px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-feedback { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  </style>
</head>
<body>
<div class="layout">

  <nav class="sidebar" id="sidebar"></nav>

  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <a href="../../../../index.html">Matematika 11</a>
        <span class="sep">›</span>
        <span>Funkcijos</span>
        <span class="sep">›</span>
        <span class="current">Praktinis testas 1</span>
      </div>
      <div class="tab-switcher">
        <a href="../../temos/t1-apibreztis/teorija.html" class="tab-btn" style="text-decoration:none">Teorija</a>
        <button class="tab-btn active">Testai</button>
      </div>
    </div>

    <div class="page">
      <div class="test-header">
        <div class="topic-tag" style="background:var(--green-bg);color:var(--green);border-color:var(--green-lt)">5 skyrius · Praktinis testas 1</div>
        <h1>Funkcijų praktika — 1 testas</h1>
        <div class="test-meta">
          <div class="test-meta-item">📝 10 uždavinių</div>
          <div class="test-meta-item">📚 T1 + T2 + T3 praktika</div>
          <div class="test-meta-item">✅ Atsakymas matomas po pateikimo</div>
        </div>
      </div>

      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="questions"></div>
      <div class="submit-area">
        <button class="submit-btn" id="submit-btn" onclick="submitTest()">Pateikti testą</button>
        <span class="answered-count" id="answered-count">Atsakyta: 0 / 10</span>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-label">Testo rezultatas</div>
    <div class="modal-stats">
      <div><div class="modal-stat-val" id="stat-correct"></div><div class="modal-stat-key">Teisingi</div></div>
      <div><div class="modal-stat-val" id="stat-wrong"></div><div class="modal-stat-key">Neteisingi</div></div>
      <div><div class="modal-stat-val" id="stat-pct"></div><div class="modal-stat-key">Rezultatas</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Peržiūrėti atsakymus</button>
      <a href="testas-2.html" class="btn primary" style="text-decoration:none">Testas 2 →</a>
    </div>
  </div>
</div>

<script src="../../../../js/main.js"></script>
<script>
const QUESTIONS = [
  {
    id: 1,
    text: "Raskite funkcijos f(x) = √(2x − 6) apibrėžimo sritį.",
    options: ["[3; +∞)", "(3; +∞)", "[−3; +∞)", "ℝ"],
    correct: 0
  },
  {
    id: 2,
    text: "Raskite funkcijos f(x) = 1/(x + 4) apibrėžimo sritį.",
    options: ["ℝ", "(−∞; 4) ∪ (4; +∞)", "(−∞; −4) ∪ (−4; +∞)", "[−4; +∞)"],
    correct: 2
  },
  {
    id: 3,
    text: "Funkcijos grafikas yra apibrėžtas nuo x = −3 (užpildytas taškas) iki x = 5 (tuščias taškas). Kokia apibrėžimo sritis?",
    options: ["(−3; 5)", "[−3; 5)", "(−3; 5]", "[−3; 5]"],
    correct: 1
  },
  {
    id: 4,
    text: "Funkcijos f(x) = x² − 9 nuliai yra:",
    options: ["x = 3", "x = −3", "x = 3 ir x = −3", "x = 9 ir x = −9"],
    correct: 2
  },
  {
    id: 5,
    text: "Kuriame intervale f(x) = x² − 4 reikšmės yra neigiamos?",
    options: ["(−∞; −2) ∪ (2; +∞)", "(−2; 2)", "[−2; 2]", "(−∞; 2)"],
    correct: 1
  },
  {
    id: 6,
    text: "Ar funkcija f(x) = x⁴ − 3x² yra lyginė, nelyginė ar nei viena?",
    options: ["Nelyginė, nes f(−x) = −f(x)", "Lyginė, nes f(−x) = f(x)", "Nei lyginė, nei nelyginė", "Lyginė, nes grafikas kerta y ašį"],
    correct: 1
  },
  {
    id: 7,
    text: "Ar funkcija g(x) = x³ − 2x yra lyginė, nelyginė ar nei viena?",
    options: ["Lyginė", "Nelyginė, nes g(−x) = −g(x)", "Nei lyginė, nei nelyginė", "Nelyginė, nes g(0) = 0"],
    correct: 1
  },
  {
    id: 8,
    text: "Duotos f(x) = x² + 1 ir g(x) = 2x − 3. Raskite f(g(x)).",
    options: ["4x² − 12x + 10", "2x² − 1", "4x² + 1", "2x² − 12x + 9"],
    correct: 0
  },
  {
    id: 9,
    text: "Raskite atvirkštinę funkciją f⁻¹, kai f(x) = 3x − 6.",
    options: ["f⁻¹(x) = (x + 6) / 3", "f⁻¹(x) = 3x + 6", "f⁻¹(x) = x/3 − 6", "f⁻¹(x) = (x − 6) / 3"],
    correct: 0
  },
  {
    id: 10,
    text: "Funkcija f(x) = −x² + 9, kai x ∈ [−2; 3]. Raskite didžiausią ir mažiausią reikšmę.",
    options: ["max = 9, min = 0", "max = 9, min = 5", "max = 5, min = 0", "max = 9, min = −9"],
    correct: 0
  }
];

const answers = new Array(QUESTIONS.length).fill(null);
let submitted = false;

function renderQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = QUESTIONS.map((q, qi) => `
    <div class="question-card" id="qcard-${qi}">
      <div class="question-num">Uždavinys ${qi + 1} iš ${QUESTIONS.length}</div>
      ${q.svg ? `<div class="question-svg">${q.svg}</div>` : ''}
    <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map((opt, oi) => `
          <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
            <div class="option-letter">${['A','B','C','D'][oi]}</div>
            <div class="option-text">${opt}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectOption(qi, oi) {
  if (submitted) return;
  answers[qi] = oi;
  QUESTIONS[qi].options.forEach((_, i) => document.getElementById(`opt-${qi}-${i}`).classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  updateProgress();
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('progress').style.width = `${(answered / QUESTIONS.length) * 100}%`;
  document.getElementById('answered-count').textContent = `Atsakyta: ${answered} / ${QUESTIONS.length}`;
}

function submitTest() {
  const answered = answers.filter(a => a !== null).length;
  if (answered < QUESTIONS.length) {
    const missing = QUESTIONS.length - answered;
    if (!confirm(`Dar neatsakyta ${missing} klausim${missing === 1 ? 'as' : 'ai'}. Ar tikrai norite pateikti?`)) return;
  }
  submitted = true;
  document.getElementById('submit-btn').disabled = true;
  let correct = 0;
  QUESTIONS.forEach((q, qi) => {
    const selected = answers[qi];
    if (selected === q.correct) correct++;
    q.options.forEach((_, oi) => {
      const el = document.getElementById(`opt-${qi}-${oi}`);
      el.classList.remove('selected');
      if (oi === q.correct) el.classList.add(selected === q.correct && oi === selected ? 'correct' : 'show-correct');
      if (oi === selected && selected !== q.correct) el.classList.add('wrong');
    });
  });
  showModal(correct);
}

function showModal(correct) {
  const total = QUESTIONS.length;
  const pct = Math.round((correct / total) * 100);
  const scoreEl = document.getElementById('modal-score');
  scoreEl.textContent = `${pct}%`;
  scoreEl.className = 'modal-score ' + (pct >= 80 ? 'excellent' : pct >= 50 ? 'good' : 'poor');
  document.getElementById('modal-feedback').textContent = pct >= 90 ? 'Puikiai! 🎉' : pct >= 70 ? 'Gerai! 👍' : pct >= 50 ? 'Neblogai, dar pasitrenirink' : 'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textCotent = correct;
  document.getElementById('stat-wrong').textContent = total - correct;
  document.getElementById('stat-pct').textContent = `${correct}/${total}`;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
renderQuestions();
</script>
</body>
</html>

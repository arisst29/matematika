<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Praktinis testas 20 — Funkcijos</title>
  <link rel="stylesheet" href="../../../../styles/main.css"/>
  <style>
.test-header{margin-bottom:28px}.test-header h1{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:6px}
.test-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}.test-meta-item{font-size:12px;color:var(--ink3)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.question-svg{margin-bottom:14px;display:flex;justify-content:center;padding:12px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)}
.question-text{font-size:15px;color:var(--ink);line-height:1.8;margin-bottom:16px;font-weight:500}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:0.85em;line-height:1.1}
.frac sup{border-bottom:1px solid currentColor;padding:0 2px;font-size:1em}
.frac sub{padding:0 2px;font-size:1em}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}
.option:hover{border-color:var(--accent);background:var(--accent-bg)}
.option.selected{border-color:var(--accent);background:var(--accent-bg)}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.wrong{border-color:var(--red);background:var(--red-bg)}
.option.show-correct{border-color:var(--green);background:var(--green-bg)}
.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}
.option.selected .option-letter{background:var(--accent);color:#fff}
.option.correct .option-letter{background:var(--green);color:#fff}
.option.wrong .option-letter{background:var(--red);color:#fff}
.option.show-correct .option-letter{background:var(--green);color:#fff}
.option-text{font-size:14px;color:var(--ink2);line-height:1.6}
.option.selected .option-text{color:var(--accent)}
.option.correct .option-text{color:var(--green)}
.option.wrong .option-text{color:var(--red)}
.option.show-correct .option-text{color:var(--green)}
.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}
.submit-btn{padding:11px 28px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}
.submit-btn:hover{background:#166534}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}
.answered-count{font-size:13px;color:var(--ink3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}
.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}
.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}
.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}
.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <a href="../../../../index.html">Matematika 11</a>
        <span class="sep">›</span><span>Funkcijos</span>
        <span class="sep">›</span><span class="current">Praktinis testas 20</span>
      </div>
      <div class="tab-switcher">
        <a href="../../temos/t10-logaritmine/teorija.html" class="tab-btn" style="text-decoration:none">Teorija</a>
        <button class="tab-btn active">Testai</button>
      </div>
    </div>
    <div class="page">
      <div class="test-header">
        <div class="topic-tag" style="background:var(--green-bg);color:var(--green);border-color:var(--green-lt)">5 skyrius · Praktinis testas 20</div>
        <h1>Funkcijų praktika — 20 testas</h1>
        <div class="test-meta">
          <div class="test-meta-item">📝 10 uždavinių</div>
          <div class="test-meta-item">📚 T10 · T11 · T12</div>
          <div class="test-meta-item">✅ Atsakymas matomas po pateikimo</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="questions"></div>
      <div class="submit-area">
        <button class="submit-btn" id="submit-btn" onclick="submitTest()">Pateikti testą</button>
        <span class="answered-count" id="answered-count">Atsakyta: 0 / 10</span>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-label">Testo rezultatas</div>
    <div class="modal-stats">
      <div><div class="modal-stat-val" id="stat-correct"></div><div class="modal-stat-key">Teisingi</div></div>
      <div><div class="modal-stat-val" id="stat-wrong"></div><div class="modal-stat-key">Neteisingi</div></div>
      <div><div class="modal-stat-val" id="stat-pct"></div><div class="modal-stat-key">Rezultatas</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Peržiūrėti atsakymus</button>
      <a href="../../skyriaus-testai/index.html" class="btn primary" style="text-decoration:none">Skyriaus testai →</a>
    </div>
  </div>
</div>
<script src="../../../../js/main.js"></script>
<script>var QUESTIONS = [
  {
    "text": "Apskaičiuokite: log₅√5.",
    "options": [
      "1/2",
      "2",
      "5",
      "<span class=\"frac\"><sup>1</sup><sub>5</sub></span>"
    ],
    "correct": 0
  },
  {
    "text": "Suprastinkite: log<span class=\"frac\"><sup>1</sup><sub>3</sub></span>63 − log<span class=\"frac\"><sup>1</sup><sub>3</sub></span>7.",
    "options": [
      "−2",
      "2",
      "9",
      "−9"
    ],
    "correct": 0
  },
  {
    "text": "Atpažinkite grafiką. Kokia funkcija vaizduojama?",
    "options": [
      "f(x) = log₃x",
      "f(x) = log<span class=\"frac\"><sup>1</sup><sub>3</sub></span>x",
      "f(x) = 3ˣ",
      "f(x) = x³"
    ],
    "correct": 0
  },
  {
    "text": "Raskite lygties log₂(x + 1) = 3 sprendinį.",
    "options": [
      "x = 6",
      "x = 7",
      "x = 8",
      "x = 9"
    ],
    "correct": 1
  },
  {
    "text": "Išspręskite nelygybę log₂(x−1) − log₂5 ≤ 1 + log₂(12−x).",
    "options": [
      "x ∈ (1; 11]",
      "x ∈ [1; 12]",
      "x ∈ (1; 12)",
      "x ∈ (11; 12)"
    ],
    "correct": 0
  },
  {
    "text": "Apskaičiuokite: 100^(2 − lg 5).",
    "options": [
      "400",
      "200",
      "<span class=\"frac\"><sup>1</sup><sub>400</sub></span>",
      "40"
    ],
    "correct": 0
  },
  {
    "text": "Atpažinkite grafiką. Kokia funkcija vaizduojama?",
    "options": [
      "f(x) = log<span class=\"frac\"><sup>1</sup><sub>3</sub></span>x",
      "f(x) = log₃x",
      "f(x) = <span class=\"frac\"><sup>1</sup><sub>3</sub></span>ˣ",
      "f(x) = −3ˣ"
    ],
    "correct": 0
  },
  {
    "text": "Išspręskite nelygybę log₅x > 2.",
    "options": [
      "x > 10",
      "x > 25",
      "x < 25",
      "x > 5"
    ],
    "correct": 1
  },
  {
    "text": "Apskaičiuokite: ln e² − ln e.",
    "options": [
      "0",
      "1",
      "2",
      "e"
    ],
    "correct": 1
  },
  {
    "text": "Raskite lygties log₃(x − 1) = 2 sprendinį.",
    "options": [
      "x = 8",
      "x = 9",
      "x = 10",
      "x = 7"
    ],
    "correct": 2
  }
];
var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;
function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Uždavinys ' + (qi+1) + ' iš ' + QUESTIONS.length + '</div>';
    if (q.svg) html += '<div class="question-svg">' + q.svg + '</div>';
    html += '<div class="question-text">' + q.text + '</div><div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}
function sel(qi, oi) {
  if (submitted) return; answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if(e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a = answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width = (a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent = 'Atsakyta: '+a+' / '+QUESTIONS.length;
}
function submitTest() {
  var a = answers.filter(function(x){return x!==null;}).length;
  if (a < QUESTIONS.length && !confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?')) return;
  submitted = true; document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var s = answers[qi]; if (s===q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-'+qi+'-'+oi); el.classList.remove('selected');
      if (oi===q.correct) el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if (oi===s&&s!==q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent = pct+'%';
  document.getElementById('modal-score').className = 'modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent = correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
renderQuestions();
</script>
</body>
</html>

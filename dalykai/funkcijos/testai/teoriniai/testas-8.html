  <style>.test-header{margin-bottom:28px}.test-header h1{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:6px}.test-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}.test-meta-item{font-size:12px;color:var(--ink3)}.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}.question-text{font-size:15px;color:var(--ink);line-height:1.65;margin-bottom:16px;font-weight:500}.options{display:flex;flex-direction:column;gap:8px}.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}.option:hover{border-color:var(--accent);background:var(--accent-bg)}.option.selected{border-color:var(--accent);background:var(--accent-bg)}.option.correct{border-color:var(--green);background:var(--green-bg)}.option.wrong{border-color:var(--red);background:var(--red-bg)}.option.show-correct{border-color:var(--green);background:var(--green-bg)}.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}.option.selected .option-letter{background:var(--accent);color:#fff}.option.correct .option-letter{background:var(--green);color:#fff}.option.wrong .option-letter{background:var(--red);color:#fff}.option.show-correct .option-letter{background:var(--green);color:#fff}.option-text{font-size:14px;color:var(--ink2);line-height:1.5}.option.selected .option-text{color:var(--accent)}.option.correct .option-text{color:var(--green)}.option.wrong .option-text{color:var(--red)}.option.show-correct .option-text{color:var(--green)}.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}.submit-btn{padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}.submit-btn:hover{background:#1e40af}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}.answered-count{font-size:13px;color:var(--ink3)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}.modal-btns{display:flex;gap:10px;justify-content:center}.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb"><a href="../../../../index.html">Matematika 11</a><span class="sep">›</span><span>Funkcijos</span><span class="sep">›</span><span class="current">Teorinis testas 8</span></div>
      <div class="tab-switcher"><a href="../../temos/t8-rodiklineslygtys/teorija.html" class="tab-btn" style="text-decoration:none">Teorija</a><button class="tab-btn active">Testai</button></div>
    </div>
    <div class="page">
      <div class="test-header">
        <div class="topic-tag">5 skyrius · Teorinis testas 8</div>
        <h1>Funkcijų teorija — 8 testas</h1>
        <div class="test-meta"><div class="test-meta-item">📝 10 klausimų</div><div class="test-meta-item">📚 T7 · T8 · T9</div><div class="test-meta-item">✅ Atsakymas matomas po pateikimo</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="questions"></div>
      <div class="submit-area"><button class="submit-btn" id="submit-btn" onclick="submitTest()">Pateikti testą</button><span class="answered-count" id="answered-count">Atsakyta: 0 / 10</span></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-score" id="modal-score"></div><div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-label">Testo rezultatas</div>
    <div class="modal-stats">
      <div><div class="modal-stat-val" id="stat-correct"></div><div class="modal-stat-key">Teisingi</div></div>
      <div><div class="modal-stat-val" id="stat-wrong"></div><div class="modal-stat-key">Neteisingi</div></div>
      <div><div class="modal-stat-val" id="stat-pct"></div><div class="modal-stat-key">Rezultatas</div></div>
    </div>
    <div class="modal-btns"><button class="btn" onclick="closeModal()">Peržiūrėti atsakymus</button><a href="testas-9.html" class="btn primary" style="text-decoration:none">Testas 9 →</a></div>
  </div>
</div>
<script src="../../../../js/main.js"></script>
<script>
var QUESTIONS = [
  { text: "Lygtis 2ˣ = −3 turi:", options: ["Vieną sprendinį", "Du sprendinius", "Begalybę sprendinių", "Sprendinių nėra"], correct: 3 },
  { text: "Norint išspręsti lygtį aᶠ⁽ˣ⁾ = aᵍ⁽ˣ⁾ (a > 0, a ≠ 1), sulyginame:", options: ["Pagrindus", "Rodiklius f(x) ir g(x)", "Abipuses puses su 0", "Koeficientus"], correct: 1 },
  { text: "Kurią laipsnių savybę taikome pertvarkant (2³)ˣ?", options: ["aᵐ · aⁿ = aᵐ⁺ⁿ", "(aᵐ)ⁿ = aᵐⁿ", "aᵐ / aⁿ = aᵐ⁻ⁿ", "a⁰ = 1"], correct: 1 },
  { text: "Lygtyje 4ˣ − 5 · 2ˣ + 4 = 0 taikome keitinį:", options: ["t = 4ˣ", "t = xˣ", "t = 2ˣ", "t = 2²ˣ"], correct: 2 },
  { text: "Po keitinio t = 2ˣ lygtis 4ˣ − 5·2ˣ + 4 = 0 tampa:", options: ["t − 5t + 4 = 0", "t² − 5t + 4 = 0", "2t − 5t + 4 = 0", "t² + 5t − 4 = 0"], correct: 1 },
  { text: "Sprendžiant lygtį skaidant daugikliais, sandauga lygi nuliui, kai:", options: ["Abu daugikliai teigiami", "Bent vienas daugiklis lygus nuliui", "Abu daugikliai neigiami", "Daugiklių suma lygi nuliui"], correct: 1 },
  { text: "Ar 2ˣ = 0 turi sprendinių?", options: ["Taip, x = 0", "Taip, x = −∞", "Ne — 2ˣ > 0 visada", "Taip, x = 1"], correct: 2 },
  { text: "Lygtis 3ˣ = 27. Raskite x.", options: ["x = 9", "x = 3", "x = 2", "x = 4"], correct: 1 },
  { text: "Rodiklinė nelygybė 2ˣ > 2⁵ reiškia:", options: ["x > 5, nes pagrindas 2 > 1", "x < 5", "x = 5", "x > 0"], correct: 0 },
  { text: "Sprendžiant rodiklinę nelygybę (1/3)ˣ > (1/3)⁴, rezultatas yra:", options: ["x > 4", "x < 4, nes pagrindas 1/3 < 1 — ženklas keičiasi", "x = 4", "x > 0"], correct: 1 }
];
var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;
function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Klausimas '+(qi+1)+' iš '+QUESTIONS.length+'</div>';
    html += '<div class="question-text">'+q.text+'</div><div class="options">';
    var L=['A','B','C','D'];
    for (var oi=0;oi<q.options.length;oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}
function sel(qi,oi) {
  if(submitted) return; answers[qi]=oi;
  for(var i=0;i<4;i++){var e=document.getElementById('opt-'+qi+'-'+i);if(e)e.classList.remove('selected');}
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a=answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width=(a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent='Atsakyta: '+a+' / '+QUESTIONS.length;
}
function submitTest() {
  var a=answers.filter(function(x){return x!==null;}).length;
  if(a<QUESTIONS.length&&!confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?')) return;
  submitted=true; document.getElementById('submit-btn').disabled=true;
  var correct=0;
  for(var qi=0;qi<QUESTIONS.length;qi++){
    var q=QUESTIONS[qi];var s=answers[qi];if(s===q.correct)correct++;
    for(var oi=0;oi<q.options.length;oi++){
      var el=document.getElementById('opt-'+qi+'-'+oi);el.classList.remove('selected');
      if(oi===q.correct)el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if(oi===s&&s!==q.correct)el.classList.add('wrong');
    }
  }
  var pct=Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent=pct+'%';
  document.getElementById('modal-score').className='modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent=pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent=correct;
  document.getElementById('stat-wrong').textContent=QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent=correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
renderQuestions();
</script>
</body>
</html>

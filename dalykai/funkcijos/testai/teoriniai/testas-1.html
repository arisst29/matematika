<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teorinis testas 1 — Funkcijos</title>
  <link rel="stylesheet" href="../../../../styles/main.css"/>
  <style>
    .test-header { margin-bottom: 28px; }
    .test-header h1 { font-size: 24px; font-weight: 600; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.3px; }
    .test-meta { display: flex; gap: 16px; margin-top: 10px; }
    .test-meta-item { font-size: 12px; color: var(--ink3); display: flex; align-items: center; gap: 5px; }

    /* Progress bar */
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

    /* Klausimo kortelė */
    .question-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }
    .question-num {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 15px;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 16px;
      font-weight: 500;
    }

    /* Atsakymų variantai */
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.12s;
      background: var(--bg);
      user-select: none;
    }
    .option:hover { border-color: var(--accent); background: var(--accent-bg); }
    .option.selected { border-color: var(--accent); background: var(--accent-bg); }
    .option.correct { border-color: var(--green); background: var(--green-bg); }
    .option.wrong { border-color: var(--red); background: var(--red-bg); }
    .option.show-correct { border-color: var(--green); background: var(--green-bg); }

    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink2);
      flex-shrink: 0;
      transition: all 0.12s;
    }
    .option.selected .option-letter { background: var(--accent); color: #fff; }
    .option.correct .option-letter { background: var(--green); color: #fff; }
    .option.wrong .option-letter { background: var(--red); color: #fff; }
    .option.show-correct .option-letter { background: var(--green); color: #fff; }

    .option-text { font-size: 14px; color: var(--ink2); line-height: 1.5; }
    .option.selected .option-text { color: var(--accent); }
    .option.correct .option-text { color: var(--green); }
    .option.wrong .option-text { color: var(--red); }
    .option.show-correct .option-text { color: var(--green); }

    /* Pateikti mygtukas */
    .submit-area {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .submit-btn {
      padding: 11px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.12s;
    }
    .submit-btn:hover { background: #1e40af; }
    .submit-btn:disabled { background: var(--ink3); cursor: not-allowed; }
    .answered-count { font-size: 13px; color: var(--ink3); }

    /* Rezultatų modalas */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border-radius: var(--radius-lg);
      padding: 36px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal-score {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }
    .modal-score.excellent { color: var(--green); }
    .modal-score.good { color: var(--accent); }
    .modal-score.poor { color: var(--red); }
    .modal-label { font-size: 14px; color: var(--ink3); margin-bottom: 20px; }
    .modal-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--bg3);
      border-radius: var(--radius);
    }
    .modal-stat-val { font-size: 22px; font-weight: 600; color: var(--ink); }
    .modal-stat-key { font-size: 11px; color: var(--ink3); margin-top: 2px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-feedback { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <a href="../../../../index.html">Matematika 11</a>
        <span class="sep">›</span>
        <span>Funkcijos</span>
        <span class="sep">›</span>
        <span class="current">Teorinis testas 1</span>
      </div>
      <div class="tab-switcher">
        <a href="../../temos/t1-apibreztis/teorija.html" class="tab-btn" style="text-decoration:none">Teorija</a>
        <button class="tab-btn active">Testai</button>
      </div>
    </div>

    <div class="page">
      <div class="test-header">
        <div class="topic-tag">5 skyrius · Teorinis testas 1</div>
        <h1>Funkcijų teorija — 1 testas</h1>
        <div class="test-meta">
          <div class="test-meta-item">📝 10 klausimų</div>
          <div class="test-meta-item">📚 T1 + T2 + T3 teorija</div>
          <div class="test-meta-item">✅ Atsakymas matomas po pateikimo</div>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width:0%"></div>
      </div>

      <div id="questions"></div>

      <div class="submit-area">
        <button class="submit-btn" id="submit-btn" onclick="submitTest()">Pateikti testą</button>
        <span class="answered-count" id="answered-count">Atsakyta: 0 / 10</span>
      </div>
    </div>
  </div>
</div>

<!-- REZULTATŲ MODALAS -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-label">Testo rezultatas</div>
    <div class="modal-stats">
      <div>
        <div class="modal-stat-val" id="stat-correct"></div>
        <div class="modal-stat-key">Teisingi</div>
      </div>
      <div>
        <div class="modal-stat-val" id="stat-wrong"></div>
        <div class="modal-stat-key">Neteisingi</div>
      </div>
      <div>
        <div class="modal-stat-val" id="stat-pct"></div>
        <div class="modal-stat-key">Rezultatas</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Peržiūrėti atsakymus</button>
      <a href="testas-2.html" class="btn primary" style="text-decoration:none">Testas 2 →</a>
    </div>
  </div>
</div>

<script src="../../../../js/main.js"></script>
<script>

const QUESTIONS = [
  {
    id: 1,
    text: "Kas yra funkcijos apibrėžimo sritis D(f)?",
    options: [
      "Visos galimos funkcijos reikšmių y aibė",
      "Visos leistinos argumento x reikšmių aibė",
      "Taškai, kuriuose funkcijos grafikas kerta x ašį",
      "Intervalo, kuriame funkcija didėja, aibė"
    ],
    correct: 1
  },
  {
    id: 2,
    text: "Kas yra funkcijos reikšmių sritis E(f)?",
    options: [
      "Visos leistinos argumento x reikšmių aibė",
      "Taškai, kuriuose f(x) = 0",
      "Visos galimos funkcijos reikšmių y aibė",
      "Intervalas, kuriame funkcija yra tolydi"
    ],
    correct: 2
  },
  {
    id: 3,
    text: "Kokia pagrindinė sąlyga, kad priklausomybė y = f(x) būtų funkcija?",
    options: [
      "Kiekvienai y reikšmei atitinka bent viena x reikšmė",
      "Kiekvienai x reikšmei atitinka lygiai viena y reikšmė",
      "Funkcija turi būti apibrėžta visuose realiuosiuose skaičiuose",
      "Grafikas turi kirstis su abejomis ašimis"
    ],
    correct: 1
  },
  {
    id: 4,
    text: "Kaip vadinami taškai, kuriuose funkcijos reikšmė lygi nuliui?",
    options: [
      "Funkcijos ekstremumai",
      "Funkcijos asimptotai",
      "Funkcijos nuliai",
      "Funkcijos trūkio taškai"
    ],
    correct: 2
  },
  {
    id: 5,
    text: "Kuriam intervale funkcijos reikšmės yra teigiamos?",
    options: [
      "Ten, kur funkcijos grafikas yra žemiau x ašies",
      "Ten, kur funkcijos grafikas yra aukščiau x ašies",
      "Ten, kur funkcija yra mažėjanti",
      "Ten, kur funkcija yra lyginė"
    ],
    correct: 1
  },
  {
    id: 6,
    text: "Kaip patikrinti ar funkcija yra lyginė?",
    options: [
      "Reikia patikrinti ar f(−x) = −f(x)",
      "Reikia patikrinti ar f(−x) = f(x)",
      "Reikia patikrinti ar f(x) = f(x+1)",
      "Reikia patikrinti ar f(0) = 0"
    ],
    correct: 1
  },
  {
    id: 7,
    text: "Kokia lyginės funkcijos grafiko savybė?",
    options: [
      "Grafikas simetriškas koordinačių pradžios taško O atžvilgiu",
      "Grafikas simetriškas x ašies atžvilgiu",
      "Grafikas simetriškas y ašies atžvilgiu",
      "Grafikas visada kerta abi ašis"
    ],
    correct: 2
  },
  {
    id: 8,
    text: "Kas yra sudėtinė funkcija f(g(x))?",
    options: [
      "Dviejų funkcijų suma f(x) + g(x)",
      "Funkcija, gauta įrašius g(x) į f vietoj argumento",
      "Dviejų funkcijų sandauga f(x) · g(x)",
      "Funkcija, gauta įrašius f(x) į g vietoj argumento"
    ],
    correct: 1
  },
  {
    id: 9,
    text: "Ar visada f(g(x)) = g(f(x))?",
    options: [
      "Taip, visada",
      "Taip, bet tik kai f ir g yra tiesinės funkcijos",
      "Ne, paprastai tai skirtingos funkcijos",
      "Taip, bet tik kai f = g"
    ],
    correct: 2
  },
  {
    id: 10,
    text: "Kaip vadinamas taškas, kuriame funkcijos grafikas daro šuolį?",
    options: [
      "Funkcijos nulis",
      "Funkcijos trūkio taškas",
      "Funkcijos ekstremumo taškas",
      "Funkcijos infleksijos taškas"
    ],
    correct: 1
  }
];

// ── Būsena ─────────────────────────────────────────
const answers = new Array(QUESTIONS.length).fill(null);
let submitted = false;

// ── Generuoti klausimus ─────────────────────────────
function renderQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = QUESTIONS.map((q, qi) => `
    <div class="question-card" id="qcard-${qi}">
      <div class="question-num">Klausimas ${qi + 1} iš ${QUESTIONS.length}</div>
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map((opt, oi) => `
          <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
            <div class="option-letter">${['A','B','C','D'][oi]}</div>
            <div class="option-text">${opt}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ── Pasirinkti atsakymą ─────────────────────────────
function selectOption(qi, oi) {
  if (submitted) return;
  answers[qi] = oi;

  // Nuvalome visus šio klausimo variantus
  QUESTIONS[qi].options.forEach((_, i) => {
    document.getElementById(`opt-${qi}-${i}`).classList.remove('selected');
  });
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');

  updateProgress();
}

// ── Progreso juosta ─────────────────────────────────
function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('progress').style.width = `${(answered / QUESTIONS.length) * 100}%`;
  document.getElementById('answered-count').textContent = `Atsakyta: ${answered} / ${QUESTIONS.length}`;
}

// ── Pateikti testą ──────────────────────────────────
function submitTest() {
  const answered = answers.filter(a => a !== null).length;
  if (answered < QUESTIONS.length) {
    const missing = QUESTIONS.length - answered;
    if (!confirm(`Dar neatsakyta ${missing} klausim${missing === 1 ? 'as' : 'ai'}. Ar tikrai norite pateikti?`)) return;
  }

  submitted = true;
  document.getElementById('submit-btn').disabled = true;

  // Parodyti teisingus/neteisingus atsakymus
  let correct = 0;
  QUESTIONS.forEach((q, qi) => {
    const selected = answers[qi];
    const isCorrect = selected === q.correct;
    if (isCorrect) correct++;

    q.options.forEach((_, oi) => {
      const el = document.getElementById(`opt-${qi}-${oi}`);
      el.classList.remove('selected');
      if (oi === q.correct) {
        el.classList.add(selected === q.correct && oi === selected ? 'correct' : 'show-correct');
      }
      if (oi === selected && selected !== q.correct) {
        el.classList.add('wrong');
      }
    });
  });

  showModal(correct);
}

// ── Rodyti modalą ───────────────────────────────────
function showModal(correct) {
  const total = QUESTIONS.length;
  const pct = Math.round((correct / total) * 100);

  const scoreEl = document.getElementById('modal-score');
  scoreEl.textContent = `${pct}%`;
  scoreEl.className = 'modal-score ' + (pct >= 80 ? 'excellent' : pct >= 50 ? 'good' : 'poor');

  const feedback = pct >= 90 ? 'Puikiai! 🎉' : pct >= 70 ? 'Gerai! 👍' : pct >= 50 ? 'Neblogai, bet dar pasikartok' : 'Reikia pasimokyti 📖';
  document.getElementById('modal-feedback').textContent = feedback;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = total - correct;
  document.getElementById('stat-pct').textContent = `${correct}/${total}`;

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ── Init ────────────────────────────────────────────
renderQuestions();
</script>
</body>
</html>

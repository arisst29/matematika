align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#475569;flex-shrink:0}.opt.selected .opt-letter{background:#1d4ed8;color:#fff}.opt.correct .opt-letter{background:#16a34a;color:#fff}.opt.wrong .opt-letter{background:#dc2626;color:#fff}.opt.show-correct .opt-letter{background:#16a34a;color:#fff}.opt-text{font-size:14px;color:#334155;line-height:1.5}.sym-bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:10px;margin-bottom:4px}.sym-label{font-size:11px;color:#94a3b8}.sym-btn{padding:3px 9px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:5px;font-size:14px;cursor:pointer;color:#334155;font-family:inherit}.sym-btn:hover{background:#dbeafe;border-color:#1d4ed8;color:#1d4ed8}.sym-btn.ok{background:#dcfce7;border-color:#16a34a;color:#16a34a}.open-wrap input{margin-top:6px;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;font-family:inherit;width:220px;outline:none;transition:border .12s}.open-wrap input:focus{border-color:#1d4ed8}.open-wrap input.ci{border-color:#16a34a;background:#f0fdf4;color:#16a34a;font-weight:600}.open-wrap input.wi{border-color:#dc2626;background:#fef2f2;color:#dc2626}.fb{font-size:13px;font-weight:600;margin-top:6px;display:none}.fb.show{display:block}.fb.ok{color:#16a34a}.fb.bad{color:#dc2626}.submit-row{margin-top:32px;padding-top:24px;border-top:2px solid #e2e8f0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}.btn-submit{padding:13px 36px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}.btn-submit:disabled{background:#94a3b8;cursor:not-allowed}.ai{font-size:13px;color:#64748b}.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:300;align-items:center;justify-content:center}.modal-bg.open{display:flex}.modal{background:#fff;border-radius:16px;padding:44px 48px;max-width:540px;width:92%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2)}.mp{font-size:80px;font-weight:800;line-height:1;margin-bottom:4px}.mp.ex{color:#16a34a}.mp.good{color:#1d4ed8}.mp.poor{color:#dc2626}.mf{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}.ms{font-size:14px;color:#64748b;margin-bottom:24px}.mst{display:flex;justify-content:center;gap:32px;padding:20px;background:#f8fafc;border-radius:10px;margin-bottom:24px}.msv{font-size:26px;font-weight:700;color:#1a1a2e}.msk{font-size:11px;color:#94a3b8;margin-top:2px;text-transform:uppercase}.mbtns{display:flex;gap:10px;justify-content:center}.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#334155}.btn.primary{background:#1d4ed8;color:#fff;border-color:#1d4ed8}</style>

<script>var QUESTIONS=[{"type": "mcq", "pts": 1, "text": "Duotos aib\u0117s A = [\u22124; 2) ir B = [0; 7]. Raskite A \u222a B.", "options": ["[0; 2)", "[\u22124; 7]", "[\u22124; 2)", "[0; 7]"], "correct": 1}, {"type": "open", "pts": 2, "text": "Aib\u0117s A = {x | x \u2208 \u2115, x < 5} ir B = {x | x \u2208 \u2115, x lyginis}. Kiek element\u0173 turi A \u2229 B? <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(Skai\u010di\u0173)</span>", "answer": "2", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Apskai\u010diuokite (1/8)^(\u22122/3).", "options": ["4", "1/4", "\u22124", "2"], "correct": 0}, {"type": "open", "pts": 2, "text": "Suprastinkite: 3\u221a28 \u2212 2\u221a63 + \u221a112. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(formatu k\u221an)</span>", "answer": "4\u221a7", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Nustatyk rei\u0161kinio \u221a(5 \u2212 x) \u00b7 (x + 2)^(1/3) apibr\u0117\u017eimo srit\u012f.", "options": ["x \u2264 5", "x \u2264 5 ir x \u2265 \u22122", "x < 5", "x \u2264 5 \u2014 kubin\u0117 \u0161aknis visur apibr\u0117\u017esta"], "correct": 3}, {"type": "open", "pts": 2, "text": "Suprastink: (x\u00b2 \u2212 2x \u2212 8) / (x\u00b2 \u2212 16). <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite atsakym\u0105)</span>", "answer": "(x+2)/(x+4)", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "I\u0161skaidyk daugikliais: x\u00b3 + 27.", "options": ["(x+3)\u00b3", "(x+3)(x\u00b2\u22123x+9)", "(x\u22123)(x\u00b2+3x+9)", "(x+3)(x\u00b2+3x+9)"], "correct": 1}, {"type": "open", "pts": 2, "text": "Apskai\u010diuokite: (\u221a5 \u2212 \u221a3)\u00b2 + (\u221a5 + \u221a3)\u00b2. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(Skai\u010di\u0173)</span>", "answer": "16", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Pakelk kvadratu: (x \u2212 \u221a(x+1))\u00b2, kai x > 0.", "options": ["x\u00b2 \u2212 x \u2212 1", "x\u00b2 \u2212 2x\u221a(x+1) + x + 1", "x\u00b2 + 2x\u221a(x+1) + x + 1", "x\u00b2 \u2212 2\u221a(x+1) + x + 1"], "correct": 1}, {"type": "open", "pts": 2, "text": "Sud\u0117k: 1/(x\u22122) + x/(x\u00b2\u22124). <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(Skaitikl\u012f vir\u0161 (x+2)(x-2))</span>", "answer": "2x+2", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Kuri x reik\u0161m\u0117 priklauso rei\u0161kinio \u221a(x\u00b2 \u2212 4x) apibr\u0117\u017eimo sri\u010dai?", "options": ["x = 1", "x = 3", "x = 5", "x = \u22121"], "correct": 3}, {"type": "open", "pts": 2, "text": "I\u0161skaidyk daugikliais: 4x\u00b2 \u2212 12x + 9. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(formatu (ax+b)\u00b2)</span>", "answer": "(2x-3)\u00b2", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Kam lygi \u2074\u221a(x\u22123)\u2074 \u2212 \u00b3\u221a(x+1)\u00b3, kai x < 3?", "options": ["\u22124", "2\u22122x", "\u22122", "2 \u2212 2x"], "correct": 3}, {"type": "open", "pts": 2, "text": "Suprastink: (a\u00b3 \u2212 b\u00b3) / (a\u00b2 \u2212 b\u00b2). <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite atsakym\u0105)</span>", "answer": "(a\u00b2+ab+b\u00b2)/(a+b)", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Nustatyk rei\u0161kinio \u221a(x+1) / \u221a(x\u00b2\u2212x\u22126) apibr\u0117\u017eimo srit\u012f.", "options": ["x \u2265 \u22121", "x \u2265 \u22121, x \u2260 \u00b13", "x > 3 ir x \u2265 \u22121, t.y. x > 3", "x \u2265 \u22121 ir x > 3"], "correct": 2}, {"type": "open", "pts": 2, "text": "Padalink: (x\u00b2+3x)/(x\u22124) \u00f7 (x+3)/(x\u00b2\u221216). <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite atsakym\u0105)</span>", "answer": "x(x+4)", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Apskai\u010diuokite: 2^(1/4) \u00b7 2^(3/4) \u00b7 2^(\u22121/2).", "options": ["2", "1", "\u221a2", "2^(3/2)"], "correct": 2}, {"type": "open", "pts": 2, "text": "Pakelk kubu: (a \u2212 2b)\u00b3. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(I\u0161skleist\u0105 form\u0105)</span>", "answer": "a\u00b3-6a\u00b2b+12ab\u00b2-8b\u00b3", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "I\u0161skaidyk daugikliais: x\u2074 \u2212 1.", "options": ["(x\u00b2\u22121)\u00b2", "(x\u22121)(x+1)(x\u00b2+1)", "(x\u00b2\u22121)(x\u00b2+1)", "B ir C teisingi"], "correct": 3}, {"type": "open", "pts": 2, "text": "Nustatyk rei\u0161kinio \u221a(4\u2212x\u00b2) / (x\u22121) apibr\u0117\u017eimo srit\u012f. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(pvz. x\u2208[-2;1)\u222a(1;2])</span>", "answer": "x\u2208[-2;1)\u222a(1;2]", "tolerance": 0}];
var QS=QUESTIONS;var ans=new Array(QS.length).fill(null);var done=false;var MP=30;
var SYMS=["√","²","³","⁴","≥","≤","≠","∞","∪","∩","∈"];
var lastInp=null;var symClick=false;
document.addEventListener('mousedown',function(e){
  if(e.target.classList.contains('sym-btn')){symClick=true;e.preventDefault();}
});
document.addEventListener('click',function(e){
  if(e.target.classList.contains('sym-btn')){
    var sym=SYMS[parseInt(e.target.getAttribute('data-i'))];
    var inp=lastInp;
    if(inp&&!inp.disabled){
      var p=inp.selectionStart!=null?inp.selectionStart:inp.value.length;
      inp.value=inp.value.slice(0,p)+sym+inp.value.slice(p);
      inp.focus({preventScroll:true});
      inp.selectionStart=inp.selectionEnd=p+sym.length;
      inp.dispatchEvent(new Event('input',{bubbles:true}));
    }
    e.target.classList.add('ok');
    setTimeout(function(){e.target.classList.remove('ok');symClick=false;},500);
  }
});
document.addEventListener('focusin',function(e){
  if(e.target.matches('.open-wrap input')&&!symClick)lastInp=e.target;
});
function render(){
  var L=['A','B','C','D'];
  var sb='<div class="sym-bar"><span class="sym-label">Kopijuok:&nbsp;</span>';
  var sl=["√","²","³","⁴","≥","≤","≠","∞","∪","∩","∈"];
  for(var si=0;si<sl.length;si++)sb+='<button class="sym-btn" data-i="'+si+'">'+sl[si]+'</button>';
  sb+='</div>';
  var h='';
  for(var qi=0;qi<QS.length;qi++){
    var q=QS[qi];var pc=q.pts===2?'two':'';
    h+='<div class="q-card">';
    h+='<div class="q-header"><span class="q-num">KLAUSIMAS '+(qi+1)+' IŠ '+QS.length+'</span>';
    h+='<span class="q-pts '+pc+'">'+q.pts+(q.pts===1?' taškas':' taškai')+'</span></div>';
    h+='<div class="q-text">'+q.text+'</div>';
    if(q.type==='mcq'){
      h+='<div class="options">';
      for(var oi=0;oi<q.options.length;oi++){
        h+='<div class="opt" id="o'+qi+'x'+oi+'" onclick="pick('+qi+','+oi+')">';
        h+='<div class="opt-letter">'+L[oi]+'</div>';
        h+='<div class="opt-text">'+q.options[oi]+'</div></div>';
      }
      h+='</div>';
    }else{
      h+=sb;
      h+='<div class="open-wrap"><input type="text" id="i'+qi+'" oninput="typed('+qi+')" placeholder="Įrašykite atsakymą"></div>';
      h+='<div class="fb" id="f'+qi+'"></div>';
    }
    h+='</div>';
  }
  document.getElementById('qs').innerHTML=h;
  document.getElementById('pt').textContent='Atsakyta: 0 / '+QS.length;
}
function pick(qi,oi){if(done)return;ans[qi]=oi;for(var i=0;i<4;i++){var e=document.getElementById('o'+qi+'x'+i);if(e)e.classList.remove('selected');}document.getElementById('o'+qi+'x'+oi).classList.add('selected');upd();}
function typed(qi){if(done)return;var v=document.getElementById('i'+qi).value.trim();ans[qi]=v||null;upd();}
function upd(){var n=ans.filter(function(x){return x!==null;}).length;document.getElementById('pf').style.width=(n/QS.length*100)+'%';document.getElementById('pt').textContent='Atsakyta: '+n+' / '+QS.length;document.getElementById('ai').textContent='Atsakyta: '+n+' / '+QS.length;}
function chkOpen(v,a,tol){if(!v)return false;var vv=v.trim().replace(',','.').toLowerCase();var aa=String(a).trim().replace(',','.').toLowerCase();if(vv===aa)return true;var nv=parseFloat(vv),na=parseFloat(aa);if(!isNaN(nv)&&!isNaN(na)&&Math.abs(nv-na)<=(tol||0.01))return true;return false;}
function submit(){var n=ans.filter(function(x){return x!==null;}).length;if(n<QS.length&&!confirm('Dar neatsakyta '+(QS.length-n)+'. Pateikti?'))return;done=true;document.getElementById('sb').disabled=true;var pts=0;for(var qi=0;qi<QS.length;qi++){var q=QS[qi];var s=ans[qi];if(q.type==='mcq'){var ok=(s===q.correct);if(ok)pts+=q.pts;for(var oi=0;oi<q.options.length;oi++){var el=document.getElementById('o'+qi+'x'+oi);el.classList.remove('selected');if(oi===q.correct)el.classList.add(ok&&oi===s?'correct':'show-correct');if(oi===s&&!ok)el.classList.add('wrong');}}else{var inp=document.getElementById('i'+qi);var fb=document.getElementById('f'+qi);var ok2=chkOpen(s,q.answer,q.tolerance);if(ok2){pts+=q.pts;inp.classList.add('ci');fb.textContent='Teisingai';fb.className='fb show ok';}else{inp.classList.add('wi');fb.textContent='Teisingas atsakymas: '+q.answer;fb.className='fb show bad';}inp.disabled=true;}}var pct=Math.round(pts/MP*100);document.getElementById('mpct').textContent=pct+'%';document.getElementById('mpct').className='mp '+(pct>=80?'ex':pct>=50?'good':'poor');document.getElementById('mf').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasirengimo';document.getElementById('ms').textContent='Surinkta: '+pts+' iš '+MP+' taškų';document.getElementById('sc').textContent=pts;document.getElementById('sw').textContent=MP-pts;document.getElementById('sp').textContent=pct+'%';document.getElementById('mbg').classList.add('open');}
function closeM(){document.getElementById('mbg').classList.remove('open');}
render();</script>

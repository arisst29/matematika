body{margin:0;font-family:'Segoe UI',system-ui,sans-serif}
.exam-top{border-bottom:3px solid #1d4ed8;padding-bottom:20px;margin-bottom:32px}

.exam-top .meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}

.progress-wrap{margin-bottom:28px}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1d4ed8;border-radius:3px;transition:width .3s;width:0%}
.progress-text{font-size:12px;color:#64748b;margin-top:6px;text-align:right}
.q-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.q-num{font-size:13px;font-weight:700;color:#64748b;letter-spacing:0.05em}
.q-pts{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}

.q-text{font-size:15px;color:#1a1a2e;line-height:1.75;margin-bottom:6px;font-weight:500}
.q-hint{font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:14px}

.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:11px 16px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;background:#fff;user-select:none}
.opt:hover{border-color:#1d4ed8;background:#eff6ff}
.opt.selected{border-color:#1d4ed8;background:#eff6ff}
.opt.correct{border-color:#16a34a;background:#f0fdf4}

.opt.selected .opt-letter{background:#1d4ed8;color:#fff}
.opt.correct .opt-letter{background:#16a34a;color:#fff}
.opt.wrong .opt-letter{background:#dc2626;color:#fff}
.opt.show-correct .opt-letter{background:#16a34a;color:#fff}
.opt-text{font-size:14px;color:#334155;line-height:1.5}
.opt.selected .opt-text{color:#1d4ed8;font-weight:500}
.opt.correct .opt-text{color:#16a34a;font-weight:500}
.opt.wrong .opt-text{color:#dc2626}
.opt.show-correct .opt-text{color:#16a34a;font-weight:500}
.open-answer{margin-top:4px}
.open-input{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.open-input input{padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;font-family:inherit;width:200px;outline:none;transition:border .12s}
.open-input input:focus{border-color:#1d4ed8}
.open-input input.correct-in{border-color:#16a34a;background:#f0fdf4;color:#16a34a;font-weight:600}
.open-input input.wrong-in{border-color:#dc2626;background:#fef2f2;color:#dc2626}
.open-input input.partial-in{border-color:#d97706;background:#fffbeb;color:#d97706}
.answer-feedback{font-size:13px;font-weight:600;margin-top:6px;display:none}
.answer-feedback.show{display:block}
.answer-feedback.ok{color:#16a34a}
.answer-feedback.partial{color:#d97706}
.answer-feedback.bad{color:#dc2626}
.submit-row{margin-top:32px;padding-top:24px;border-top:2px solid #e2e8f0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}

.btn-submit:hover{background:#1e40af}

.answered-info{font-size:13px;color:#64748b}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}

.modal-feedback{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.modal-sub{font-size:14px;color:#64748b;margin-bottom:24px}
.modal-stats{display:flex;justify-content:center;gap:32px;padding:20px;background:#f8fafc;border-radius:10px;margin-bottom:24px}

.modal-btns{display:flex;gap:10px;justify-content:center}

var QUESTIONS = [{"num": "1.", "type": "mcq", "pts": 1, "text": "Išreišk radianais: 210°", "options": ["5π/6", "7π/6", "3π/4", "5π/4"], "correct": 1, "hint": "pasirinkite vieną atsakymą"}, {"num": "2.", "type": "open", "pts": 2, "text": "Žinoma: sinα = −5/13, α ∈ III ketvirtis. Apskaičiuokite tgα. Įrašykite atsakymą (formatu skaitiklis/vardiklis).", "answers": ["5/12"], "partial": ["12/13", "-12/13"], "hint": "tg = sin/cos, apskaičiuokite cos iš tapatybės"}, {"num": "3.", "type": "mcq", "pts": 1, "text": "Kuriame ketvirtyje yra kampas −670°?", "options": ["I", "II", "III", "IV"], "correct": 1, "hint": "pasirinkite vieną atsakymą"}, {"num": "4.", "type": "open", "pts": 2, "text": "Kiek sprendinių turi lygtis sin x = 1/2 intervale [0; 2π]? Įrašykite skaičių.", "answers": ["2"], "partial": [], "hint": "nubraižykite sinusoidę ir tiesę y = 1/2"}, {"num": "5.", "type": "mcq", "pts": 1, "text": "f(x) = sin x mažiausias periodas:", "options": ["π/2", "π", "2π", "4π"], "correct": 2, "hint": "pasirinkite vieną atsakymą"}, {"num": "6.", "type": "open", "pts": 2, "text": "Surašykite visus lygties cos x = 0 sprendinius intervale [0; 2π]. Įrašykite juos atskirdami kabliataškiu (pvz. pi/2; 3pi/2).", "answers": ["pi/2; 3pi/2", "pi/2;3pi/2", "pi/2;3pi/2"], "partial": ["pi/2", "3pi/2"], "hint": "cos x = 0, kai x = π/2 + πk"}, {"num": "7.", "type": "open", "pts": 2, "text": "Šiame grafike pavaizduota viena iš trigonometrinių funkcijų. Kuri? Įrašykite funkcijos formulę (pvz. sinx arba cosx).", "graph_id": "g_cos", "answers": ["cosx", "cos x", "f(x)=cosx", "f(x)=cos x"], "partial": [], "hint": "atkreipkite dėmesį: kur grafikas kerta y ašį ir kur yra maksimumas"}, {"num": "8.", "type": "mcq", "pts": 1, "text": "Lygties tg x = √3 bendrasis sprendinys:", "options": ["x = π/3 + 2πk", "x = π/3 + πk", "x = ±π/3 + πk", "x = π/6 + πk"], "correct": 1, "hint": "pasirinkite vieną atsakymą"}, {"num": "9.", "type": "open", "pts": 2, "text": "Surašykite visus lygties cos x = −√3/2 sprendinius intervale [0; 2π]. Įrašykite juos atskirdami kabliataškiu.", "answers": ["5pi/6; 7pi/6", "5pi/6;7pi/6"], "partial": ["2", "5pi/6", "7pi/6"], "hint": "arccos(−√3/2) = 5π/6, antras sprendinys 2π − 5π/6"}, {"num": "10.", "type": "mcq", "pts": 1, "text": "arccos x apibrėžimo sritis:", "options": ["π/2; π/2]", "[0; π]", "[−1; 1]", "ℝ"], "correct": 2, "hint": "pasirinkite vieną atsakymą"}, {"num": "11.", "type": "open", "pts": 2, "text": "Raskite mažiausiamą teigiamą lygties sin x = −1 sprendinį laipsniais.", "answers": ["270"], "partial": [], "hint": "sin x = −1 kai x = −π/2 + 2πk"}, {"num": "12.", "type": "mcq", "pts": 1, "text": "f(x) = sin x didėja intervale:", "options": ["(π/2 + 2πk; 3π/2 + 2πk)", "(−π/2 + 2πk; π/2 + 2πk)", "(0; π)", "(π; 2π)"], "correct": 1, "hint": "pasirinkite vieną atsakymą"}, {"num": "13.", "type": "mcq", "pts": 1, "text": "f(x) = cos x yra lyginė, todėl cos(−x) lygus:", "options": ["−cos x", "cos x", "sin x", "−sin x"], "correct": 1, "hint": "pasirinkite vieną atsakymą"}, {"num": "14.", "type": "open", "pts": 2, "text": "Apskaičiuokite: arcsin(−√3/2). Įrašykite atsakymą (pvz. -pi/3).", "answers": ["-pi/3", "−π/3"], "partial": ["pi/3"], "hint": "arcsin(−x) = −arcsin(x)"}, {"num": "15.", "type": "mcq", "pts": 1, "text": "Koks yra sinα ženklas, jei α ∈ III ketvirtis?", "options": ["Teigiamas", "Neigiamas", "Lygus nuliui", "Bet koks"], "correct": 1, "hint": "pasirinkite vieną atsakymą"}, {"num": "16.", "type": "open", "pts": 2, "text": "Kiek sprendinių turi lygtis tg x = −1 intervale (−π; π]? Įrašykite skaičių.", "answers": ["2"], "partial": [], "hint": "tg x = −1 kai x = −π/4 + πk"}, {"num": "17.", "type": "mcq", "pts": 1, "text": "arctan x reikšmių sritis:", "options": ["[−π/2; π/2]", "(−π/2; π/2)", "[0; π]", "ℝ"], "correct": 1, "hint": "pasirinkite vieną atsakymą"}, {"num": "18.", "type": "open", "pts": 2, "text": "Nustatykite f(x) = arcsin(2x − 1) apibrėžimo sritį. Įrašykite kaip intervalą (pvz. [0; 1]).", "answers": ["[0; 1]", "[0;1]"], "partial": ["0", "1"], "hint": "− 1 ≤ 2x−1 ≤ 1 ⇒ 0 ≤ x ≤ 1"}, {"num": "19.", "type": "mcq", "pts": 1, "text": "f(x) = sin x nuliaį yra, kai:", "options": ["x = π/2 + πk", "x = πk", "x = π/2 + 2πk", "x = 2πk"], "correct": 1, "hint": "pasirinkite vieną atsakymą"}, {"num": "20.", "type": "open", "pts": 2, "text": "Pagrindine trigonometrine tapatybe: sin²α + cos²α = 1. Jei sinα = 3/5 ir α ∈ II ketvirtis, raskite cosα. Įrašykite atsakymą.", "answers": ["-4/5"], "partial": ["4/5"], "hint": "cos²α = 1 − 9/25 = 16/25, II ketvirčiuje cos < 0"}];

    }
  }
  document.getElementById('progress-text').textContent = 'Atsakyta: 0 / ' + QUESTIONS.length;
}

function buildCard(q, qi) {
  var ptsClass = q.pts === 2 ? 'q-pts two' : 'q-pts';
  var h = '<div class="q-card" id="qcard-'+qi+'">';
  h += '<div class="q-header"><span class="q-num">'+q.num+'</span><span class="'+ptsClass+'">'+q.pts+' t.</span></div>';
  h += '<div class="q-text">'+q.text+'</div>';
  if (q.graph_id) h += '<div id="graph-slot-'+qi+'"></div>';
  if (q.hint) h += '<div class="q-hint">'+q.hint+'</div>';
  if (q.type === 'mcq') {
    h += '<div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      h += '<div class="opt" id="opt-'+qi+'-'+oi+'" onclick="selMcq('+qi+','+oi+')">';
      h += '<div class="opt-letter">'+L[oi]+'</div>';
      h += '<div class="opt-text">'+q.options[oi]+'</div></div>';
    }
    h += '</div>';
  } else {
    h += '<div class="open-answer"><div class="open-input">';
    h += '<input type="text" id="inp-'+qi+'" placeholder="\u012era\u0161ykite atsakym\u0105" oninput="selOpen('+qi+')" />';
    h += '</div><div class="answer-feedback" id="fb-'+qi+'"></div></div>';
  }
  h += '</div>';
  return h;
}

function selMcq(qi, oi) {
  if (submitted) return;
  answers[qi] = oi;
  var q = QUESTIONS[qi];
  for (var i = 0; i < q.options.length; i++) {
    document.getElementById('opt-'+qi+'-'+i).className = 'opt' + (i===oi?' selected':'');
  }
  updateProgress();
}

function selOpen(qi) {
  if (submitted) return;
  answers[qi] = document.getElementById('inp-'+qi).value.trim();
  updateProgress();
}

function updateProgress() {
  var answered = Object.keys(answers).filter(function(k){ var v = answers[k]; return v !== null && v !== undefined && v !== ''; }).length;
  document.getElementById('progress-fill').style.width = Math.round(answered/QUESTIONS.length*100) + '%';
  document.getElementById('progress-text').textContent = 'Atsakyta: ' + answered + ' / ' + QUESTIONS.length;
}

function checkOpen(userVal, q) {
  var uv = userVal.toString().trim().replace(',','.').replace(/\s/g,'').toLowerCase();
  for (var i = 0; i < q.answers.length; i++) {
    if (uv === q.answers[i].toString().trim().replace(',','.').replace(/\s/g,'').toLowerCase()) return q.pts;
  }
  if (q.partial) {
    for (var j = 0; j < q.partial.length; j++) {
      if (uv === q.partial[j].toString().trim().replace(',','.').replace(/\s/g,'').toLowerCase()) return 1;
    }
  }
  return 0;
}

function submitExam() {
  var answered = Object.keys(answers).filter(function(k){ var v = answers[k]; return v !== null && v !== undefined && v !== ''; }).length;
  if (answered < QUESTIONS.length && !confirm('Dar neatsakyta ' + (QUESTIONS.length - answered) + ' klausim\u0173. Pateikti?')) return;
  submitted = true;
  document.getElementById('submit-btn').disabled = true;
  earnedPts = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    if (q.type === 'mcq') {
      var sel = answers[qi];
      for (var oi = 0; oi < q.options.length; oi++) {
        var el = document.getElementById('opt-'+qi+'-'+oi);
        el.className = 'opt';
        if (oi === q.correct) el.className += (sel === q.correct && oi === sel) ? ' correct' : ' show-correct';
        if (oi === sel && sel !== q.correct) el.className += ' wrong';
      }
      if (sel === q.correct) earnedPts += q.pts;
    } else {
      var inp = document.getElementById('inp-'+qi);
      inp.disabled = true;
      var userVal = (answers[qi]||'').toString().trim().replace(',','.').replace(/\s/g,'');
      var fb = document.getElementById('fb-'+qi);
      fb.className = 'answer-feedback show';
      var pts = checkOpen(userVal, q);
      earnedPts += pts;
      if (pts === q.pts) {
        inp.className = 'correct-in'; fb.className += ' ok';
        fb.textContent = '\u2713 Teisingai! (' + pts + '/' + q.pts + ' t.)';
      } else if (pts > 0) {
        inp.className = 'partial-in'; fb.className += ' partial';
        fb.textContent = '~ I\u0161 dalies (' + pts + '/' + q.pts + ' t.) \u2014 Teisingas: ' + q.answers[0];
      } else {
        inp.className = 'wrong-in'; fb.className += ' bad';
        fb.textContent = '\u2717 Neteisingai (0/' + q.pts + ' t.) \u2014 Teisingas: ' + q.answers[0];
      }
    }
  }
  showModal();
}

function showModal() {
  var pct = Math.round(earnedPts / totalPts * 100);
  var scoreEl = document.getElementById('modal-pct');
  scoreEl.textContent = earnedPts + '/' + totalPts;
  scoreEl.className = 'modal-pct ' + (pct>=80?'ex':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasimokyti';
  document.getElementById('modal-sub').textContent = 'Surinkai ' + earnedPts + ' i\u0161 ' + totalPts + ' ta\u0161k\u0173 (' + pct + '%)';
  document.getElementById('stat-correct').textContent = earnedPts;
  document.getElementById('stat-wrong').textContent = totalPts - earnedPts;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('modal-bg').className = 'modal-bg open';
}

function closeModal() { document.getElementById('modal-bg').className = 'modal-bg'; }
renderAll();
</script>
</body>
</html>

<head>

  <link rel="stylesheet" href="../../../styles/main.css"/>
  <style>.exam-header{margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--border)}.exam-title{font-size:26px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-0.3px}.exam-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}.exam-meta-item{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:5px}.variant-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-left:10px}.variant-A{background:#dbeafe;color:#1d4ed8}.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);padding:8px 16px;background:var(--bg3);border-radius:var(--radius);margin:20px 0 12px;border-left:3px solid var(--accent)}.progress-bar{height:5px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}.question-text{font-size:15px;color:var(--ink);line-height:1.8;margin-bottom:16px;font-weight:500}.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:0.85em;line-height:1.1}.frac sup{border-bottom:1px solid currentColor;padding:0 2px;font-size:1em}.frac sub{padding:0 2px;font-size:1em}.options{display:flex;flex-direction:column;gap:8px}.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}.option:hover{border-color:var(--accent);background:var(--accent-bg)}.option.selected{border-color:var(--accent);background:var(--accent-bg)}.option.correct{border-color:var(--green);background:var(--green-bg)}.option.wrong{border-color:var(--red);background:var(--red-bg)}.option.show-correct{border-color:var(--green);background:var(--green-bg)}.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}.option.selected .option-letter{background:var(--accent);color:#fff}.option.correct .option-letter{background:var(--green);color:#fff}.option.wrong .option-letter{background:var(--red);color:#fff}.option.show-correct .option-letter{background:var(--green);color:#fff}.option-text{font-size:14px;color:var(--ink2);line-height:1.6}.option.selected .option-text{color:var(--accent)}.option.correct .option-text{color:var(--green)}.option.wrong .option-text{color:var(--red)}.option.show-correct .option-text{color:var(--green)}.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}.submit-btn{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer}.submit-btn:hover{background:#1e40af}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}.answered-count{font-size:13px;color:var(--ink3)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:40px;max-width:520px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}.modal-score{font-size:72px;font-weight:700;line-height:1;margin-bottom:6px}.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}.modal-stats{display:flex;justify-content:center;gap:32px;margin-bottom:24px;padding:18px;background:var(--bg3);border-radius:var(--radius)}.modal-stat-val{font-size:24px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}.modal-btns{display:flex;gap:10px;justify-content:center}.modal-feedback{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:6px}</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <a href="../../../index.html">Matematika 11</a>
        <span class="sep">›</span><span>Trigonometrija</span>
        <span class="sep">›</span><span class="current">Egzaminas 3</span>
      </div>
    </div>
    <div class="page">
      <div class="exam-header">
        <div class="exam-title">Trigonometrija — Egzaminas 3</div>
        <div class="exam-meta">
          <div class="exam-meta-item">30 klausimų</div>
          <div class="exam-meta-item">T1–T5 mišrus</div>
          <div class="exam-meta-item">∼45 min</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="questions"></div>
      <div class="submit-area">
        <button class="submit-btn" id="submit-btn" onclick="submitTest()">Pateikti egzaminą</button>
        <span class="answered-count" id="answered-count">Atsakyta: 0 / 30</span>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-label">Egzamino rezultatas</div>
    <div class="modal-stats">
      <div><div class="modal-stat-val" id="stat-correct"></div><div class="modal-stat-key">Teisingi</div></div>
      <div><div class="modal-stat-val" id="stat-wrong"></div><div class="modal-stat-key">Neteisingi</div></div>
      <div><div class="modal-stat-val" id="stat-pct"></div><div class="modal-stat-key">Rezultatas</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Peržiūrėti atsakymus</button>
      <a href="../../../index.html" class="btn primary" style="text-decoration:none">Visi egzaminai →</a>
    </div>
  </div>
</div>
<script src="../../../js/main.js"></script>
<script>
var QUESTIONS = [{"text": "f(x) = cos x yra lyginė, todėl cos(−x) lygus:", "options": ["−cos x", "cos x", "sin x", "−sin x"], "correct": 1}, {"text": "Išreikšk radianais: −120°", "options": ["−π/3", "−2π/3", "−3π/4", "−5π/6"], "correct": 1}, {"text": "Lygties tg x = −√3 bendrasis sprendinys:", "options": ["x=π/3+πk", "x=−π/3+2πk", "x=−π/3+πk", "x=2π/3+πk"], "correct": 2}, {"text": "f(x) = sin x yra lyginė, nelyginė ar nei viena?", "options": ["Lyginė", "Nelyginė", "Nei lyginė nei nelyginė", "Periodinė bet ne lyginė"], "correct": 1}, {"text": "Žinoma: sin α=3/5, cos α<0. Koks tg α?", "options": ["3/4", "−3/4", "4/3", "−4/3"], "correct": 1}, {"text": "arccos(−√2/2) lygus:", "options": ["π/4", "3π/4", "−π/4", "5π/4"], "correct": 1}, {"text": "Kuriame ketvirtyje yra kampas 19π/6?", "options": ["I", "II", "III", "IV"], "correct": 2}, {"text": "Lygties sin x = √3/2 bendrasis sprendinys:", "options": ["x=π/3+2πk ir x=2π/3+2πk", "x=(−1)ᵏπ/3+πk", "x=±π/3+2πk", "x=π/6+πk"], "correct": 1}, {"text": "f(x) = tg x didėja:", "options": ["Tik I ketvirtyje", "Tik (0;π/2)", "Kiekviename periode", "Tik teigiamoms reikšmėms"], "correct": 2}, {"text": "Apskaičiuok: sin 270° + cos 180°", "options": ["−2", "0", "2", "−1"], "correct": 0}, {"text": "Kokia f(x) = 3cos x reikšmių sritis?", "options": ["[−1;1]", "[0;3]", "[−3;3]", "ℝ"], "correct": 2}, {"text": "Išreikšk laipsniais: 11π/6", "options": ["300°", "315°", "330°", "345°"], "correct": 2}, {"text": "arcsin(sin(5π/6)) lygus:", "options": ["5π/6", "π/6", "−π/6", "−5π/6"], "correct": 1}, {"text": "Nustatyk f(x)=arctan(x−1) apibrėžimo sritį:", "options": ["(0;+∞)", "[0;2]", "ℝ", "(−π/2;π/2)"], "correct": 2}, {"text": "cos(−α) lygus:", "options": ["−cos α", "cos α", "sin α", "−sin α"], "correct": 1}, {"text": "f(x) = cos x mažiausia reikšmė −1 pasiekiama, kai:", "options": ["x=π/2+πk", "x=πk", "x=π+2πk", "x=2πk"], "correct": 2}, {"text": "Žinoma: cos α=0, α∈[0;π]. Koks α?", "options": ["0", "π/4", "π/2", "π"], "correct": 2}, {"text": "cos x < 0, kai x ∈:", "options": ["(π/2+2πk;3π/2+2πk)", "(2πk;π+2πk)", "(−π/2;π/2)", "(πk;π/2+πk)"], "correct": 0}, {"text": "arcsin reikšmių sritis:", "options": ["[−1;1]", "[0;π]", "[−π/2;π/2]", "ℝ"], "correct": 2}, {"text": "Kuriuose ketvirčiuose sin α < 0?", "options": ["I ir II", "II ir III", "III ir IV", "I ir IV"], "correct": 2}, {"text": "arccos(cos(4π/3)) lygus:", "options": ["4π/3", "−4π/3", "2π/3", "−2π/3"], "correct": 2}, {"text": "Apskaičiuok: sin²α + cos²α, kai α = 53°", "options": ["0", "0,5", "1", "2"], "correct": 2}, {"text": "Nustatyk f(x)=arcsin(x²−1) apibrėžimo sritį:", "options": ["[−√2;√2]", "[−1;1]", "[0;√2]", "[−2;0]"], "correct": 0}, {"text": "arctg(−x) lygus:", "options": ["arctg x", "π−arctg x", "−arctg x", "π+arctg x"], "correct": 2}, {"text": "Žinoma: tg α=−4/3, α∈II ketvirtis. Koks cos α?", "options": ["3/5", "−3/5", "4/5", "−4/5"], "correct": 1}, {"text": "Lygties cos x = 0 bendrasis sprendinys:", "options": ["x=πk", "x=π/2+πk", "x=π/2+2πk", "x=2πk"], "correct": 1}, {"text": "Kiek pilnų apsisukimų sudaro kampas 9π?", "options": ["3,5", "4", "4,5", "5"], "correct": 2}, {"text": "arcsin(−x) lygus:", "options": ["arcsin x", "π−arcsin x", "−arcsin x", "π+arcsin x"], "correct": 2}, {"text": "Kuris skaičius negali būti f(x)=sin x reikšmė?", "options": ["−1", "0", "0,999", "1,001"], "correct": 3}, {"text": "Žinoma: sin α = √2/2, cos α < 0. Koks α ketvirtyje?", "options": ["I", "II", "III", "IV"], "correct": 1}];
var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;

function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Uždavinys ' + (qi+1) + ' iš ' + QUESTIONS.length + '</div>';
    html += '<div class="question-text">' + q.text + '</div><div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}

function sel(qi, oi) {
  if (submitted) return; answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if(e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a = answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width = (a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent = 'Atsakyta: '+a+' / '+QUESTIONS.length;
}

function submitTest() {
  var a = answers.filter(function(x){return x!==null;}).length;
  if (a < QUESTIONS.length && !confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?')) return;
  submitted = true; document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var s = answers[qi]; if (s===q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-'+qi+'-'+oi); el.classList.remove('selected');
      if (oi===q.correct) el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if (oi===s&&s!==q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent = pct+'%';
  document.getElementById('modal-score').className = 'modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent = correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

renderQuestions();
</script>
</body>
</html>

option.show-correct .option-letter{background:var(--green);color:#fff}.option-text{font-size:14px;color:var(--ink2);line-height:1.5}.option.selected .option-text{color:var(--accent)}.option.correct .option-text{color:var(--green)}.option.wrong .option-text{color:var(--red)}.option.show-correct .option-text{color:var(--green)}.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}.submit-btn{padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}.submit-btn:hover{background:#1e40af}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}.answered-count{font-size:13px;color:var(--ink3)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}.modal-btns{display:flex;gap:10px;justify-content:center}.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <a href="../../../../index.html">Matematika 11</a>
        <span class="sep">›</span><span>Trigonometrija</span>
        <span class="sep">›</span><span class="current">Teorinis testas 6</span>
      </div>
      <div class="tab-switcher">
        <button class="tab-btn active">Testai</button>
      </div>
    </div>
    <div class="page">
      <div class="test-header">
        <div class="topic-tag">9 skyrius · Teorinis testas 6</div>
        <h1>sin x, cos x, tg x — mišrus</h1>
        <div class="test-meta">
          <div class="test-meta-item">📝 10 klausimų</div>
          <div class="test-meta-item">📚 T3 · T4 · T5</div>
          <div class="test-meta-item">✅ Atsakymas matomas po pateikimo</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="questions"></div>
      <div class="submit-area">
        <button class="submit-btn" id="submit-btn" onclick="submitTest()">Pateikti testą</button>
        <span class="answered-count" id="answered-count">Atsakyta: 0 / 10</span>

</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-label">Testo rezultatas</div>
    <div class="modal-stats">
      <div><div class="modal-stat-val" id="stat-correct"></div><div class="modal-stat-key">Teisingi</div></div>
      <div><div class="modal-stat-val" id="stat-wrong"></div><div class="modal-stat-key">Neteisingi</div></div>
      <div><div class="modal-stat-val" id="stat-pct"></div><div class="modal-stat-key">Rezultatas</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Peržiūrėti atsakymus</button>
      <a href="../../skyriaus-testai/index.html" class="btn primary" style="text-decoration:none">Skyriaus testai →</a>
    </div>
  </div>
</div>
<script src="../../../../js/main.js"></script>
<script>var QUESTIONS=[{"text": "arcsin(sin π/3) lygus:", "options": ["2π/3", "π/3", "−π/3", "π"], "correct": 1}, {"text": "arccos(cos(3π/4)) lygus:", "options": ["π/4", "−3π/4", "3π/4", "5π/4"], "correct": 2}, {"text": "f(x) = cos x mažėja intervale:", "options": ["(−π + 2πk; 2πk)", "(2πk; π + 2πk)", "(π/2 + πk; 3π/2 + πk)", "(−π/2; π/2)"], "correct": 1}, {"text": "Kai lygtis sin x = a neturi realių sprendinių?", "options": ["Kai a = 0", "Kai a = 1", "Kai |a| > 1", "Kai a < 0"], "correct": 2}, {"text": "arctg(−x) lygus:", "options": ["arctg x", "π − arctg x", "−arctg x", "π + arctg x"], "correct": 2}, {"text": "Funkcija g(x) = arccos x yra:", "options": ["Lyginė", "Nelyginė", "Nei lyginė, nei nelyginė", "Periodinė"], "correct": 2}, {"text": "f(x) = tg x didėja:", "options": ["Tik I ketvirtyje", "Tik (0; π/2)", "Visame apibrėžimo srityje kiekviename periode", "Tik teigiamoms x reikšmėms"], "correct": 2}, {"text": "cos x < 0, kai x ∈:", "options": ["(π/2 + 2πk; 3π/2 + 2πk)", "(2πk; π + 2πk)", "(−π/2; π/2)", "(πk; π/2 + πk)"], "correct": 0}, {"text": "arcsin x reikšmių sritis yra:", "options": ["[−1; 1]", "[0; π]", "[−π/2; π/2]", "ℝ"], "correct": 2}, {"text": "f(x) = sin x mažėja intervale:", "options": ["(−π/2 + 2πk; π/2 + 2πk)", "(π/2 + 2πk; 3π/2 + 2πk)", "(0; π)", "(π; 2π)"], "correct": 1}];

var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;
function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Klausimas ' + (qi+1) + ' iš ' + QUESTIONS.length + '</div>';
    html += '<div class="question-text">' + q.text + '</div><div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}
function sel(qi, oi) {
  if (submitted) return; answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if(e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a = answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width = (a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent = 'Atsakyta: '+a+' / '+QUESTIONS.length;
}
function submitTest() {
  var a = answers.filter(function(x){return x!==null;}).length;
  if (a < QUESTIONS.length && !confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?')) return;
  submitted = true; document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var s = answers[qi]; if (s===q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-'+qi+'-'+oi); el.classList.remove('selected');
      if (oi===q.correct) el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if (oi===s&&s!==q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent = pct+'%';
  document.getElementById('modal-score').className = 'modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent = correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
renderQuestions();

</script>
</body>
</html>

  <link rel="stylesheet" href="../../../../styles/main.css"/>
  <style>body{margin:0;font-family:'Segoe UI',system-ui,sans-serif}
.exam-top{border-bottom:3px solid #1d4ed8;padding-bottom:20px;margin-bottom:32px}
.exam-top h1{font-size:22px;font-weight:700;color:#1a1a2e;margin:0 0 6px}
.exam-top .meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.exam-top .meta span{font-size:13px;color:#555;background:#f1f5f9;padding:4px 10px;border-radius:20px}
.hard-badge{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.progress-wrap{margin-bottom:28px}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1d4ed8;border-radius:3px;transition:width .3s;width:0%}
.progress-text{font-size:12px;color:#64748b;margin-top:6px;text-align:right}
.q-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.q-num{font-size:13px;font-weight:700;color:#64748b;letter-spacing:0.05em}
.q-pts{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
.q-pts.two{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.q-text{font-size:15px;color:#1a1a2e;line-height:1.75;margin-bottom:6px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.opt{display:flex;align-items:center;gap:12px;padding:11px 16px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;background:#fff;user-select:none}
.opt:hover{border-color:#1d4ed8;background:#eff6ff}
.opt.selected{border-color:#1d4ed8;background:#eff6ff}
.opt.correct{border-color:#16a34a;background:#f0fdf4}
.opt.wrong{border-color:#dc2626;background:#fef2f2}
.opt.show-correct{border-color:#16a34a;background:#f0fdf4}
.opt-letter{width:30px;height:30px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#475569;flex-shrink:0}
.opt.selected .opt-letter{background:#1d4ed8;color:#fff}
.opt.correct .opt-letter{background:#16a34a;color:#fff}
.opt.wrong .opt-letter{background:#dc2626;color:#fff}
.opt.show-correct .opt-letter{background:#16a34a;color:#fff}
.opt-text{font-size:14px;color:#334155;line-height:1.5}
.sym-bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:10px;margin-bottom:4px}
.sym-label{font-size:11px;color:#94a3b8}
.sym-btn{padding:3px 9px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:5px;font-size:14px;cursor:pointer;color:#334155;font-family:inherit}
.sym-btn:hover{background:#dbeafe;border-color:#1d4ed8;color:#1d4ed8}
.sym-btn.ok{background:#dcfce7;border-color:#16a34a;color:#16a34a}
.open-wrap input{margin-top:6px;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;font-family:inherit;width:240px;outline:none;transition:border .12s}
.open-wrap input:focus{border-color:#1d4ed8}
.open-wrap input.ci{border-color:#16a34a;background:#f0fdf4;color:#16a34a;font-weight:600}
.open-wrap input.wi{border-color:#dc2626;background:#fef2f2;color:#dc2626}
.fb{font-size:13px;font-weight:600;margin-top:6px;display:none}
.fb.show{display:block}
.fb.ok{color:#16a34a}
.fb.bad{color:#dc2626}
.submit-row{margin-top:32px;padding-top:24px;border-top:2px solid #e2e8f0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.sub-btn{padding:13px 36px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.sub-btn:disabled{background:#94a3b8;cursor:not-allowed}
.ai{font-size:13px;color:#64748b}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:44px 48px;max-width:540px;width:92%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.mp{font-size:80px;font-weight:800;line-height:1;margin-bottom:4px}
.mp.ex{color:#16a34a}.mp.good{color:#1d4ed8}.mp.poor{color:#dc2626}
.mf{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.ms{font-size:14px;color:#64748b;margin-bottom:24px}
.mst{display:flex;justify-content:center;gap:32px;padding:20px;background:#f8fafc;border-radius:10px;margin-bottom:24px}
.msv{font-size:26px;font-weight:700;color:#1a1a2e}
.msk{font-size:11px;color:#94a3b8;margin-top:2px;text-transform:uppercase}
.mbtns{display:flex;gap:10px;justify-content:center}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#334155}
.btn.p{background:#1d4ed8;color:#fff;border-color:#1d4ed8}</style>

<body>
<div class="layout">

        <h1>Lygtys ir nelygybės &#8212; VBE variantas 1 (&#8764;45 min)</h1>
        <div class="meta">
          <span>&#8764;30 ta&#353;k&#371;</span>
          <span>T1 &#183; T2 &#183; T3 &#183; T4 &#183; T5 &#183; T6</span>

<script src="../../../../js/main.js"></script>
<script>var QUESTIONS=[{"type": "mcq", "pts": 1, "text": "Kuri x reik\u0161m\u0117 yra lygties (x\u00b2 \u2212 16) / (x \u2212 4) = 0 sprendinys?", "options": ["x = 4", "x = \u22124", "x = 4 ir x = \u22124", "Lygtis sprendini\u0173 neturi"], "correct": 1}, {"type": "open", "pts": 2, "text": "I\u0161spr\u0119skite lygt\u012f: 2x/(x + 1) \u2212 4/(x + 1) = 0. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite sprendini\u0173)</span>", "answer": "2", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Lygties x\u2074 \u2212 8x\u00b2 + 16 = 0 sprendiniai yra:", "options": ["x = \u00b12", "x = \u00b12 (du dvigubi sprendiniai)", "x = \u00b12 ir x = \u00b11", "x = 4 ir x = \u22124"], "correct": 1}, {"type": "open", "pts": 2, "text": "I\u0161spr\u0119skite lygt\u012f: x\u00b3 \u2212 5x\u00b2 + 4x = 0. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite sprendinius atskiriant kableliu)</span>", "answer": "0, 1, 4", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Lygties \u221a(4x \u2212 3) = x sprendiniai:", "options": ["tik x = 3", "x = 1 ir x = 3", "tik x = 1", "Sprendini\u0173 n\u0117ra"], "correct": 1}, {"type": "open", "pts": 2, "text": "I\u0161spr\u0119skite lygt\u012f: |2x \u2212 8| = x + 1. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite sprendinius atskiriant kableliu)</span>", "answer": "7/3, 9", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Kvadratin\u0117s lygties x\u00b2 \u2212 9x + 20 = 0 sprendiniai pagal Vjeto formules:", "options": ["x\u2081 = 4, x\u2082 = 5", "x\u2081 = \u22124, x\u2082 = \u22125", "x\u2081 = 2, x\u2082 = 10", "x\u2081 = 1, x\u2082 = 20"], "correct": 0}, {"type": "open", "pts": 2, "text": "Lygties x\u00b2 + px + 18 = 0 vienas sprendinys x\u2081 = \u22126. Raskite p ir x\u2082. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite formatu p=..., x\u2082=...)</span>", "answer": "p=9, x\u2082=-3", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Nelygyb\u0117s x\u00b2 \u2212 7x + 10 \u2264 0 sprendiniai:", "options": ["x \u2208 [2; 5]", "x \u2208 (\u2212\u221e; 2] \u222a [5; +\u221e)", "x \u2208 (2; 5)", "x \u2208 [\u22125; \u22122]"], "correct": 0}, {"type": "open", "pts": 2, "text": "I\u0161spr\u0119skite nelygyb\u0119: (x + 2) / (x \u2212 3) \u2265 0. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite atsakym\u0105, pvz. x\u2208(-\u221e;-2]\u222a(3;+\u221e))</span>", "answer": "x\u2208(\u2212\u221e;\u22122]\u222a(3;+\u221e)", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Su kuriomis m reik\u0161m\u0117mis lygtis x\u00b2 \u2212 mx + 4 = 0 turi du skirtingus sprendinius?", "options": ["m \u2208 (\u22124; 4)", "m \u2208 (\u2212\u221e; \u22124) \u222a (4; +\u221e)", "m \u2208 [\u22124; 4]", "m = \u00b14"], "correct": 1}, {"type": "open", "pts": 2, "text": "I\u0161spr\u0119skite nelygybi\u0173 sistem\u0105: { x\u00b2 \u2212 2x \u2212 3 \u2264 0; x + 1 &gt; 0 }. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite atsakym\u0105, pvz. x\u2208(-1;3])</span>", "answer": "x\u2208(\u22121;3]", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Nelygyb\u0117s |3x \u2212 3| \u2264 9 sprendiniai:", "options": ["x \u2208 [\u22122; 4]", "x \u2208 (\u2212\u221e; \u22122] \u222a [4; +\u221e)", "x \u2208 (\u22122; 4)", "x \u2208 [0; 6]"], "correct": 0}, {"type": "open", "pts": 2, "text": "I\u0161spr\u0119skite dvigub\u0105j\u0105 nelygyb\u0119: \u22125 \u2264 3 \u2212 2x &lt; 9. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite atsakym\u0105, pvz. x\u2208(-3;4])</span>", "answer": "x\u2208(\u22123;4]", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "I\u0161 dviej\u0173 miesteli\u0173, tarp kuri\u0173 90 km, vienu metu i\u0161va\u017eiavo du automobiliai vienas kito link. Pirmojo greitis 60 km/h, antrojo \u2014 30 km/h. Po kiek valand\u0173 jie susitiks?", "options": ["0,5 h", "1 h", "1,5 h", "2 h"], "correct": 1}, {"type": "open", "pts": 2, "text": "Pirmas siurblys rezervuar\u0105 u\u017epildo per 6 valandas, antras \u2014 per 12 valandas. Kiek valand\u0173 jiems reik\u0117s u\u017epildyti rezervuar\u0105 dirbant kartu? <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite skai\u010di\u0173)</span>", "answer": "4", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Dvi\u017eenklio skai\u010diaus skaitmen\u0173 suma 12. Apkeit\u0119 skaitmenimis vietomis gauname skai\u010di\u0173 54 didesn\u012f. Koks pradinis skai\u010dius?", "options": ["39", "48", "57", "93"], "correct": 0}, {"type": "open", "pts": 2, "text": "Sta\u010diakampio plotas 84 cm\u00b2, o perimetras 38 cm. Raskite kra\u0161tines. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite formatu a cm ir b cm)</span>", "answer": "7 cm ir 12 cm", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Nelygyb\u0117 x(x \u2212 5)(x + 2) &gt; 0 teisinga:", "options": ["x \u2208 (\u22122; 0) \u222a (5; +\u221e)", "x \u2208 (0; 5)", "x \u2208 (\u2212\u221e; \u22122) \u222a (0; 5)", "x \u2208 (\u22122; 5)"], "correct": 0}, {"type": "open", "pts": 2, "text": "Du darbininkai kartu darb\u0105 atlikt\u0173 per 8 dienas. Pirmasis \u0161\u012f darb\u0105 atlikt\u0173 per 12 dien\u0173 vienas. Per kiek dien\u0173 atlikt\u0173 antrasis? <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(\u012era\u0161ykite skai\u010di\u0173)</span>", "answer": "24", "tolerance": 0}];var MAX_PTS=30;
var QS=QUESTIONS;var ans=new Array(QS.length).fill(null);var done=false;
var MP=MAX_PTS;
var SYMS=["√","²","³","⁴","≥","≤","≠","∞","∪","∩","±"];
var lastInp=null;var symClick=false;
document.addEventListener('mousedown',function(e){if(e.target.classList.contains('sym-btn')){symClick=true;e.preventDefault();}});
document.addEventListener('click',function(e){
  if(e.target.classList.contains('sym-btn')){
    var sym=SYMS[parseInt(e.target.getAttribute('data-i'))];
    var inp=lastInp;
    if(inp&&!inp.disabled){
      var p=inp.selectionStart!=null?inp.selectionStart:inp.value.length;
      inp.value=inp.value.slice(0,p)+sym+inp.value.slice(p);
      inp.focus({preventScroll:true});
      inp.selectionStart=inp.selectionEnd=p+sym.length;
      inp.dispatchEvent(new Event('input',{bubbles:true}));
    }
    e.target.classList.add('ok');
    setTimeout(function(){e.target.classList.remove('ok');symClick=false;},500);
  }
});
document.addEventListener('focusin',function(e){if(e.target.matches('.open-wrap input')&&!symClick)lastInp=e.target;});
function render(){
  var L=['A','B','C','D'];
  var sb='<div class="sym-bar"><span class="sym-label">Kopijuok:&nbsp;</span>';
  var sl=["√","²","³","⁴","≥","≤","≠","∞","∪","∩","±"];
  for(var si=0;si<sl.length;si++)sb+='<button class="sym-btn" data-i="'+si+'">'+sl[si]+'</button>';
  sb+='</div>';
  var h='';
  for(var qi=0;qi<QS.length;qi++){
    var q=QS[qi];var pc=q.pts===2?'two':'';
    h+='<div class="q-card"><div class="q-header"><span class="q-num">KLAUSIMAS '+(qi+1)+' IŠ '+QS.length+'</span>';
    h+='<span class="q-pts '+pc+'">'+q.pts+(q.pts===1?' taškas':' taškai')+'</span></div>';
    h+='<div class="q-text">'+q.text+'</div>';
    if(q.type==='mcq'){
      h+='<div class="options">';
      for(var oi=0;oi<q.options.length;oi++){
        h+='<div class="opt" id="o'+qi+'x'+oi+'" onclick="pick('+qi+','+oi+')"><div class="opt-letter">'+L[oi]+'</div><div class="opt-text">'+q.options[oi]+'</div></div>';
      }
      h+='</div>';
    }else{
      h+=sb;
      h+='<div class="open-wrap"><input type="text" id="i'+qi+'" oninput="typed('+qi+')" placeholder="Įrašykite atsakymą"></div>';
      h+='<div class="fb" id="f'+qi+'"></div>';
    }
    h+='</div>';
  }
  document.getElementById('qs').innerHTML=h;
  document.getElementById('pt').textContent='Atsakyta: 0 / '+QS.length;
}
function pick(qi,oi){if(done)return;ans[qi]=oi;for(var i=0;i<4;i++){var e=document.getElementById('o'+qi+'x'+i);if(e)e.classList.remove('selected');}document.getElementById('o'+qi+'x'+oi).classList.add('selected');upd();}
function typed(qi){if(done)return;var v=document.getElementById('i'+qi).value.trim();ans[qi]=v||null;upd();}
function upd(){var n=ans.filter(function(x){return x!==null;}).length;document.getElementById('pf').style.width=(n/QS.length*100)+'%';document.getElementById('pt').textContent='Atsakyta: '+n+' / '+QS.length;document.getElementById('ai').textContent='Atsakyta: '+n+' / '+QS.length;}
function chk(v,a,tol){if(!v)return false;var vv=v.trim().replace(',','.').toLowerCase();var aa=String(a).trim().replace(',','.').toLowerCase();if(vv===aa)return true;var nv=parseFloat(vv),na=parseFloat(aa);if(!isNaN(nv)&&!isNaN(na)&&Math.abs(nv-na)<=(tol||0.01))return true;return false;}
function submit(){var n=ans.filter(function(x){return x!==null;}).length;if(n<QS.length&&!confirm('Dar neatsakyta '+(QS.length-n)+'. Pateikti?'))return;done=true;document.getElementById('sb').disabled=true;var pts=0;for(var qi=0;qi<QS.length;qi++){var q=QS[qi];var s=ans[qi];if(q.type==='mcq'){var ok=(s===q.correct);if(ok)pts+=q.pts;for(var oi=0;oi<q.options.length;oi++){var el=document.getElementById('o'+qi+'x'+oi);el.classList.remove('selected');if(oi===q.correct)el.classList.add(ok&&oi===s?'correct':'show-correct');if(oi===s&&!ok)el.classList.add('wrong');}}else{var inp=document.getElementById('i'+qi);var fb=document.getElementById('f'+qi);var ok2=chk(s,q.answer,q.tolerance);if(ok2){pts+=q.pts;inp.classList.add('ci');fb.textContent='Teisingai';fb.className='fb show ok';}else{inp.classList.add('wi');fb.textContent='Teisingas atsakymas: '+q.answer;fb.className='fb show bad';}inp.disabled=true;}}var pct=Math.round(pts/MP*100);document.getElementById('mpct').textContent=pct+'%';document.getElementById('mpct').className='mp '+(pct>=80?'ex':pct>=50?'good':'poor');document.getElementById('mf').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasirengimo';document.getElementById('ms').textContent='Surinkta: '+pts+' iš '+MP+' taškų';document.getElementById('sc').textContent=pts;document.getElementById('sw').textContent=MP-pts;document.getElementById('sp').textContent=pct+'%';document.getElementById('mbg').classList.add('open');}
function closeM(){document.getElementById('mbg').classList.remove('open');}
render();</script>

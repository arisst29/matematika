<script>var QUESTIONS=[{"text": "I\u0161spr\u0119skite lygt\u012f: (x\u00b2 \u2212 9) / (x + 3) = 0.", "options": ["x = 3 ir x = \u22123", "x = 3", "x = \u22123", "Sprendini\u0173 n\u0117ra"], "correct": 1}, {"text": "I\u0161spr\u0119skite lygt\u012f: x\u00b3 + 4x\u00b2 = 0.", "options": ["x = 0", "x = \u22124", "x = 0 ir x = \u22124", "x = 4"], "correct": 2}, {"text": "I\u0161spr\u0119skite lygt\u012f: (x\u00b2 \u2212 3)\u00b2 = 4.", "options": ["x = \u00b11", "x = \u00b1\u221a5", "x = \u00b11 ir x = \u00b1\u221a5", "x = \u00b12"], "correct": 2}, {"text": "I\u0161spr\u0119skite lygt\u012f: \u221a(3x \u2212 2) = 4.", "options": ["x = 6", "x = 2", "x = 3", "x = 18"], "correct": 0}, {"text": "I\u0161spr\u0119skite lygt\u012f: |2x + 4| = 10.", "options": ["x = 3", "x = \u22127", "x = 3 ir x = \u22127", "x = 7 ir x = \u22123"], "correct": 2}, {"text": "Pagal Vjeto formules raskite lygties x\u00b2 + x \u2212 12 = 0 sprendinius.", "options": ["x\u2081 = 3, x\u2082 = \u22124", "x\u2081 = \u22123, x\u2082 = 4", "x\u2081 = 4, x\u2082 = \u22123", "x\u2081 = 6, x\u2082 = \u22122"], "correct": 0}, {"text": "Sta\u010diakampio perimetras 32 cm, o plotas 60 cm\u00b2. Kokios jo kra\u0161tin\u0117s?", "options": ["6 cm ir 10 cm", "4 cm ir 15 cm", "8 cm ir 8 cm", "5 cm ir 12 cm"], "correct": 0}, {"text": "I\u0161spr\u0119skite nelygyb\u0119: x\u00b2 + 2x \u2212 8 \u2265 0.", "options": ["x \u2208 [\u22124; 2]", "x \u2208 (\u2212\u221e; \u22124] \u222a [2; +\u221e)", "x \u2208 (\u22124; 2)", "x \u2208 [\u22122; 4]"], "correct": 1}, {"text": "I\u0161spr\u0119skite nelygyb\u0119: (x + 5) / (x \u2212 2) \u2264 0.", "options": ["x \u2208 [\u22125; 2)", "x \u2208 (\u2212\u221e; \u22125] \u222a (2; +\u221e)", "x \u2208 (\u22125; 2)", "x \u2208 [\u22125; 2]"], "correct": 0}, {"text": "Su kuriomis m reik\u0161m\u0117mis lygtis x\u00b2 + 2x + m = 0 turi du skirtingus reali\u0173j\u0173 sprendini\u0173?", "options": ["m &lt; 1", "m &gt; 1", "m \u2264 1", "m = 1"], "correct": 0}, {"text": "I\u0161spr\u0119skite nelygybi\u0173 sistem\u0105: { x\u00b2 \u2212 4 &gt; 0;  x &lt; 3 }.", "options": ["x \u2208 (\u2212\u221e; \u22122) \u222a (2; 3)", "x \u2208 (\u22122; 2)", "x \u2208 (\u2212\u221e; \u22122) \u222a (2; +\u221e)", "x \u2208 (2; 3)"], "correct": 0}, {"text": "I\u0161spr\u0119skite dvigub\u0105j\u0105 nelygyb\u0119: 1 \u2264 3x \u2212 2 &lt; 7.", "options": ["x \u2208 [1; 3)", "x \u2208 (1; 3]", "x \u2208 [1; 3]", "x \u2208 (1; 3)"], "correct": 0}, {"text": "I\u0161spr\u0119skite nelygyb\u0119: |2x + 1| \u2265 5.", "options": ["x \u2208 (\u2212\u221e; \u22123] \u222a [2; +\u221e)", "x \u2208 [\u22123; 2]", "x \u2208 (\u22122; 3)", "x \u2208 (\u2212\u221e; \u22122] \u222a [3; +\u221e)"], "correct": 0}, {"text": "Trauki nys ir automobilis vienu metu i\u0161va\u017eiavo i\u0161 to paties ta\u0161ko priesingomis kryptimis. Traukinio greitis 80 km/h, automobilio \u2014 50 km/h. Po kiek valand\u0173 j\u0173 tarpusavio atstumas bus 390 km?", "options": ["2 h", "2,5 h", "3 h", "4 h"], "correct": 2}, {"text": "Pirmasis darbininkas darb\u0105 atlikt\u0173 per 10 dien\u0173, antrasis \u2014 per 15 dien\u0173. Per kiek dien\u0173 jie darb\u0105 atlikt\u0173 dirbdami kartu?", "options": ["4 d.", "5 d.", "6 d.", "8 d."], "correct": 2}, {"text": "Dvi\u017eenklio skai\u010diaus skaitmen\u0173 suma lygi 11. Pradinis skai\u010dius yra 27 didesnis nei skai\u010dius, gautas apkeit\u0119 skaitmenimis vietomis. Koks pradinis skai\u010dius?", "options": ["47", "74", "56", "65"], "correct": 1}, {"text": "Lygties x\u00b2 + px \u2212 15 = 0 vienas sprendinys yra x\u2081 = 5. Raskite kit\u0105 sprendini x\u2082 ir koeficient\u0105 p.", "options": ["x\u2082 = \u22123, p = \u22122", "x\u2082 = 3, p = 2", "x\u2082 = \u22123, p = 2", "x\u2082 = 3, p = \u22122"], "correct": 0}, {"text": "I\u0161spr\u0119skite lygt\u012f: \u221a(2x + 3) = x.", "options": ["x = 3", "x = \u22121", "x = 3 ir x = \u22121", "x = 1"], "correct": 0}, {"text": "I\u0161spr\u0119skite lygt\u012f: 2/(x + 1) + 1/(x \u2212 1) = 0.", "options": ["x = 1/3", "x = \u22121/3", "x = 1", "x = \u22121"], "correct": 0}, {"text": "I\u0161spr\u0119skite nelygyb\u0119: x\u00b2(x \u2212 3) &lt; 0.", "options": ["x \u2208 (\u2212\u221e; 3)", "x \u2208 (0; 3)", "x \u2208 (\u2212\u221e; 0) \u222a (0; 3)", "x \u2208 (\u2212\u221e; 3) \\ {0}"], "correct": 3}];
var QS=QUESTIONS;var ans=new Array(QS.length).fill(null);var done=false;
function render(){var L=['A','B','C','D'];var h='';for(var qi=0;qi<QS.length;qi++){var q=QS[qi];h+='<div class="q-card"><div class="q-num">Uždavinys '+(qi+1)+' iš '+QS.length+'</div><div class="q-text">'+q.text+'</div><div class="options">';for(var oi=0;oi<q.options.length;oi++){h+='<div class="opt" id="o'+qi+'x'+oi+'" onclick="pick('+qi+','+oi+')"><div class="opt-l">'+L[oi]+'</div><div class="opt-t">'+q.options[oi]+'</div></div>';}h+='</div></div>';}document.getElementById('qs').innerHTML=h;upd();}
function pick(qi,oi){if(done)return;ans[qi]=oi;for(var i=0;i<4;i++){var e=document.getElementById('o'+qi+'x'+i);if(e)e.classList.remove('selected');}document.getElementById('o'+qi+'x'+oi).classList.add('selected');upd();}
function upd(){var n=ans.filter(function(x){return x!==null;}).length;document.getElementById('pf').style.width=(n/QS.length*100)+'%';document.getElementById('ac').textContent='Atsakyta: '+n+' / '+QS.length;}
function submit(){var n=ans.filter(function(x){return x!==null;}).length;if(n<QS.length&&!confirm('Dar neatsakyta '+(QS.length-n)+'. Pateikti?'))return;done=true;document.getElementById('sb').disabled=true;var c=0;for(var qi=0;qi<QS.length;qi++){var q=QS[qi];var s=ans[qi];if(s===q.correct)c++;for(var oi=0;oi<q.options.length;oi++){var el=document.getElementById('o'+qi+'x'+oi);el.classList.remove('selected');if(oi===q.correct)el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');if(oi===s&&s!==q.correct)el.classList.add('wrong');}}var pct=Math.round(c/QS.length*100);document.getElementById('mpct').textContent=pct+'%';document.getElementById('mpct').className='mp '+(pct>=80?'ex':pct>=50?'good':'poor');document.getElementById('mf').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasimokyti';document.getElementById('ms').textContent='Surinkta: '+c+' iš '+QS.length;document.getElementById('sc').textContent=c;document.getElementById('sw').textContent=QS.length-c;document.getElementById('sp').textContent=pct+'%';document.getElementById('mbg').classList.add('open');}
function closeM(){document.getElementById('mbg').classList.remove('open');}
render();</script>

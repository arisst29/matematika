function upd(){var n=ans.filter(function(x){return x!==null;}).length;document.getElementById('pf').style.width=(n/QS.length*100)+'%';document.getElementById('pt').textContent='Atsakyta: '+n+' / '+QS.length;document.getElementById('ai').textContent='Atsakyta: '+n+' / '+QS.length;}
function chk(v,a,tol){if(!v)return false;var vv=v.trim().replace(',','.').toLowerCase();var aa=String(a).trim().replace(',','.').toLowerCase();if(vv===aa)return true;var nv=parseFloat(vv),na=parseFloat(aa);if(!isNaN(nv)&&!isNaN(na)&&Math.abs(nv-na)<=(tol||0.01))return true;return false;}
function submit(){var n=ans.filter(function(x){return x!==null;}).length;if(n<QS.length&&!confirm('Dar neatsakyta '+(QS.length-n)+'. Pateikti?'))return;done=true;document.getElementById('sb').disabled=true;var pts=0;for(var qi=0;qi<QS.length;qi++){var q=QS[qi];var s=ans[qi];if(q.type==='mcq'){var ok=(s===q.correct);if(ok)pts+=q.pts;for(var oi=0;oi<q.options.length;oi++){var el=document.getElementById('o'+qi+'x'+oi);el.classList.remove('selected');if(oi===q.correct)el.classList.add(ok&&oi===s?'correct':'show-correct');if(oi===s&&!ok)el.classList.add('wrong');}}else{var fb=document.getElementById('f'+qi);if(q.labels&&q.answers&&q.answers.length>1){var ok2=true;for(var fi=0;fi<q.answers.length;fi++){var inpf=document.getElementById('i'+qi+'_'+fi);if(!chk(Array.isArray(s)?s[fi]:'',q.answers[fi],q.tolerance)){ok2=false;}if(inpf)inpf.disabled=true;}if(ok2){pts+=q.pts;fb.textContent='Teisingai';fb.className='fb show ok';}else{fb.textContent='Teisingas atsakymas: '+q.answers.join(', ');fb.className='fb show bad';}}else{var inp=document.getElementById('i'+qi+'_0');var ok2=chk(Array.isArray(s)?s[0]:s,q.answers?q.answers[0]:q.answer,q.tolerance);if(ok2){pts+=q.pts;if(inp)inp.classList.add('ci');fb.textContent='Teisingai';fb.className='fb show ok';}else{if(inp)inp.classList.add('wi');fb.textContent='Teisingas atsakymas: '+(q.answers?q.answers[0]:q.answer);fb.className='fb show bad';}if(inp)inp.disabled=true;}}}var pct=Math.round(pts/MP*100);document.getElementById('mpct').textContent=pct+'%';document.getElementById('mpct').className='mp '+(pct>=80?'ex':pct>=50?'good':'poor');document.getElementById('mf').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasirengimo';document.getElementById('ms').textContent='Surinkta: '+pts+' iš '+MP+' taškų';document.getElementById('sc').textContent=pts;document.getElementById('sw').textContent=MP-pts;document.getElementById('sp').textContent=pct+'%';document.getElementById('mbg').classList.add('open');}
function closeM(){document.getElementById('mbg').classList.remove('open');}
render();</script>

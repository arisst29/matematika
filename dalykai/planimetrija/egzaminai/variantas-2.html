<!DOCTYPE html>
<html lang="lt">
<head>

  <title>Planimetrija — Variantas 2</title>
  <link rel="stylesheet" href="../../../../../styles/main.css"/>
  <style>
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif}
.exam-top{border-bottom:3px solid #1d4ed8;padding-bottom:20px;margin-bottom:32px}
.exam-top h1{font-size:22px;font-weight:700;color:#1a1a2e;margin:0 0 6px}
.exam-top .meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}
.exam-top .meta span{font-size:13px;color:#555;background:#f1f5f9;padding:4px 10px;border-radius:20px}
.hard-badge{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:0.05em}
.progress-wrap{margin-bottom:28px}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1d4ed8;border-radius:3px;transition:width .3s;width:0%}
.progress-text{font-size:12px;color:#64748b;margin-top:6px;text-align:right}
.q-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.q-num{font-size:13px;font-weight:700;color:#64748b;letter-spacing:0.05em}
.q-pts{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
.q-pts.two{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.q-text{font-size:15px;color:#1a1a2e;line-height:1.75;margin-bottom:6px;font-weight:500}
.q-hint{font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:14px}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:0.85em;line-height:1.1}
.frac sup{border-bottom:1px solid currentColor;padding:0 3px;font-size:1em}
.frac sub{padding:0 3px;font-size:1em}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:11px 16px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;background:#fff;user-select:none}
.opt:hover{border-color:#1d4ed8;background:#eff6ff}
.opt.selected{border-color:#1d4ed8;background:#eff6ff}
.opt.correct{border-color:#16a34a;background:#f0fdf4}
.opt.wrong{border-color:#dc2626;background:#fef2f2}
.opt.show-correct{border-color:#16a34a;background:#f0fdf4}
.opt-letter{width:30px;height:30px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#475569;flex-shrink:0}
.opt.selected .opt-letter{background:#1d4ed8;color:#fff}
.opt.correct .opt-letter{background:#16a34a;color:#fff}
.opt.wrong .opt-letter{background:#dc2626;color:#fff}
.opt.show-correct .opt-letter{background:#16a34a;color:#fff}
.opt-text{font-size:14px;color:#334155;line-height:1.5}
.opt.selected .opt-text{color:#1d4ed8;font-weight:500}
.opt.correct .opt-text{color:#16a34a;font-weight:500}
.opt.wrong .opt-text{color:#dc2626}
.opt.show-correct .opt-text{color:#16a34a;font-weight:500}
.open-answer{margin-top:4px}
.open-input{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.open-input input{padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;font-family:inherit;width:200px;outline:none;transition:border .12s}
.open-input input:focus{border-color:#1d4ed8}
.open-input input.correct-in{border-color:#16a34a;background:#f0fdf4;color:#16a34a;font-weight:600}
.open-input input.wrong-in{border-color:#dc2626;background:#fef2f2;color:#dc2626}
.open-input input.partial-in{border-color:#d97706;background:#fffbeb;color:#d97706}
.answer-feedback{font-size:13px;font-weight:600;margin-top:6px;display:none}
.answer-feedback.show{display:block}
.answer-feedback.ok{color:#16a34a}
.answer-feedback.partial{color:#d97706}
.answer-feedback.bad{color:#dc2626}
.submit-row{margin-top:32px;padding-top:24px;border-top:2px solid #e2e8f0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.btn-submit{padding:13px 36px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .12s}
.btn-submit:hover{background:#1e40af}
.btn-submit:disabled{background:#94a3b8;cursor:not-allowed}
.answered-info{font-size:13px;color:#64748b}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:44px 48px;max-width:540px;width:92%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-pct{font-size:80px;font-weight:800;line-height:1;margin-bottom:4px}
.modal-pct.ex{color:#16a34a}.modal-pct.good{color:#1d4ed8}.modal-pct.poor{color:#dc2626}
.modal-feedback{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.modal-sub{font-size:14px;color:#64748b;margin-bottom:24px}
.modal-stats{display:flex;justify-content:center;gap:32px;padding:20px;background:#f8fafc;border-radius:10px;margin-bottom:24px}
.modal-stat-v{font-size:26px;font-weight:700;color:#1a1a2e}
.modal-stat-k{font-size:11px;color:#94a3b8;margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}
.modal-btns{display:flex;gap:10px;justify-content:center}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#334155}
.btn:hover{background:#f1f5f9}
.btn.primary{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.btn.primary:hover{background:#1e40af}
  </style>
</head>

s": ["25 cm²", "27 cm²", "45 cm²", "30 cm²"], "correct": 1}, {"type": "open", "pts": 2, "text": "Trikampio ABC kraštinės a = 7, b = 15, c = 20. Apskaičiuokite pusperimetrą p ir trikampio plotą. Įrašykite plotą.", "answer": "42", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Trikampyje ABC iš A nubrėžta pusiaukampinė AD. AB = 9, AC = 12, BC = 14. Apskaičiuokite BD.", "options": ["BD = 6", "BD = 7", "BD = 8", "BD = 9"], "correct": 0}, {"type": "open", "pts": 2, "text": "Trikampio ABC kraštinės a = 6, b = 9, c = 11. Apskaičiuokite trikampio plotą. Atsakymą apvalinkite iki šimtųjų.", "answer": "26.98", "tolerance": 0.01}, {"type": "mcq", "pts": 1, "text": "Statusis trikampis ABC (∠C = 90°), AC = 6, BC = 8. Apskaičiuokite apibrėžtojo apskritimo spindulį R ir įbrėžtojo apskritimo spindulį r.", "options": ["R=5, r=2", "R=5, r=3", "R=10, r=2", "R=5, r=4"], "correct": 0}, {"type": "open", "pts": 2, "text": "Trikampyje ABC MN ∥ BC, AM = 4, MB = 6, BC = 25 cm. Apskaičiuokite MN. Įrašykite atsakymą.", "answer": "10", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Trikampio ABC kampas ∠A = 30°, kraštinė BC = a = 9 cm. Apskaičiuokite apibrėžtojo apskritimo spindulį R.", "options": ["R = 9 cm", "R = 4,5 cm", "R = 18 cm", "R = 6 cm"], "correct": 0}, {"type": "open", "pts": 2, "text": "Trikampio kraštinės b = 5, c = 7, kampas ∠A = 120°. Apskaičiuokite kraštinę a. Atsakymą apvalinkite iki šimtųjų.", "answer": "10.44", "tolerance": 0.01}, {"type": "mcq", "pts": 1, "text": "Apskritimo dvi stygos AB ir CD kertasi taške E. AE = 4, EB = 9, CE = 6. Apskaičiuokite ED.", "options": ["ED = 4", "ED = 6", "ED = 7", "ED = 8"], "correct": 1}, {"type": "open", "pts": 2, "text": "Trikampio kraštinės 10, 10, 12. Apskaičiuokite trikampio plotą. Įrašykite atsakymą.", "answer": "48", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Į trikampį ABC įbrėžtas apskritimas su spinduliumi r = 3 cm. Trikampio pusperimetras p = 18 cm. Apskaičiuokite trikampio plotą.", "options": ["S = 54 cm²", "S = 27 cm²", "S = 36 cm²", "S = 45 cm²"], "correct": 0}, {"type": "open", "pts": 2, "text": "Trikampio ABC kraštinės a = 5, b = 7, c = 8. Apskaičiuokite kampą ∠A. Įrašykite atsakymą laipsniais.", "answer": "38", "tolerance": 1}];

var answers = new Array(QUESTIONS.length).fill(null);
var openInputs = {};
var submitted = false;

function renderQuestions() {
  var html = ''; var L = ['A','B','C','D'];
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    var ptsClass = q.pts === 2 ? 'two' : '';
    html += '<div class="q-card"><div class="q-header">';
    html += '<span class="q-num">KLAUSIMAS ' + (qi+1) + ' IŠ ' + QUESTIONS.length + '</span>';
    html += '<span class="q-pts ' + ptsClass + '">' + q.pts + ' ' + (q.pts===1?'taškas':'taškai') + '</span>';
    html += '</div><div class="q-text">' + q.text + '</div>';
    if (q.graph_id) { var g = document.getElementById(q.graph_id); if (g) html += g.innerHTML; }
    if (q.type === 'mcq') {
      html += '<div class="options">';
      for (var oi = 0; oi < q.options.length; oi++) {
        html += '<div class="opt" id="opt-'+qi+'-'+oi+'" onclick="selMcq('+qi+','+oi+')">';
        html += '<div class="opt-letter">'+L[oi]+'</div><div class="opt-text">'+q.options[oi]+'</div></div>';
      }
      html += '</div>';
    } else {
      html += '<div class="open-answer"><div class="open-input">';
      html += '<input type="text" id="inp-'+qi+'" placeholder="Įrašykite atsakymą" oninput="markOpen('+qi+')">';
      html += '</div><div class="answer-feedback" id="fb-'+qi+'"></div></div>';
    }
    html += '</div>';
  }
  document.getElementById('questions').innerHTML = html;
}

function selMcq(qi, oi) {
  if (submitted) return;
  answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if (e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  updateProgress();
}

function markOpen(qi) {
  if (submitted) return;
  var val = document.getElementById('inp-'+qi).value.trim();
  answers[qi] = val !== '' ? val : null;
  updateProgress();
}

function updateProgress() {
  var done = answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress-fill').style.width = (done/QUESTIONS.length*100)+'%';
  document.getElementById('progress-text').textContent = 'Atsakyta: '+done+' / '+QUESTIONS.length;
  document.getElementById('answered-info').textContent = 'Atsakyta: '+done+' / '+QUESTIONS.length;
}

function checkOpen(val, answer, tol) {
  if (!val) return false;
  val = val.trim().replace(',','.');
  answer = String(answer).trim().replace(',','.');
  if (val.toLowerCase() === answer.toLowerCase()) return true;
  var numV = parseFloat(val); var numA = parseFloat(answer);
  if (!isNaN(numV) && !isNaN(numA) && Math.abs(numV-numA) <= (tol||0.01)) return true;
  return false;
}

function submitExam() {
  var done = answers.filter(function(x){return x!==null;}).length;
  if (done < QUESTIONS.length && !confirm('Dar neatsakyta '+(QUESTIONS.length-done)+' klausimai. Pateikti?')) return;
  submitted = true;
  document.getElementById('submit-btn').disabled = true;
  var pts = 0; var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var ok = false;
    if (q.type === 'mcq') {
      ok = answers[qi] === q.correct;
      for (var oi = 0; oi < q.options.length; oi++) {
        var el = document.getElementById('opt-'+qi+'-'+oi);
        if (!el) continue;
        el.classList.remove('selected');
        if (oi === q.correct) el.classList.add(ok && oi===answers[qi] ? 'correct' : 'show-correct');
        if (oi === answers[qi] && !ok) el.classList.add('wrong');
      }
    } else {
      var inp = document.getElementById('inp-'+qi);
      var fb = document.getElementById('fb-'+qi);
      ok = checkOpen(answers[qi], q.answer, q.tolerance);
      if (inp) inp.classList.add(ok ? 'correct-in' : 'wrong-in');
      if (fb) { fb.textContent = ok ? '✓ Teisingai!' : '✗ Teisingas atsakymas: '+q.answer; fb.className = 'answer-feedback show '+(ok?'ok':'bad'); }
    }
    if (ok) { pts += q.pts; correct++; }
  }
  var maxPts = QUESTIONS.reduce(function(s,q){return s+q.pts;},0);
  var pct = Math.round(pts/maxPts*100);
  document.getElementById('modal-pct').textContent = pct+'%';
  document.getElementById('modal-pct').className = 'modal-pct '+(pct>=80?'ex':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasimokyti';
  document.getElementById('modal-sub').textContent = 'Surinkta taškų: '+pts+' iš '+maxPts;
  document.getElementById('m-correct').textContent = correct;
  document.getElementById('m-pts').textContent = pts;
  document.getElementById('m-total').textContent = maxPts;
  document.getElementById('modal-bg').classList.add('open');
}

renderQuestions();

</script>

  <link rel="stylesheet" href="../../../../../../styles/main.css"/>
  <style>.test-header{margin-bottom:28px}.test-header h1{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:6px}
.test-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}.test-meta-item{font-size:12px;color:var(--ink3)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.question-text{font-size:15px;color:var(--ink);line-height:1.75;margin-bottom:16px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}
.option:hover{border-color:var(--accent);background:var(--accent-bg)}
.option.selected{border-color:var(--accent);background:var(--accent-bg)}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.wrong{border-color:var(--red);background:var(--red-bg)}
.option.show-correct{border-color:var(--green);background:var(--green-bg)}
.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}
.option.selected .option-letter{background:var(--accent);color:#fff}
.option.correct .option-letter{background:var(--green);color:#fff}
.option.wrong .option-letter{background:var(--red);color:#fff}
.option.show-correct .option-letter{background:var(--green);color:#fff}
.option-text{font-size:14px;color:var(--ink2);line-height:1.5}
.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}
.submit-btn{padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}
.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}
.answered-count{font-size:13px;color:var(--ink3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center}
.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}
.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}
.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}
.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}
.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}
.v{display:inline-block;position:relative;padding-top:8px;white-space:nowrap}
.vl{font-style:italic;font-weight:600}
.va{position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1}</style>

<script>var QUESTIONS=[{"text": "Taškų A(1; 2) ir B(4; 6) vektoriaus <span class=\"v\"><span class=\"vl\">AB</span><span class=\"va\">&#x2192;</span></span> koordinatės:<div style=\"margin:10px 0 6px;display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px\"><svg viewBox=\"0 0 200 170\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:190px;height:auto\">\n  <defs>\n    <marker id=\"t4ax1\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#374151\"/></marker>\n    <marker id=\"t4mv1\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#1d4ed8\"/></marker>\n  </defs>\n  <line x1=\"10\" y1=\"150\" x2=\"190\" y2=\"150\" stroke=\"#9ca3af\" stroke-width=\"1.4\" marker-end=\"url(#t4ax1)\"/>\n  <line x1=\"30\" y1=\"165\" x2=\"30\" y2=\"10\" stroke=\"#9ca3af\" stroke-width=\"1.4\" marker-end=\"url(#t4ax1)\"/>\n  <text x=\"192\" y=\"154\" font-size=\"10\" fill=\"#6b7280\" font-style=\"italic\">x</text>\n  <text x=\"26\" y=\"9\" font-size=\"10\" fill=\"#6b7280\" font-style=\"italic\">y</text>\n  <text x=\"16\" y=\"163\" font-size=\"9\" fill=\"#6b7280\">O</text>\n  <!-- O=(30,150), scale=20: A(1,2)=(50,110), B(4,6)=(110,30) -->\n  <line x1=\"10\" y1=\"110\" x2=\"190\" y2=\"110\" stroke=\"#f0f0f0\" stroke-width=\"1\"/>\n  <line x1=\"10\" y1=\"70\" x2=\"190\" y2=\"70\" stroke=\"#f0f0f0\" stroke-width=\"1\"/>\n  <line x1=\"70\" y1=\"10\" x2=\"70\" y2=\"160\" stroke=\"#f0f0f0\" stroke-width=\"1\"/>\n  <line x1=\"110\" y1=\"10\" x2=\"110\" y2=\"160\" stroke=\"#f0f0f0\" stroke-width=\"1\"/>\n  <circle cx=\"50\" cy=\"110\" r=\"4\" fill=\"#1d4ed8\"/>\n  <text x=\"32\" y=\"108\" font-size=\"10\" fill=\"#1d4ed8\" font-weight=\"600\">A(1; 2)</text>\n  <circle cx=\"110\" cy=\"30\" r=\"4\" fill=\"#dc2626\"/>\n  <text x=\"114\" y=\"28\" font-size=\"10\" fill=\"#dc2626\" font-weight=\"600\">B(4; 6)</text>\n  <line x1=\"50\" y1=\"110\" x2=\"107\" y2=\"33\" stroke=\"#1d4ed8\" stroke-width=\"2.2\" marker-end=\"url(#t4mv1)\"/>\n  <line x1=\"50\" y1=\"110\" x2=\"110\" y2=\"110\" stroke=\"#9ca3af\" stroke-width=\"1.2\" stroke-dasharray=\"4,3\"/>\n  <line x1=\"110\" y1=\"110\" x2=\"110\" y2=\"36\" stroke=\"#9ca3af\" stroke-width=\"1.2\" stroke-dasharray=\"4,3\"/>\n  <text x=\"76\" y=\"124\" font-size=\"9\" fill=\"#6b7280\">3</text>\n  <text x=\"113\" y=\"73\" font-size=\"9\" fill=\"#6b7280\">4</text>\n</svg></div>", "options": ["(5; 8)", "(3; 4)", "(−3; −4)", "(4; 6)"], "correct": 1}, {"text": "Atkarpos su galais A(2; 4) ir B(8; 2) vidurio taško V koordinatės:", "options": ["(5; 3)", "(6; 6)", "(3; 1)", "(10; 6)"], "correct": 0}, {"text": "Vektoriaus <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (−3; 4) ilgis:", "options": ["1", "5", "7", "√7"], "correct": 1}, {"text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (4; −1), <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (−2; 3). Kokios <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> koordinatės?", "options": ["(2; 2)", "(6; −4)", "(2; −4)", "(−2; 2)"], "correct": 0}, {"text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (2; −4). Kokios 3<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> koordinatės?", "options": ["(6; 12)", "(6; −12)", "(5; −7)", "(−6; 12)"], "correct": 1}, {"text": "Ar vektoriai <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (2; 4) ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (1; 2) kolinearūs? (xₐ·y_b − x_b·yₐ = ?)", "options": ["Ne, nes 2·2 − 1·4 = 0", "Taip, nes 2·2 − 1·4 = 0", "Ne, nes jų ilgiai skirtingi", "Taip, nes koordinatės lygios"], "correct": 1}, {"text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (3; 2), <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (1; −1). Apskaičiuokite <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> · <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", "options": ["1", "5", "−1", "3"], "correct": 0}, {"text": "Ar <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (3; 2) ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (−2; 3) statmeni?<div style=\"margin:10px 0 6px;display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px\"><svg viewBox=\"0 0 180 160\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:170px;height:auto\">\n  <defs>\n    <marker id=\"t4ax2\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#374151\"/></marker>\n    <marker id=\"t4ma\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#1d4ed8\"/></marker>\n    <marker id=\"t4mb\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#dc2626\"/></marker>\n  </defs>\n  <line x1=\"10\" y1=\"100\" x2=\"175\" y2=\"100\" stroke=\"#9ca3af\" stroke-width=\"1.4\" marker-end=\"url(#t4ax2)\"/>\n  <line x1=\"50\" y1=\"150\" x2=\"50\" y2=\"10\" stroke=\"#9ca3af\" stroke-width=\"1.4\" marker-end=\"url(#t4ax2)\"/>\n  <text x=\"177\" y=\"104\" font-size=\"10\" fill=\"#6b7280\" font-style=\"italic\">x</text>\n  <text x=\"46\" y=\"9\" font-size=\"10\" fill=\"#6b7280\" font-style=\"italic\">y</text>\n  <text x=\"36\" y=\"114\" font-size=\"9\" fill=\"#6b7280\">O</text>\n  <!-- O=(50,100), scale=20: a=(3,2)→(110,60), b=(-2,3)→(10,40) -->\n  <line x1=\"50\" y1=\"100\" x2=\"107\" y2=\"62\" stroke=\"#1d4ed8\" stroke-width=\"2.2\" marker-end=\"url(#t4ma)\"/>\n  <line x1=\"50\" y1=\"100\" x2=\"12\" y2=\"42\" stroke=\"#dc2626\" stroke-width=\"2.2\" marker-end=\"url(#t4mb)\"/>\n  <path d=\"M50,100 L62,92 L54,80\" fill=\"none\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n  <text x=\"112\" y=\"60\" font-size=\"10\" fill=\"#1d4ed8\" font-weight=\"600\">a(3; 2)</text>\n  <text x=\"2\" y=\"38\" font-size=\"10\" fill=\"#dc2626\" font-weight=\"600\">b(−2; 3)</text>\n</svg></div>", "options": ["Ne, nes 3·(−2) + 2·3 = 0... Taip!", "Ne, nes ilgiai skirtingi", "Taip, nes 3·(−2) + 2·3 = 0", "Neįmanoma nustatyti"], "correct": 2}, {"text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (0; 5), <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (3; 0). Apskaičiuokite <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> · <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", "options": ["15", "8", "0", "√34"], "correct": 2}, {"text": "Koks kampas tarp <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (1; 0) ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (0; −1)?", "options": ["0°", "45°", "90°", "180°"], "correct": 2}];
var answers=new Array(QUESTIONS.length).fill(null);var submitted=false;
function renderQuestions(){var html='';for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];html+='<div class="question-card"><div class="question-num">Klausimas '+(qi+1)+' iš '+QUESTIONS.length+'</div>';html+='<div class="question-text">'+q.text+'</div>';html+='<div class="options">';var L=['A','B','C','D'];for(var oi=0;oi<q.options.length;oi++){html+='<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';html+='<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';}html+='</div></div>';}document.getElementById('questions').innerHTML=html;}
function sel(qi,oi){if(submitted)return;answers[qi]=oi;for(var i=0;i<4;i++){var e=document.getElementById('opt-'+qi+'-'+i);if(e)e.classList.remove('selected');}document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');var a=answers.filter(function(x){return x!==null;}).length;document.getElementById('progress').style.width=(a/QUESTIONS.length*100)+'%';document.getElementById('answered-count').textContent='Atsakyta: '+a+' / '+QUESTIONS.length;}
function submitTest(){var a=answers.filter(function(x){return x!==null;}).length;if(a<QUESTIONS.length&&!confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?'))return;submitted=true;document.getElementById('submit-btn').disabled=true;var correct=0;for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];var s=answers[qi];if(s===q.correct)correct++;for(var oi=0;oi<q.options.length;oi++){var el=document.getElementById('opt-'+qi+'-'+oi);el.classList.remove('selected');if(oi===q.correct)el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');if(oi===s&&s!==q.correct)el.classList.add('wrong');}}var pct=Math.round(correct/QUESTIONS.length*100);document.getElementById('modal-score').textContent=pct+'%';document.getElementById('modal-score').className='modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');document.getElementById('modal-feedback').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti';document.getElementById('stat-correct').textContent=correct;document.getElementById('stat-wrong').textContent=QUESTIONS.length-correct;document.getElementById('stat-pct').textContent=correct+'/'+QUESTIONS.length;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
renderQuestions();</script>

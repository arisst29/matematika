<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Praktinis testas 1 — Vektoriai</title>
  <link rel="stylesheet" href="../../../../../../styles/main.css"/>
  <style>
.test-header{margin-bottom:28px}.test-header h1{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:6px}
.test-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}.test-meta-item{font-size:12px;color:var(--ink3)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.question-text{font-size:15px;color:var(--ink);line-height:1.75;margin-bottom:16px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}
.option:hover{border-color:var(--accent);background:var(--accent-bg)}
.option.selected{border-color:var(--accent);background:var(--accent-bg)}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.wrong{border-color:var(--red);background:var(--red-bg)}
.option.show-correct{border-color:var(--green);background:var(--green-bg)}
.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}
.option.selected .option-letter{background:var(--accent);color:#fff}
.option.correct .option-letter{background:var(--green);color:#fff}
.option.wrong .option-letter{background:var(--red);color:#fff}
.option.show-correct .option-letter{background:var(--green);color:#fff}
.option-text{font-size:14px;color:var(--ink2);line-height:1.5}
.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}
.submit-btn{padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}
.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}
.answered-count{font-size:13px;color:var(--ink3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center}
.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}
.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}
.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}
.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}
.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .v{display:inline-block;position:relative;padding-top:8px;white-space:nowrap}.vl{font-style:italic;font-weight:600}.va{position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1}
</style>
</head>

<script>
var QUESTIONS = [
  {text: "Stačiakampio ABCD kraštinės: <span class=\"v\"><span class=\"vl\">AB</span><span class=\"va\">&#x2192;</span></span> = 5, <span class=\"v\"><span class=\"vl\">BC</span><span class=\"va\">&#x2192;</span></span> = 12. Apskaičiuokite <span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span> ilgį.<div style=\"margin:10px 0 6px;display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px\">\n<svg viewBox=\"0 0 200 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:190px;height:auto\">\n  <rect x=\"20\" y=\"20\" width=\"160\" height=\"90\" fill=\"#eff6ff\" stroke=\"#94a3b8\" stroke-width=\"1.3\"/>\n  <line x1=\"20\" y1=\"110\" x2=\"177\" y2=\"27\" stroke=\"#dc2626\" stroke-width=\"1.8\" stroke-dasharray=\"6,3\"/>\n  <circle cx=\"20\" cy=\"110\" r=\"2.5\" fill=\"#374151\"/><text x=\"8\" y=\"114\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">A</text>\n  <circle cx=\"180\" cy=\"110\" r=\"2.5\" fill=\"#374151\"/><text x=\"183\" y=\"114\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">B</text>\n  <circle cx=\"180\" cy=\"20\" r=\"2.5\" fill=\"#374151\"/><text x=\"183\" y=\"18\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">C</text>\n  <circle cx=\"20\" cy=\"20\" r=\"2.5\" fill=\"#374151\"/><text x=\"6\" y=\"18\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">D</text>\n  <path d=\"M20,110 L20,100 L30,100\" fill=\"none\" stroke=\"#374151\" stroke-width=\"1.3\"/>\n  <text x=\"72\" y=\"108\" font-size=\"10\" fill=\"#1d4ed8\" font-weight=\"500\">5</text>\n  <text x=\"6\" y=\"68\" font-size=\"10\" fill=\"#15803d\" font-weight=\"500\">12</text>\n</svg></div>", options: ["5", "13", "17", "√28"], correct: 1},
  {text: "Trikampyje ABC: <span class=\"v\"><span class=\"vl\">AB</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>, <span class=\"v\"><span class=\"vl\">BC</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>. Išreikškite vektorių <span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span> per <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.<div style=\"margin:10px 0 6px;display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px\">\n<svg viewBox=\"0 0 200 140\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:190px;height:auto\">\n  <polygon points=\"20,120 180,120 100,20\" fill=\"#f0fdf4\" stroke=\"#94a3b8\" stroke-width=\"1.3\"/>\n  <circle cx=\"20\" cy=\"120\" r=\"2.5\" fill=\"#374151\"/><text x=\"8\" y=\"124\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">A</text>\n  <circle cx=\"180\" cy=\"120\" r=\"2.5\" fill=\"#374151\"/><text x=\"183\" y=\"124\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">B</text>\n  <circle cx=\"100\" cy=\"20\" r=\"2.5\" fill=\"#374151\"/><text x=\"97\" y=\"13\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">C</text>\n</svg></div>", options: ["<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>", "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "−<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>"], correct: 2},
  {text: "Lygiagretainyje ABCD: <span class=\"v\"><span class=\"vl\">AB</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>, <span class=\"v\"><span class=\"vl\">AD</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>. Išreikškite įstrižainės <span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span> per <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.<div style=\"margin:10px 0 6px;display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px\">\n<svg viewBox=\"0 0 200 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:190px;height:auto\">\n  <polygon points=\"20,110 160,110 160,30 20,30\" fill=\"#eff4ff\" stroke=\"#94a3b8\" stroke-width=\"1.3\"/>\n  <line x1=\"20\" y1=\"110\" x2=\"157\" y2=\"33\" stroke=\"#dc2626\" stroke-width=\"1.8\" stroke-dasharray=\"6,3\"/>\n  <circle cx=\"20\" cy=\"110\" r=\"2.5\" fill=\"#374151\"/><text x=\"6\" y=\"114\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">A</text>\n  <circle cx=\"160\" cy=\"110\" r=\"2.5\" fill=\"#374151\"/><text x=\"163\" y=\"114\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">B</text>\n  <circle cx=\"160\" cy=\"30\" r=\"2.5\" fill=\"#374151\"/><text x=\"163\" y=\"28\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">C</text>\n  <circle cx=\"20\" cy=\"30\" r=\"2.5\" fill=\"#374151\"/><text x=\"6\" y=\"28\" font-size=\"11\" fill=\"#374151\" font-weight=\"600\">D</text>\n</svg></div>", options: ["<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>", "−<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>"], correct: 3},
  {text: "Yra žinoma: <span class=\"v\"><span class=\"vl\">x</span><span class=\"va\">&#x2192;</span></span> = 2<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>, <span class=\"v\"><span class=\"vl\">y</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>. Išreikškite 3<span class=\"v\"><span class=\"vl\">x</span><span class=\"va\">&#x2192;</span></span> + 2<span class=\"v\"><span class=\"vl\">y</span><span class=\"va\">&#x2192;</span></span> per <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", options: ["8<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "7<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "8<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "7<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + 5<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>"], correct: 0},
  {text: "Vektoriai <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> yra kolinearūs. |<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>| = 6, <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = −2<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>. Koks |<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>|?", options: ["2", "8", "12", "3"], correct: 2},
  {text: "Trikampyje ABC vidurio linija MN jungia kraštinių AB ir BC vidurių taškus. Išreikškite <span class=\"v\"><span class=\"vl\">MN</span><span class=\"va\">&#x2192;</span></span> per <span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span>.", options: ["<span class=\"v\"><span class=\"vl\">MN</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span>", "<span class=\"v\"><span class=\"vl\">MN</span><span class=\"va\">&#x2192;</span></span> = 2·<span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span>", "<span class=\"v\"><span class=\"vl\">MN</span><span class=\"va\">&#x2192;</span></span> = ½·<span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span>", "<span class=\"v\"><span class=\"vl\">MN</span><span class=\"va\">&#x2192;</span></span> = −½·<span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span>"], correct: 2},
  {text: "Lygiagretainyje ABCD M — įstrižainių sankirtos taškas. Išreikškite <span class=\"v\"><span class=\"vl\">AM</span><span class=\"va\">&#x2192;</span></span> per <span class=\"v\"><span class=\"vl\">AB</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> ir <span class=\"v\"><span class=\"vl\">AD</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", options: ["<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "½<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + ½<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "½<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − ½<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>", "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>"], correct: 1},
  {text: "|<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>| = 5, |<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>| = 4, kampas tarp jų φ = 60°. Apskaičiuokite <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> · <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", options: ["10", "20", "−10", "8"], correct: 0},
  {text: "|<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>| = 10, |<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>| = 6, <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> · <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = 30. Koks kampas tarp vektorių?", options: ["30°", "45°", "60°", "90°"], correct: 2},
  {text: "Lygiakraščio trikampio ABC kraštinė lygi 10. <span class=\"v\"><span class=\"vl\">AB</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>, <span class=\"v\"><span class=\"vl\">AC</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>. Apskaičiuokite <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> · <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", options: ["100", "50", "25", "−50"], correct: 1}
];

var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;

function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Uždavinys ' + (qi+1) + ' iš ' + QUESTIONS.length + '</div>';
    html += '<div class="question-text">' + q.text + '</div>';
    
    html += '<div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}

function sel(qi, oi) {
  if (submitted) return;
  answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if (e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a = answers.filter(function(x){ return x !== null; }).length;
  document.getElementById('progress').style.width = (a/QUESTIONS.length*100) + '%';
  document.getElementById('answered-count').textContent = 'Atsakyta: ' + a + ' / ' + QUESTIONS.length;
}

function submitTest() {
  var a = answers.filter(function(x){ return x !== null; }).length;
  if (a < QUESTIONS.length && !confirm('Dar neatsakyta ' + (QUESTIONS.length-a) + ' uždaviniai. Pateikti?')) return;
  submitted = true;
  document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var s = answers[qi];
    if (s === q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-'+qi+'-'+oi);
      el.classList.remove('selected');
      if (oi === q.correct) el.classList.add(s === q.correct && oi === s ? 'correct' : 'show-correct');
      if (oi === s && s !== q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent = pct + '%';
  document.getElementById('modal-score').className = 'modal-score ' + (pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length - correct;
  document.getElementById('stat-pct').textContent = correct + '/' + QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

renderQuestions();

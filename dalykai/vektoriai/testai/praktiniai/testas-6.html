<!DOCTYPE html>

<head>

  <title>Praktinis testas 6 — Vektoriai</title>
  <link rel="stylesheet" href="../../../../styles/main.css"/>
  <style>.test-header{margin-bottom:28px}.test-header h1{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:6px}
.test-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}.test-meta-item{font-size:12px;color:var(--ink3)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.question-text{font-size:15px;color:var(--ink);line-height:1.75;margin-bottom:16px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}
.option:hover{border-color:var(--accent);background:var(--accent-bg)}
.option.selected{border-color:var(--accent);background:var(--accent-bg)}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.wrong{border-color:var(--red);background:var(--red-bg)}
.option.show-correct{border-color:var(--green);background:var(--green-bg)}
.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}
.option.selected .option-letter{background:var(--accent);color:#fff}
.option.correct .option-letter{background:var(--green);color:#fff}
.option.wrong .option-letter{background:var(--red);color:#fff}
.option.show-correct .option-letter{background:var(--green);color:#fff}
.option-text{font-size:14px;color:var(--ink2);line-height:1.5}
.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}
.submit-btn{padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}
.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}
.answered-count{font-size:13px;color:var(--ink3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center}
.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}
.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}
.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}
.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}
.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}
.v{display:inline-block;position:relative;padding-top:8px;white-space:nowrap}
.vl{font-style:italic;font-weight:600}
.va{position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1}</style>
</head>

<script>var QUESTIONS=[{"text": "Vektoriaus <span class=\"v\"><span class=\"vl\">AB</span><span class=\"va\">&#x2192;</span></span> koordinatės, kai A(3; −1) ir B(−2; 4):<div style=\"margin:10px 0 6px;display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px\"><svg viewBox=\"0 0 210 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:200px;height:auto\">\n  <defs>\n    <marker id=\"t6ax1\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#374151\"/></marker>\n    <marker id=\"t6mv1\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#1d4ed8\"/></marker>\n  </defs>\n  <line x1=\"10\" y1=\"120\" x2=\"205\" y2=\"120\" stroke=\"#9ca3af\" stroke-width=\"1.4\" marker-end=\"url(#t6ax1)\"/>\n  <line x1=\"90\" y1=\"190\" x2=\"90\" y2=\"10\" stroke=\"#9ca3af\" stroke-width=\"1.4\" marker-end=\"url(#t6ax1)\"/>\n  <text x=\"207\" y=\"124\" font-size=\"10\" fill=\"#6b7280\" font-style=\"italic\">x</text>\n  <text x=\"86\" y=\"9\" font-size=\"10\" fill=\"#6b7280\" font-style=\"italic\">y</text>\n  <text x=\"75\" y=\"134\" font-size=\"9\" fill=\"#6b7280\">O</text>\n  <!-- O=(90,120), scale=20: A(3,-1)=(150,140), B(-2,4)=(50,40) -->\n  <line x1=\"10\" y1=\"40\" x2=\"205\" y2=\"40\" stroke=\"#f0f0f0\" stroke-width=\"1\"/>\n  <line x1=\"10\" y1=\"140\" x2=\"205\" y2=\"140\" stroke=\"#f0f0f0\" stroke-width=\"1\"/>\n  <line x1=\"50\" y1=\"10\" x2=\"50\" y2=\"190\" stroke=\"#f0f0f0\" stroke-width=\"1\"/>\n  <line x1=\"150\" y1=\"10\" x2=\"150\" y2=\"190\" stroke=\"#f0f0f0\" stroke-width=\"1\"/>\n  <circle cx=\"150\" cy=\"140\" r=\"4\" fill=\"#1d4ed8\"/>\n  <text x=\"154\" y=\"152\" font-size=\"10\" fill=\"#1d4ed8\" font-weight=\"600\">A(3; −1)</text>\n  <circle cx=\"50\" cy=\"40\" r=\"4\" fill=\"#dc2626\"/>\n  <text x=\"20\" y=\"38\" font-size=\"10\" fill=\"#dc2626\" font-weight=\"600\">B(−2; 4)</text>\n  <line x1=\"150\" y1=\"140\" x2=\"53\" y2=\"43\" stroke=\"#1d4ed8\" stroke-width=\"2.2\" marker-end=\"url(#t6mv1)\"/>\n  <line x1=\"50\" y1=\"140\" x2=\"150\" y2=\"140\" stroke=\"#9ca3af\" stroke-width=\"1.2\" stroke-dasharray=\"4,3\"/>\n  <line x1=\"50\" y1=\"40\" x2=\"50\" y2=\"134\" stroke=\"#9ca3af\" stroke-width=\"1.2\" stroke-dasharray=\"4,3\"/>\n  <text x=\"95\" y=\"154\" font-size=\"9\" fill=\"#6b7280\">−5</text>\n  <text x=\"32\" y=\"92\" font-size=\"9\" fill=\"#6b7280\">5</text>\n</svg></div>", "options": ["(1; 3)", "(−5; 5)", "(5; −5)", "(−5; −5)"], "correct": 1}, {"text": "Vektoriaus <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (6; −8) ilgis:", "options": ["14", "2", "10", "√28"], "correct": 2}, {"text": "Atkarpos su galais A(1; −3) ir B(5; 1) vidurio taškas:", "options": ["(3; −1)", "(4; −2)", "(2; −1)", "(3; −2)"], "correct": 0}, {"text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (−1; 2), <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (3; 1). Kokios 2<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> koordinatės?", "options": ["(1; 5)", "(−1; 5)", "(1; 3)", "(5; 1)"], "correct": 0}, {"text": "Ar taškai A(0; 0), B(1; 3), C(2; 5) vienoje tiesėje? (AB=(1;3), AC=(2;5), 1·5−2·3=?)", "options": ["Taip, nes 1·5 − 2·3 = 0... Ne!", "Ne, nes 1·5 − 2·3 = −1 ≠ 0", "Taip, visada", "Neįmanoma nustatyti"], "correct": 1}, {"text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (−2; 4). Ar <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (1; −2) kolinearūs?", "options": ["Ne, nes koordinatės skirtingos", "Taip, nes (−2)·(−2) − 1·4 = 0", "Ne, nes ilgiai skirtingi", "Taip, nes 4/−2 = −2 ir −2/1 = −2"], "correct": 1}, {"text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (−1; 2), <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (4; 2). Apskaičiuokite <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> · <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", "options": ["0", "−4", "−4 + 4 = 0", "6"], "correct": 2}, {"text": "Ar <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (2; 1) ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (1; −2) statmeni?<div style=\"margin:10px 0 6px;display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px\"><svg viewBox=\"0 0 180 165\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:170px;height:auto\">\n  <defs>\n    <marker id=\"t6ax2\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#374151\"/></marker>\n    <marker id=\"t6ma\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#1d4ed8\"/></marker>\n    <marker id=\"t6mb\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3.5\" orient=\"auto\"><polygon points=\"0,1 6,3.5 0,6\" fill=\"#dc2626\"/></marker>\n  </defs>\n  <line x1=\"10\" y1=\"80\" x2=\"175\" y2=\"80\" stroke=\"#9ca3af\" stroke-width=\"1.4\" marker-end=\"url(#t6ax2)\"/>\n  <line x1=\"50\" y1=\"155\" x2=\"50\" y2=\"10\" stroke=\"#9ca3af\" stroke-width=\"1.4\" marker-end=\"url(#t6ax2)\"/>\n  <text x=\"177\" y=\"84\" font-size=\"10\" fill=\"#6b7280\" font-style=\"italic\">x</text>\n  <text x=\"46\" y=\"9\" font-size=\"10\" fill=\"#6b7280\" font-style=\"italic\">y</text>\n  <text x=\"36\" y=\"94\" font-size=\"9\" fill=\"#6b7280\">O</text>\n  <!-- O=(50,80), scale=25: a(2,1)=(100,55), b(1,-2)=(75,130) -->\n  <line x1=\"50\" y1=\"80\" x2=\"97\" y2=\"57\" stroke=\"#1d4ed8\" stroke-width=\"2.2\" marker-end=\"url(#t6ma)\"/>\n  <line x1=\"50\" y1=\"80\" x2=\"73\" y2=\"127\" stroke=\"#dc2626\" stroke-width=\"2.2\" marker-end=\"url(#t6mb)\"/>\n  <path d=\"M50,80 L60,75 L65,87\" fill=\"none\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n  <text x=\"101\" y=\"55\" font-size=\"10\" fill=\"#1d4ed8\" font-weight=\"600\">a(2; 1)</text>\n  <text x=\"75\" y=\"140\" font-size=\"10\" fill=\"#dc2626\" font-weight=\"600\">b(1; −2)</text>\n</svg></div>", "options": ["Taip, nes 2·1 + 1·(−2) = 0", "Ne, nes ilgiai skirtingi", "Ne, nes 2·1 + 1·(−2) ≠ 0", "Neįmanoma nustatyti"], "correct": 0}, {"text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (3; 4), <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (4; −3). Apskaičiuokite <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> · <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", "options": ["0", "25", "−25", "12"], "correct": 0}, {"text": "|<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>| = 5, |<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>| = 4, <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> · <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = 10. Koks cos φ?", "options": ["½", "2", "1/8", "√2/2"], "correct": 0}];
var answers=new Array(QUESTIONS.length).fill(null);var submitted=false;
function renderQuestions(){var html='';for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];html+='<div class="question-card"><div class="question-num">Klausimas '+(qi+1)+' iš '+QUESTIONS.length+'</div>';html+='<div class="question-text">'+q.text+'</div>';html+='<div class="options">';var L=['A','B','C','D'];for(var oi=0;oi<q.options.length;oi++){html+='<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';html+='<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';}html+='</div></div>';}document.getElementById('questions').innerHTML=html;}
function sel(qi,oi){if(submitted)return;answers[qi]=oi;for(var i=0;i<4;i++){var e=document.getElementById('opt-'+qi+'-'+i);if(e)e.classList.remove('selected');}document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');var a=answers.filter(function(x){return x!==null;}).length;document.getElementById('progress').style.width=(a/QUESTIONS.length*100)+'%';document.getElementById('answered-count').textContent='Atsakyta: '+a+' / '+QUESTIONS.length;}
function submitTest(){var a=answers.filter(function(x){return x!==null;}).length;if(a<QUESTIONS.length&&!confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?'))return;submitted=true;document.getElementById('submit-btn').disabled=true;var correct=0;for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];var s=answers[qi];if(s===q.correct)correct++;for(var oi=0;oi<q.options.length;oi++){var el=document.getElementById('opt-'+qi+'-'+oi);el.classList.remove('selected');if(oi===q.correct)el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');if(oi===s&&s!==q.correct)el.classList.add('wrong');}}var pct=Math.round(correct/QUESTIONS.length*100);document.getElementById('modal-score').textContent=pct+'%';document.getElementById('modal-score').className='modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');document.getElementById('modal-feedback').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti';document.getElementById('stat-correct').textContent=correct;document.getElementById('stat-wrong').textContent=QUESTIONS.length-correct;document.getElementById('stat-pct').textContent=correct+'/'+QUESTIONS.length;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
renderQuestions();</script>

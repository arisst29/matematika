<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testas 1 — Planimetrija</title>
  <link rel="stylesheet" href="../../../../styles/main.css"/>
  <style>
.test-header{margin-bottom:28px}.test-header h1{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:6px}
.test-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}.test-meta-item{font-size:12px;color:var(--ink3)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.question-text{font-size:15px;color:var(--ink);line-height:1.75;margin-bottom:16px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}
.option:hover{border-color:var(--accent);background:var(--accent-bg)}
.option.selected{border-color:var(--accent);background:var(--accent-bg)}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.wrong{border-color:var(--red);background:var(--red-bg)}
.option.show-correct{border-color:var(--green);background:var(--green-bg)}
.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}
.option.selected .option-letter{background:var(--accent);color:#fff}
.option.correct .option-letter{background:var(--green);color:#fff}
.option.wrong .option-letter{background:var(--red);color:#fff}
.option.show-correct .option-letter{background:var(--green);color:#fff}
.option-text{font-size:14px;color:var(--ink2);line-height:1.5}
.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}
.submit-btn{padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}
.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}
.answered-count{font-size:13px;color:var(--ink3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center}
.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}
.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}
.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}
.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}
.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}
</style>
</head>

e:nowrap;display:inline-block;position:relative;padding-top:7px\"><span style=\"font-style:italic;font-weight:600\">a</span><span style=\"position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1\">→</span></span>|", "0"], "correct": 1}, {"text": "Kaip žymimas vektorius su pradžios tašku A ir galo tašku B?", "options": ["<span style=\"white-space:nowrap;display:inline-block;position:relative;padding-top:7px\"><span style=\"font-style:italic;font-weight:600\">AB</span><span style=\"position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1\">→</span></span>", "AB", "BA", "[AB]"], "correct": 0}, {"text": "Skaliarinės sandaugos rezultatas yra:", "options": ["Vektorius", "Skaičius", "Kampas", "Atstumas"], "correct": 1}, {"text": "Kampas tarp dviejų vektorių gali būti:", "options": ["0° ≤ φ < 180°", "0° < φ ≤ 180°", "0° ≤ φ ≤ 180°", "0° < φ < 180°"], "correct": 2}, {"text": "Vektoriaus <span style=\"white-space:nowrap;display:inline-block;position:relative;padding-top:7px\"><span style=\"font-style:italic;font-weight:600\">a</span><span style=\"position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1\">→</span></span> ir skaičiaus k sandaugos k<span style=\"white-space:nowrap;display:inline-block;position:relative;padding-top:7px\"><span style=\"font-style:italic;font-weight:600\">a</span><span style=\"position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1\">→</span></span> ilgis lygus:", "options": ["|<span style=\"white-space:nowrap;display:inline-block;position:relative;padding-top:7px\"><span style=\"font-style:italic;font-weight:600\">a</span><span style=\"position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1\">→</span></span>|", "k·|<span style=\"white-space:nowrap;display:inline-block;position:relative;padding-top:7px\"><span style=\"font-style:italic;font-weight:600\">a</span><span style=\"position:absolute;top:0;left:0;rig var answers=new Array(QUESTIONS.length).fill(null);var submitted=false;
function renderQuestions(){var html='';for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];html+='<div class="question-card"><div class="question-num">Klausimas '+(qi+1)+' i\u0161 '+QUESTIONS.length+'</div>';html+='<div class="question-text">'+q.text+'</div>';if(q.graph_id){var g=document.getElementById(q.graph_id);if(g)html+=g.innerHTML;}html+='<div class="options">';var L=['A','B','C','D'];for(var oi=0;oi<q.options.length;oi++){html+='<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';html+='<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';}html+='</div></div>';}document.getElementById('questions').innerHTML=html;}
function sel(qi,oi){if(submitted)return;answers[qi]=oi;for(var i=0;i<4;i++){var e=document.getElementById('opt-'+qi+'-'+i);if(e)e.classList.remove('selected');}document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');var a=answers.filter(function(x){return x!==null;}).length;document.getElementById('progress').style.width=(a/QUESTIONS.length*100)+'%';document.getElementById('answered-count').textContent='Atsakyta: '+a+' / '+QUESTIONS.length;}

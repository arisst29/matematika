    "text": "Statusis trikampis ABC, statysis kampas C, statiniai AC=6, BC=8. Raskite <span class=\"v\"><span class=\"vl\">CA</span><span class=\"va\">&#x2192;</span></span>·<span class=\"v\"><span class=\"vl\">AB</span><span class=\"va\">&#x2192;</span></span>.",
    "options": [
      "36",
      "48",
      "0",
      "100"
    ],
    "correct": 0
  }
];;
var answers=new Array(QUESTIONS.length).fill(null);var submitted=false;
function renderQuestions(){var html='';for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];html+='<div class="q-card"><div class="q-header"><span class="q-num">Klausimas '+(qi+1)+' / '+QUESTIONS.length+'</span><span class="q-pts">1 taškas</span></div><div class="q-text">'+q.text+'</div><div class="options">';var L=['A','B','C','D'];for(var oi=0;oi<q.options.length;oi++){html+='<div class="opt" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';html+='<div class="opt-letter">'+L[oi]+'</div><div class="opt-text">'+q.options[oi]+'</div></div>';}html+='</div></div>';}document.getElementById('questions').innerHTML=html;document.getElementById('progress-text').textContent='Atsakyta: 0 / '+QUESTIONS.length;}
function sel(qi,oi){if(submitted)return;answers[qi]=oi;for(var i=0;i<4;i++){var e=document.getElementById('opt-'+qi+'-'+i);if(e)e.classList.remove('selected');}document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');var a=answers.filter(function(x){return x!==null;}).length;document.getElementById('progress-fill').style.width=(a/QUESTIONS.length*100)+'%';document.getElementById('progress-text').textContent='Atsakyta: '+a+' / '+QUESTIONS.length;document.getElementById('answered-info').textContent=a+' / '+QUESTIONS.length+' atsakyta';}
function submitExam(){var a=answers.filter(function(x){return x!==null;}).length;if(a<QUESTIONS.length&&!confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimų. Pateikti?'))return;submitted=true;document.getElementById('submit-btn').disabled=true;var correct=0;for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];var s=answers[qi];if(s===q.correct)correct++;for(var oi=0;oi<q.options.length;oi++){var el=document.getElementById('opt-'+qi+'-'+oi);el.classList.remove('selected');if(oi===q.correct)el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');if(oi===s&&s!==q.correct)el.classList.add('wrong');}}var pct=Math.round(correct/QUESTIONS.length*100);document.getElementById('modal-pct').textContent=pct+'%';document.getElementById('modal-pct').className='modal-pct '+(pct>=80?'ex':pct>=50?'good':'poor');document.getElementById('modal-feedback').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia daugiau pasirengimo';document.getElementById('modal-sub').textContent='Teisingai: '+correct+' iš '+QUESTIONS.length;document.getElementById('stat-c').textContent=correct;document.getElementById('stat-w').textContent=QUESTIONS.length-correct;document.getElementById('stat-p').textContent=pct+'%';document.getElementById('modal-bg').classList.add('open');}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
renderQuestions();</script>
</body>

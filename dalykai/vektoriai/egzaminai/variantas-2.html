  <style>body{margin:0;font-family:'Segoe UI',system-ui,sans-serif}
.exam-top{border-bottom:3px solid #1d4ed8;padding-bottom:20px;margin-bottom:32px}
.exam-top h1{font-size:22px;font-weight:700;color:#1a1a2e;margin:0 0 6px}
.exam-top .meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}
.exam-top .meta span{font-size:13px;color:#555;background:#f1f5f9;padding:4px 10px;border-radius:20px}
.hard-badge{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.progress-wrap{margin-bottom:28px}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1d4ed8;border-radius:3px;transition:width .3s;width:0%}
.progress-text{font-size:12px;color:#64748b;margin-top:6px;text-align:right}
.q-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.q-num{font-size:13px;font-weight:700;color:#64748b;letter-spacing:0.05em}
.q-pts{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
.q-pts.two{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.q-text{font-size:15px;color:#1a1a2e;line-height:1.75;margin-bottom:6px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.opt{display:flex;align-items:center;gap:12px;padding:11px 16px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;background:#fff;user-select:none}
.opt:hover{border-color:#1d4ed8;background:#eff6ff}
.opt.selected{border-color:#1d4ed8;background:#eff6ff}
.opt.correct{border-color:#16a34a;background:#f0fdf4}
.opt.wrong{border-color:#dc2626;background:#fef2f2}
.opt.show-correct{border-color:#16a34a;background:#f0fdf4}
.opt-letter{width:30px;height:30px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#475569;flex-shrink:0}
.opt.selected .opt-letter{background:#1d4ed8;color:#fff}
.opt.correct .opt-letter{background:#16a34a;color:#fff}
.opt.wrong .opt-letter{background:#dc2626;color:#fff}
.opt.show-correct .opt-letter{background:#16a34a;color:#fff}
.opt-text{font-size:14px;color:#334155;line-height:1.5}
.open-answer{margin-top:10px}
.open-input{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.open-input input{padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;font-family:inherit;width:200px;outline:none;transition:border .12s}
.open-input input:focus{border-color:#1d4ed8}
.open-input input.correct-in{border-color:#16a34a;background:#f0fdf4;color:#16a34a;font-weight:600}
.open-input input.wrong-in{border-color:#dc2626;background:#fef2f2;color:#dc2626}
.answer-feedback{font-size:13px;font-weight:600;margin-top:8px;display:none}
.answer-feedback.show{display:block}
.answer-feedback.ok{color:#16a34a}
.answer-feedback.bad{color:#dc2626}
.submit-row{margin-top:32px;padding-top:24px;border-top:2px solid #e2e8f0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.btn-submit{padding:13px 36px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-submit:disabled{background:#94a3b8;cursor:not-allowed}
.answered-info{font-size:13px;color:#64748b}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:44px 48px;max-width:540px;width:92%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-pct{font-size:80px;font-weight:800;line-height:1;margin-bottom:4px}
.modal-pct.ex{color:#16a34a}.modal-pct.good{color:#1d4ed8}.modal-pct.poor{color:#dc2626}
.modal-feedback{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.modal-sub{font-size:14px;color:#64748b;margin-bottom:24px}
.modal-stats{display:flex;justify-content:center;gap:32px;padding:20px;background:#f8fafc;border-radius:10px;margin-bottom:24px}
.modal-stat-v{font-size:26px;font-weight:700;color:#1a1a2e}
.modal-stat-k{font-size:11px;color:#94a3b8;margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}
.modal-btns{display:flex;gap:10px;justify-content:center}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#334155}
.btn.primary{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.v{display:inline-block;position:relative;padding-top:8px;white-space:nowrap}
.vl{font-style:italic;font-weight:600}
.va{position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:1}</style>
</head>

(−1; 3), <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (3; 1). Ar <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> ⊥ <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>?", "options": ["Taip, nes (−1)·3 + 3·1 = 0", "Ne, nes (−1)·3 + 3·1 ≠ 0", "Taip, nes jų ilgiai lygūs", "Ne, nes koordinatės ne proporcingos"], "correct": 0}, {"type": "open", "pts": 2, "text": "Rombo ABCD kraštinė 6, kampas A = 120°. Apskaičiuokite ilgesniosios įstrižainės ilgį. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(Įrašykite skaičių)</span>", "answer": "6", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Vektoriai <span class=\"v\"><span class=\"vl\">p</span><span class=\"va\">&#x2192;</span></span> = <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + 2<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>, <span class=\"v\"><span class=\"vl\">q</span><span class=\"va\">&#x2192;</span></span> = 3<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> − <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>. Raskite |<span class=\"v\"><span class=\"vl\">p</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">q</span><span class=\"va\">&#x2192;</span></span>|², jei |<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>| = 2, |<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>| = 1, <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> ⊥ <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>.", "options": ["64", "68", "72", "80"], "correct": 0}, {"type": "open", "pts": 2, "text": "Raskite kampą φ tarp <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (0; 1) ir <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (1; 1). <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(Įrašykite laipsniais)</span>", "answer": "45", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Taškai A(1;1), B(3;5), C(5;9). Ar jie vienoje tiesėje?", "options": ["Taip, nes AB ir AC kolinearūs", "Ne, nes skirtingi taškai", "Taip, bet tik atsitiktinai", "Ne, nes 2·8 − 4·4 ≠ 0"], "correct": 0}, {"type": "open", "pts": 2, "text": "<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> = (t; −2), <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span> = (3; t). Raskite t, kuriam esant <span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> ⊥ <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>. <span style=\"font-size:12px;color:#94a3b8;font-style:italic\">(Įrašykite skaičių)</span>", "answer": "2", "tolerance": 0}, {"type": "mcq", "pts": 1, "text": "Lygiagretainis: |<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>| = 5, |<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>| = 7, kampas A = 60°. Raskite |<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>|.", "options": ["√109", "√79", "√139", "√59"], "correct": 0}, {"type": "open", "pts": 2, "text": "|<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span> + <span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>|² = 45, |<span class=\"v\"><span class=\"vl\">a</span><span class=\"va\">&#x2192;</span></span>| = 4, |<span class=\"v\"><span class=\"vl\">b</span><span class=\"va\">&#x2192;</span></span>| = 5. Raskite <span class=\"v\"><span class= var answers=new Array(20).fill(null);var submitted=false;var MAX_PTS=30;
function renderQuestions(){var html='';var L=['A','B','C','D'];for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];var pc=q.pts===2?'two':'';html+='<div class="q-card"><div class="q-header"><span class="q-num">KLAUSIMAS '+(qi+1)+' IŠ '+QUESTIONS.length+'</span><span class="q-pts '+pc+'">'+q.pts+(q.pts===1?' taškas':' taškai')+'</span></div><div class="q-text">'+q.text+'</div>';if(q.graph_id){var g=document.getElementById(q.graph_id);if(g)html+=g.innerHTML;}if(q.type==='mcq'){html+='<div class="options">';for(var oi=0;oi<q.options.length;oi++){html+='<div class="opt" id="opt-'+qi+'-'+oi+'" onclick="selMcq('+qi+','+oi+')">';html+='<div class="opt-letter">'+L[oi]+'</div><div class="opt-text">'+q.options[oi]+'</div></div>';}html+='</div>';}else{html+='<div class="open-answer"><div class="open-input"><input type="text" id="inp-'+qi+'" placeholder="Įrašykite atsakymą" oninput="markOpen('+qi+')"></div><div class="answer-feedback" id="fb-'+qi+'"></div></div>';}html+='</div>';}document.getElementById('questions').innerHTML=html;document.getElementById('progress-text').textContent='Atsakyta: 0 / '+QUESTIONS.length;}
function selMcq(qi,oi){if(submitted)return;answers[qi]=oi;for(var i=0;i<4;i++){var e=document.getElementById('opt-'+qi+'-'+i);if(e)e.classList.remove('selected');}document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');updateProgress();}
function markOpen(qi){if(submitted)return;var val=document.getElementById('inp-'+qi).value.trim();answers[qi]=val!==''?val:null;updateProgress();}
function updateProgress(){var done=answers.filter(function(x){return x!==null;}).length;document.getElementById('progress-fill').style.width=(done/QUESTIONS.length*100)+'%';document.getElementById('progress-text').textContent='Atsakyta: '+done+' / '+QUESTIONS.length;document.getElementById('answered-info').textContent='Atsakyta: '+done+' / '+QUESTIONS.length;}
function checkOpen(val,answer,tol){if(!val)return false;val=val.trim().replace(',','.');answer=String(answer).trim().replace(',','.');if(val.toLowerCase()===answer.toLowerCase())return true;var numV=parseFloat(val);var numA=parseFloat(answer);if(!isNaN(numV)&&!isNaN(numA)&&Math.abs(numV-numA)<=(tol||0.01))return true;return false;}
function submitExam(){var done=answers.filter(function(x){return x!==null;}).length;if(done<QUESTIONS.length&&!confirm('Dar neatsakyta '+(QUESTIONS.length-done)+' klausimai. Pateikti?'))return;submitted=true;document.getElementById('submit-btn').disabled=true;var pts=0;for(var qi=0;qi<QUESTIONS.length;qi++){var q=QUESTIONS[qi];var s=answers[qi];if(q.type==='mcq'){var ok=(s===q.correct);if(ok)pts+=q.pts;for(var oi=0;oi<q.options.length;oi++){var el=document.getElementById('opt-'+qi+'-'+oi);el.classList.remove('selected');if(oi===q.correct)el.classList.add(ok&&oi===s?'correct':'show-correct');if(oi===s&&!ok)el.classList.add('wrong');}}else{var inp=document.getElementById('inp-'+qi);var fb=document.getElementById('fb-'+qi);var ok2=checkOpen(s,q.answer,q.tolerance);if(ok2){pts+=q.pts;inp.classList.add('correct-in');fb.textContent='Teisingai';fb.className='answer-feedback show ok';}else{inp.classList.add('wrong-in');fb.textContent='Teisingas atsakymas: '+q.answer;fb.className='answer-feedback show bad';}}}var pct=Math.round(pts/MAX_PTS*100);document.getElementById('modal-pct').textContent=pct+'%';document.getElementById('modal-pct').className='modal-pct '+(pct>=80?'ex':pct>=50?'good':'poor');document.getElementById('modal-feedback').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia daugiau pasirengimo';document.getElementById('modal-sub').textContent='Surinkta: '+pts+' is '+MAX_PTS+' tasku';document.getElementById('stat-c').textContent=pts;document.getElementById('stat-w').textContent=MAX_PTS-pts;document.getElementById('stat-p').textContent=pct+'%';document.getElementById('modal-bg').classList.add('open');}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
renderQuestions();</script>

<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>

  <title>Sekų egzaminas 2 — Matematika 11</title>
  <link rel="stylesheet" href="../../../styles/main.css"/>
  <style>.exam-header{margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--border)}.exam-title{font-size:26px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-0.3px}.exam-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}.exam-meta-item{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:5px}.variant-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-left:10px}.variant-B{background:#dcfce7;color:#15803d}.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);padding:8px 16px;background:var(--bg3);border-radius:var(--radius);margin:20px 0 12px;border-left:3px solid var(--accent)}.progress-bar{height:5px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}.question-text{font-size:15px;color:var(--ink);line-height:1.8;margin-bottom:16px;font-weight:500}.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:0.85em;line-height:1.1}.frac sup{border-bottom:1px solid currentColor;padding:0 2px;font-size:1em}.frac sub{padding:0 2px;font-size:1em}.options{display:flex;flex-direction:column;gap:8px}.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}.option:hover{border-color:var(--accent);background:var(--accent-bg)}.option.selected{border-color:var(--accent);background:var(--accent-bg)}.option.correct{border-color:var(--green);background:var(--green-bg)}.option.wrong{border-color:var(--red);background:var(--red-bg)}.option.show-correct{border-color:var(--green);background:var(--green-bg)}.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}.option.selected .option-letter{background:var(--accent);color:#fff}.option.correct .option-letter{background:var(--green);color:#fff}.option.wrong .option-letter{background:var(--red);color:#fff}.option.show-correct .option-letter{background:var(--green);color:#fff}.option-text{font-size:14px;color:var(--ink2);line-height:1.6}.option.selected .option-text{color:var(--accent)}.option.correct .option-text{color:var(--green)}.option.wrong .option-text{color:var(--red)}.option.show-correct .option-text{color:var(--green)}.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}.submit-btn{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer}.submit-btn:hover{background:#1e40af}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}.answered-count{font-size:13px;color:var(--ink3)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:40px;max-width:520px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}.modal-score{font-size:72px;font-weight:700;line-height:1;margin-bottom:6px}.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}.modal-stats{display:flex;justify-content:center;gap:32px;margin-bottom:24px;padding:18px;background:var(--bg3);border-radius:var(--radius)}.modal-stat-val{font-size:24px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}.modal-btns{display:flex;gap:10px;justify-content:center}.modal-feedback{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:6px}</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <a href="../../../index.html">Matematika 11</a>
        <span class="sep">›</span><span>Sekos</span>
        <span class="sep">›</span><span class="current">Egzaminas 2</span>
      </div>
    </div>
    <div class="page">
      <div class="exam-header">
        <div class="topic-tag">6 skyrius · Sekų skyriaus egzaminas</div>
        <div class="exam-title">
          Sekų egzaminas 2
          <span class="variant-badge variant-B">B variantas</span>
        </div>
        <div class="exam-meta">
          <div class="exam-meta-item">⏱ Trukmė: 35 minutės</div>
          <div class="exam-meta-item">📝 30 uždavinių</div>
          <div class="exam-meta-item">📚 T1 · T2 · T3 · Visos temos</div>

        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="questions"></div>
      <div class="submit-area">
        <button class="submit-btn" id="submit-btn" onclick="submitTest()">Pateikti egzaminą</button>
        <span class="answered-count" id="answered-count">Atsakyta: 0 / 30</span>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-label">Egzamino rezultatas</div>
    <div class="modal-stats">
      <div><div class="modal-stat-val" id="stat-correct"></div><div class="modal-stat-key">Teisingi</div></div>
      <div><div class="modal-stat-val" id="stat-wrong"></div><div class="modal-stat-key">Neteisingi</div></div>
      <div><div class="modal-stat-val" id="stat-pct"></div><div class="modal-stat-key">Rezultatas</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Peržiūrėti atsakymus</button>
      <a href="egzaminas-3.html" class="btn primary" style="text-decoration:none">Egzaminas 3 →</a>
    </div>
  </div>
</div>
<script src="../../../js/main.js"></script>
<script>
var QUESTIONS = [
  {
    "text": "Sekos 7, 11, 15, 19, ... n-tojo nario formulė yra:",
    "options": [
      "aₙ = 4n + 3",
      "aₙ = 4n − 1",
      "aₙ = 3n + 4",
      "aₙ = 4n + 7"
    ],
    "correct": 0
  },
  {
    "text": "Aritmetinės progresijos a₁ = 5, d = −3. Koks a₁₀?",
    "options": [
      "−22",
      "−21",
      "−19",
      "−25"
    ],
    "correct": 0
  },
  {
    "text": "Aritmetinės progresijos a₄ = 13 ir a₉ = 28. Koks skirtumas d?",
    "options": [
      "2",
      "3",
      "4",
      "5"
    ],
    "correct": 1
  },
  {
    "text": "Apskaičiuokite sumą 2 + 6 + 10 + ... + 82.",
    "options": [
      "882",
      "864",
      "900",
      "840"
    ],
    "correct": 0
  },
  {
    "text": "Sekos pirmųjų n narių suma Sₙ = 3n² + 2n. Koks yra a₅?",
    "options": [
      "29",
      "27",
      "31",
      "25"
    ],
    "correct": 0
  },
  {
    "text": "Aritmetinės progresijos nariai a₁ = −5, d = 3. Kuris narys lygus 40?",
    "options": [
      "n = 15",
      "n = 16",
      "n = 14",
      "n = 17"
    ],
    "correct": 1
  },
  {
    "text": "Tarp skaičių −4 ir 20 įterpti 3 aritmetinės progresijos nariai. Koks jų skirtumas d?",
    "options": [
      "4",
      "5",
      "6",
      "8"
    ],
    "correct": 2
  },
  {
    "text": "Aritmetinės progresijos pirmųjų 15 narių suma lygi 300. Koks vidurinis (8-asis) narys?",
    "options": [
      "15",
      "20",
      "18",
      "25"
    ],
    "correct": 1
  },
  {
    "text": "Penkiakampio kampų dydžiai sudaro aritmetinę progresiją. Įrodyk, kad bent vienas kampas lygus 108°. Koks mažiausio kampo dydis, jei skirtumas d = 12°?",
    "options": [
      "60°",
      "72°",
      "84°",
      "96°"
    ],
    "correct": 2
  },
  {
    "text": "Aritmetinės progresijos a₂ = 7, a₃ = 10. Koks pirmųjų 20 narių suma?",
    "options": [
      "650",
      "680",
      "710",
      "620"
    ],
    "correct": 0
  },
  {
    "text": "Geometrinės progresijos b₁ = 5, q = −2. Koks b₆?",
    "options": [
      "−160",
      "160",
      "−320",
      "320"
    ],
    "correct": 0
  },
  {
    "text": "Geometrinės progresijos b₃ = 12 ir b₆ = 96. Koks vardiklis q?",
    "options": [
      "2",
      "3",
      "4",
      "<span class='frac'><sup>1</sup><sub>2</sub></span>"
    ],
    "correct": 0
  },
  {
    "text": "Apskaičiuokite: 896 + 448 + 224 + ... + 14.",
    "options": [
      "1778",
      "1786",
      "1792",
      "1764"
    ],
    "correct": 0
  },
  {
    "text": "Geometrinės progresijos b₁ = 54, q = <span class='frac'><sup>1</sup><sub>3</sub></span>. Koks pirmųjų 4 narių suma?",
    "options": [
      "80",
      "<span class='frac'><sup>80</sup><sub>1</sub></span>",
      "<span class='frac'><sup>242</sup><sub>3</sub></span>",
      "<span class='frac'><sup>260</sup><sub>3</sub></span>"
    ],
    "correct": 0
  },
  {
    "text": "Begalinės geometrinės progresijos b₁ = 15, q = 0,4. Kokia suma S?",
    "options": [
      "20",
      "25",
      "30",
      "15"
    ],
    "correct": 1
  },
  {
    "text": "Geometrinės progresijos b₁ = 3, b₄ = 24. Koks b₇?",
    "options": [
      "192",
      "384",
      "96",
      "576"
    ],
    "correct": 0
  },
  {
    "text": "Nykstamosios geometrinės progresijos suma S = 16, vardiklis q = <span class='frac'><sup>1</sup><sub>4</sub></span>. Koks b₁?",
    "options": [
      "10",
      "12",
      "14",
      "16"
    ],
    "correct": 1
  },
  {
    "text": "Trys skaičiai 4, x, 36 sudaro geometrinę progresiją. Koks x (teigiamas)?",
    "options": [
      "10",
      "12",
      "16",
      "18"
    ],
    "correct": 1
  },
  {
    "text": "Geometrinės progresijos pirmųjų 3 narių sandauga lygi 512. Koks vidurinis narys?",
    "options": [
      "6",
      "8",
      "10",
      "12"
    ],
    "correct": 1
  },
  {
    "text": "Apskaičiuokite begalinę sumą: <span class='frac'><sup>1</sup><sub>5</sub></span> + <span class='frac'><sup>1</sup><sub>25</sub></span> + <span class='frac'><sup>1</sup><sub>125</sub></span> + ...",
    "options": [
      "<span class='frac'><sup>1</sup><sub>4</sub></span>",
      "<span class='frac'><sup>1</sup><sub>5</sub></span>",
      "<span class='frac'><sup>5</sup><sub>24</sub></span>",
      "<span class='frac'><sup>1</sup><sub>6</sub></span>"
    ],
    "correct": 0
  },
  {
    "text": "Baseinas talpina 10 000 litrų. Nauja siurblys pirmą minutę pripila 60 l, kiekvieną kitą — 4 l daugiau. Po kiek minučių baseinas bus pilnas?",
    "options": [
      "50 min",
      "55 min",
      "60 min",
      "45 min"
    ],
    "correct": 1
  },
  {
    "text": "Tomas nusipirko motociklą už 12 000 €. Jo vertė kasmet mažėja 20 %. Kokia motociklo vertė po 2 metų?",
    "options": [
      "7 680 €",
      "9 600 €",
      "6 144 €",
      "7 200 €"
    ],
    "correct": 0
  },
  {
    "text": "Henrikas taupė. Pirmą mėnesį įdėjo 150 €, kiekvieną kitą — 25 € daugiau. Kiek sutaupys per 10 mėnesių?",
    "options": [
      "2 625 €",
      "2 750 €",
      "2 500 €",
      "2 875 €"
    ],
    "correct": 0
  },
  {
    "text": "Sūpuoklės pirmą kartą pakyla į 180 cm aukštį. Kiekvieną kartą pakyla iki 80 % ankstesnio aukščio. Koks bendras visų pakylimų aukštis?",
    "options": [
      "720 cm",
      "800 cm",
      "900 cm",
      "850 cm"
    ],
    "correct": 2
  },
  {
    "text": "Bankas moka 2,5 % sudėtinių metinių palūkanų. Tomas įdėjo 3 000 €. Kiek turės po 4 metų? (Apvalinti iki euro.)",
    "options": [
      "3 306 €",
      "3 315 €",
      "3 300 €",
      "3 280 €"
    ],
    "correct": 1
  },
  {
    "text": "Lygiakraščiai trikampiai dedami vienas šalia kito. Didžiausio kraštinė 9 cm, kiekvieno kito — trečdaliu mažesnė. Koks begalinės figūros perimetras?",
    "options": [
      "36 cm",
      "<span class='frac'><sup>81</sup><sub>2</sub></span> cm",
      "<span class='frac'><sup>27</sup><sub>2</sub></span> cm",
      "27 cm"
    ],
    "correct": 1
  },
  {
    "text": "Aritmetinės progresijos pirmųjų 33 narių suma lygi 11. Koks devynioliktasis narys?",
    "options": [
      "<span class='frac'><sup>1</sup><sub>3</sub></span>",
      "<span class='frac'><sup>2</sup><sub>3</sub></span>",
      "1",
      "<span class='frac'><sup>1</sup><sub>2</sub></span>"
    ],
    "correct": 0
  },
  {
    "text": "Varžybų prizinį fondą sudaro 6 200 €, skiriami 6 prizai. Kiekvienas ankstesnis prizas 1,5 karto didesnis už vėlesnį. Koks mažiausias prizas? (Apvalinti iki euro.)",
    "options": [
      "247 €",
      "312 €",
      "285 €",
      "198 €"
    ],
    "correct": 1
  },
  {
    "text": "Geometrinės progresijos b₂ = 384, b₃ = −192. Kelintas sekos narys yra skaičius −0,75?",
    "options": [
      "8-asis",
      "9-asis",
      "10-asis",
      "7-asis"
    ],
    "correct": 0
  },
  {
    "text": "Trys skaičiai p, 30, r sudaro didėjančią aritmetinę progresiją. Skaičiai p, 18, r sudaro geometrinę progresiją. Raskite p ir r.",
    "options": [
      "p = 6, r = 54",
      "p = 12, r = 48",
      "p = 3, r = 57",
      "p = 9, r = 51"
    ],
    "correct": 0
  }
];

var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;

function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Uždavinys ' + (qi+1) + ' iš ' + QUESTIONS.length + '</div>';
    html += '<div class="question-text">' + q.text + '</div><div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}

function sel(qi, oi) {
  if (submitted) return; answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if(e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a = answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width = (a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent = 'Atsakyta: '+a+' / '+QUESTIONS.length;
}

function submitTest() {
  var a = answers.filter(function(x){return x!==null;}).length;
  if (a < QUESTIONS.length && !confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?')) return;
  submitted = true; document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var s = answers[qi]; if (s===q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-'+qi+'-'+oi); el.classList.remove('selected');
      if (oi===q.correct) el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if (oi===s&&s!==q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent = pct+'%';
  document.getElementById('modal-score').className = 'modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent = correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
renderQuestions();
</script>
</body>
</html>

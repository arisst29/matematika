var totalPts=0, earnedPts=0, submitted=false, answers={};

function renderAll(){
  var c=document.getElementById('questions'), html='';
  for(var qi=0;qi<QUESTIONS.length;qi++){totalPts+=QUESTIONS[qi].pts;html+=buildCard(QUESTIONS[qi],qi);}
  c.innerHTML=html;
  document.getElementById('progress-text').textContent='Atsakyta: 0 / '+QUESTIONS.length;
}

function buildCard(q,qi){
  var pc=q.pts===2?'q-pts two':'q-pts';
  var h='<div class="q-card" id="qcard-'+qi+'">';
  h+='<div class="q-header"><span class="q-num">'+q.num+'</span><span class="'+pc+'">'+q.pts+' t.</span></div>';
  h+='<div class="q-text">'+q.text+'</div>';
  if(q.hint)h+='<div class="q-hint">'+q.hint+'</div>';
  if(q.type==='mcq'){
    h+='<div class="options">';
    var L=['A','B','C','D'];
    for(var oi=0;oi<q.options.length;oi++){
      h+='<div class="opt" id="opt-'+qi+'-'+oi+'" onclick="selMcq('+qi+','+oi+')">';
      h+='<div class="opt-letter">'+L[oi]+'</div><div class="opt-text">'+q.options[oi]+'</div></div>';
    }
    h+='</div>';
  } else {
    h+='<div class="open-answer"><div class="open-input">';
    h+='<input type="text" id="inp-'+qi+'" placeholder="Įrašykite atsakymą" oninput="selOpen('+qi+')" />';
    h+='</div><div class="answer-feedback" id="fb-'+qi+'"></div></div>';
  }
  return h+'</div>';
}

function selMcq(qi,oi){
  if(submitted)return; answers[qi]=oi;
  var q=QUESTIONS[qi];
  for(var i=0;i<q.options.length;i++) document.getElementById('opt-'+qi+'-'+i).className='opt'+(i===oi?' selected':'');
  updateProgress();
}
function selOpen(qi){if(submitted)return;answers[qi]=document.getElementById('inp-'+qi).value.trim();updateProgress();}
function updateProgress(){
  var a=Object.keys(answers).filter(function(k){var v=answers[k];return v!==null&&v!==undefined&&v!=='';}).length;
  document.getElementById('progress-fill').style.width=Math.round(a/QUESTIONS.length*100)+'%';
  document.getElementById('progress-text').textContent='Atsakyta: '+a+' / '+QUESTIONS.length;
}
function submitExam(){
  var a=Object.keys(answers).filter(function(k){var v=answers[k];return v!==null&&v!==undefined&&v!=='';}).length;
  if(a<QUESTIONS.length&&!confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimų. Pateikti?'))return;
  submitted=true; document.getElementById('submit-btn').disabled=true; earnedPts=0;
  for(var qi=0;qi<QUESTIONS.length;qi++){
    var q=QUESTIONS[qi];
    if(q.type==='mcq'){
      var sel=answers[qi];
      for(var oi=0;oi<q.options.length;oi++){
        var el=document.getElementById('opt-'+qi+'-'+oi); el.className='opt';
        if(oi===q.correct) el.className+=(sel===q.correct&&oi===sel)?' correct':' show-correct';
        if(oi===sel&&sel!==q.correct) el.className+=' wrong';
      }
      if(sel===q.correct) earnedPts+=q.pts;
    } else {
      var inp=document.getElementById('inp-'+qi); inp.disabled=true;
      var uv=(answers[qi]||'').toString().trim().replace(',','.').replace(/\s/g,'');
      var fb=document.getElementById('fb-'+qi); fb.className='answer-feedback show';
      var pts=checkOpen(uv,q); earnedPts+=pts;
      if(pts===q.pts){inp.className='correct-in';fb.className+=' ok';fb.textContent='✓ Teisingai! ('+pts+'/'+q.pts+' t.)';}
      else if(pts>0){inp.className='partial-in';fb.className+=' partial';fb.textContent='~ Iš dalies ('+pts+'/'+q.pts+' t.) — Teisingas: '+q.answers[0];}
      else{inp.className='wrong-in';fb.className+=' bad';fb.textContent='✗ Neteisingai (0/'+q.pts+' t.) — Teisingas: '+q.answers[0];}
    }
  }
  showModal();
}
function checkOpen(uv,q){
  for(var i=0;i<q.answers.length;i++) if(uv===q.answers[i].toString().trim().replace(',','.').replace(/\s/g,'')) return q.pts;
  if(q.partial) for(var j=0;j<q.partial.length;j++) if(uv===q.partial[j].toString().trim().replace(',','.').replace(/\s/g,'')) return 1;
  return 0;
}
function showModal(){
  var pct=Math.round(earnedPts/totalPts*100);
  var se=document.getElementById('modal-pct');
  se.textContent=earnedPts+'/'+totalPts;
  se.className='modal-pct '+(pct>=80?'ex':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent=pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai':'Reikia pasimokyti 📖';
  document.getElementById('modal-sub').textContent='Surinkai '+earnedPts+' iš '+totalPts+' taškų ('+pct+'%)';
  document.getElementById('stat-correct').textContent=earnedPts;
  document.getElementById('stat-wrong').textContent=totalPts-earnedPts;
  document.getElementById('stat-pct').textContent=pct+'%';
  document.getElementById('modal-bg').className='modal-bg open';
}
function closeModal(){document.getElementById('modal-bg').className='modal-bg';}
renderAll();
</script>

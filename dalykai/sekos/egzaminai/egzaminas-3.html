  <style>.exam-header{margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--border)}.exam-title{font-size:26px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-0.3px}.exam-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}.exam-meta-item{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:5px}.variant-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-left:10px}.variant-C{background:#fef3c7;color:#b45309}.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);padding:8px 16px;background:var(--bg3);border-radius:var(--radius);margin:20px 0 12px;border-left:3px solid var(--accent)}.progress-bar{height:5px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}.question-text{font-size:15px;color:var(--ink);line-height:1.8;margin-bottom:16px;font-weight:500}.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:0.85em;line-height:1.1}.frac sup{border-bottom:1px solid currentColor;padding:0 2px;font-size:1em}.frac sub{padding:0 2px;font-size:1em}.options{display:flex;flex-direction:column;gap:8px}.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}.option:hover{border-color:var(--accent);background:var(--accent-bg)}.option.selected{border-color:var(--accent);background:var(--accent-bg)}.option.correct{border-color:var(--green);background:var(--green-bg)}.option.wrong{border-color:var(--red);background:var(--red-bg)}.option.show-correct{border-color:var(--green);background:var(--green-bg)}.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}.option.selected .option-letter{background:var(--accent);color:#fff}.option.correct .option-letter{background:var(--green);color:#fff}.option.wrong .option-letter{background:var(--red);color:#fff}.option.show-correct .option-letter{background:var(--green);color:#fff}.option-text{font-size:14px;color:var(--ink2);line-height:1.6}.option.selected .option-text{color:var(--accent)}.option.correct .option-text{color:var(--green)}.option.wrong .option-text{color:var(--red)}.option.show-correct .option-text{color:var(--green)}.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}.submit-btn{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer}.submit-btn:hover{background:#1e40af}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}.answered-count{font-size:13px;color:var(--ink3)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:40px;max-width:520px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}.modal-score{font-size:72px;font-weight:700;line-height:1;margin-bottom:6px}.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}.modal-stats{display:flex;justify-content:center;gap:32px;margin-bottom:24px;padding:18px;background:var(--bg3);border-radius:var(--radius)}.modal-stat-val{font-size:24px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}.modal-btns{display:flex;gap:10px;justify-content:center}.modal-feedback{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:6px}</style>

<body>

  <div class="main">

          <div class="exam-meta-item">📚 T1 · T2 · T3 · Visos temos</div>

</div>

      <a href="variantas-1.html" class="btn primary" style="text-decoration:none">VBE variantas 1 →</a>

  </div>
</div>
<script src="../../../../js/main.js"></script>
<script>
var QUESTIONS = [
  {
    "text": "Sekos pirmųjų n narių suma Sₙ = 2n² − 5n. Koks 8-asis narys?",
    "options": [
      "21",
      "23",
      "25",
      "19"
    ],
    "correct": 2
  },
  {
    "text": "Aritmetinės progresijos a₂ = <span class='frac'><sup>9</sup><sub>2</sub></span>, S₃ − S₂ = <span class='frac'><sup>9</sup><sub>2</sub></span>. Koks skirtumas d?",
    "options": [
      "<span class='frac'><sup>1</sup><sub>2</sub></span>",
      "1",
      "<span class='frac'><sup>3</sup><sub>2</sub></span>",
      "2"
    ],
    "correct": 1
  },
  {
    "text": "Aritmetinės progresijos a₁ + a₄ + a₇ = 33 ir a₂ + a₆ = 22. Raskite a₁ ir d (d > 0).",
    "options": [
      "a₁ = 3, d = 4",
      "a₁ = 5, d = 2",
      "a₁ = 1, d = 5",
      "a₁ = 7, d = 2"
    ],
    "correct": 1
  },
  {
    "text": "Apskaičiuokite: <span class='frac'><sup>1</sup><sub>2</sub></span> + <span class='frac'><sup>3</sup><sub>2</sub></span> + <span class='frac'><sup>5</sup><sub>2</sub></span> + ... + <span class='frac'><sup>29</sup><sub>2</sub></span>.",
    "options": [
      "<span class='frac'><sup>225</sup><sub>2</sub></span>",
      "<span class='frac'><sup>215</sup><sub>2</sub></span>",
      "110",
      "<span class='frac'><sup>235</sup><sub>2</sub></span>"
    ],
    "correct": 0
  },
  {
    "text": "Aritmetinės progresijos a₇ = 17 ir a₁₃ = 5. Koks pirmasis neigiamas narys?",
    "options": [
      "a₁₆",
      "a₁₇",
      "a₁₈",
      "a₁₅"
    ],
    "correct": 0
  },
  {
    "text": "Skaičių 1, 2, 3, ..., n suma lygi 2016. Koks n?",
    "options": [
      "62",
      "63",
      "64",
      "61"
    ],
    "correct": 1
  },
  {
    "text": "Aritmetinės progresijos a₁₆ + a₁₈ = 12 ir a₁₆ · a₁₈ = 35. Koks a₁₇?",
    "options": [
      "5",
      "6",
      "7",
      "14"
    ],
    "correct": 1
  },
  {
    "text": "Tarp skaičių √3 ir 4√3 įterpkite du aritmetinės progresijos narius. Koks antrasis iš jų?",
    "options": [
      "2√3",
      "<span class='frac'><sup>7√3</sup><sub>4</sub></span>",
      "3√3",
      "<span class='frac'><sup>5√3</sup><sub>4</sub></span>"
    ],
    "correct": 2
  },
  {
    "text": "Aritmetinės progresijos pirmųjų 17 narių suma lygi 85. Koks a₉?",
    "options": [
      "4",
      "5",
      "6",
      "7"
    ],
    "correct": 1
  },
  {
    "text": "Aritmetinės progresijos a₂ = 3, a₃ = −2. Kelintas sekos narys yra skaičius −332?",
    "options": [
      "68-asis",
      "69-asis",
      "70-asis",
      "67-asis"
    ],
    "correct": 1
  },
  {
    "text": "Geometrinės progresijos b₄ · b₁₀ = −24 · b₁₁. Koks b₇, jei b₁ > 0?",
    "options": [
      "−24",
      "24",
      "−12",
      "12"
    ],
    "correct": 0
  },
  {
    "text": "Geometrinės progresijos b₁ = 250, b₈ = 432, n = 4. Koks S₄?",
    "options": [
      "780",
      "840",
      "900",
      "720"
    ],
    "correct": 0
  },
  {
    "text": "Nykstamosios geometrinės progresijos pirmųjų 5 narių suma yra 1,024 % didesnė už visos progresijos sumą. Koks vardiklis q?",
    "options": [
      "0,4",
      "0,2",
      "0,5",
      "0,8"
    ],
    "correct": 1
  },
  {
    "text": "Geometrinės progresijos b₁ = 2 + √3, q = −<span class='frac'><sup>√3</sup><sub>2</sub></span>. Koks b₁ + b₂ + b₃?",
    "options": [
      "2",
      "<span class='frac'><sup>√3</sup><sub>2</sub></span>",
      "1",
      "2 − √3"
    ],
    "correct": 0
  },
  {
    "text": "Apskaičiuokite sumą: log₃512 + log₃8 + log₃2 + ...",
    "options": [
      "27/2 · log₃2",
      "27/4 · log₃2",
      "9 · log₃2",
      "27 · log₃2"
    ],
    "correct": 0
  },
  {
    "text": "Geometrinės progresijos pirmųjų 7 narių sandauga lygi 128. Koks vidurinis (4-asis) narys?",
    "options": [
      "2",
      "4",
      "8",
      "<span class='frac'><sup>128</sup><sub>7</sub></span>"
    ],
    "correct": 0
  },
  {
    "text": "Nykstamoji geometrinė progresija: b₁ = −2, q = <span class='frac'><sup>1</sup><sub>3</sub></span>. Kokia suma S?",
    "options": [
      "-3",
      "-4",
      "-2",
      "-6"
    ],
    "correct": 0
  },
  {
    "text": "Išspręskite lygtį: x² = 5x + 12 + 8 + <span class='frac'><sup>16</sup><sub>3</sub></span> + <span class='frac'><sup>32</sup><sub>9</sub></span> + ...",
    "options": [
      "x = 9; x = −4",
      "x = −3; x = 8",
      "x = 4; x = −9",
      "x = 8; x = 3"
    ],
    "correct": 0
  },
  {
    "text": "Geometrinė progresija yra nykstamoji. b₁ = 8, b₂ = −12. Raskite S.",
    "options": [
      "<span class='frac'><sup>16</sup><sub>5</sub></span>",
      "<span class='frac'><sup>8</sup><sub>5</sub></span>",
      "<span class='frac'><sup>32</sup><sub>5</sub></span>",
      "nėra baigtinės sumos"
    ],
    "correct": 3
  },
  {
    "text": "Geometrinės progresijos b₂ = 6, b₃ = −18. Kelintas narys lygus −4374?",
    "options": [
      "4-asis",
      "5-asis",
      "7-asis",
      "6-asis"
    ],
    "correct": 0
  },
  {
    "text": "Kotryna renka pašto ženklus: pirmą mėnesį surinko 15 ženklų, kiekvieną kitą mėnesį — 3 ženklais daugiau. Per kiek mėnesių ji surinks bent 200 ženklų?",
    "options": [
      "8",
      "7",
      "9",
      "10"
    ],
    "correct": 0
  },
  {
    "text": "Konkursas: prizų fondas 2800 €, 5 prizai. Pirmos vietos laimėtojas gauna 1000 €, kiekviena žemesnė vieta — ta pačia suma mažesnį prizą. Koks ketvirtos vietos prizas?",
    "options": [
      "400 €",
      "350 €",
      "300 €",
      "450 €"
    ],
    "correct": 0
  },
  {
    "text": "Kamuolys metamas iš 16 m aukščio. Kiekvieną kartą atsitrenkęs pakyla iki 75 % buvusio aukščio. Koks bendras nukeliaujamas kelias iki sustojimo?",
    "options": [
      "112 m",
      "116 m",
      "120 m",
      "108 m"
    ],
    "correct": 0
  },
  {
    "text": "Roko valandinis atlygis kasmet didėja 5 %. Dabar jis uždirba 8 € per valandą. Koks bus atlygis po 4 metų? (Apvalinti iki cento.)",
    "options": [
      "9,72 €",
      "9,60 €",
      "10,21 €",
      "9,50 €"
    ],
    "correct": 0
  },
  {
    "text": "Nykstamosios geometrinės progresijos vardiklis q = <span class='frac'><sup>1</sup><sub>5</sub></span>, suma S = 25. Koks b₁?",
    "options": [
      "16",
      "20",
      "24",
      "18"
    ],
    "correct": 1
  },
  {
    "text": "Aritmetinės progresijos pirmųjų 30 narių suma lygi 15. Koks 16-asis narys?",
    "options": [
      "<span class='frac'><sup>1</sup><sub>2</sub></span>",
      "1",
      "<span class='frac'><sup>3</sup><sub>2</sub></span>",
      "2"
    ],
    "correct": 0
  },
  {
    "text": "Emilija nuomojasi butą; nuoma kasmet didėja 5 %. Dabar nuoma 600 € per mėnesį. Kokia nuoma po 4 metų? (Apvalinti iki euro.)",
    "options": [
      "729 €",
      "720 €",
      "766 €",
      "750 €"
    ],
    "correct": 0
  },
  {
    "text": "Iš vielos lenkiami lygiakraščiai trikampiai ir dedami vienas šalia kito. Didžiausio kraštinė 9 cm, kiekvieno kito — trečdaliu mažesnė. Koks begalinės figūros perimetras?",
    "options": [
      "<span class='frac'><sup>81</sup><sub>2</sub></span> cm",
      "27 cm",
      "<span class='frac'><sup>27</sup><sub>2</sub></span> cm",
      "54 cm"
    ],
    "correct": 0
  },
  {
    "text": "Trys skaičiai a, 40, c sudaro didėjančią aritmetinę progresiją. Skaičiai c, 24, a sudaro mažėjančią geometrinę progresiją. Raskite a.",
    "options": [
      "10",
      "20",
      "30",
      "15"
    ],
    "correct": 1
  },
  {
    "text": "Naujo automobilio vertė kasmet sumažėja 18 %. Po kelerių metų jo vertė bus mažesnė nei 40 % pirkimo kainos?",
    "options": [
      "Po 4 metų",
      "Po 5 metų",
      "Po 6 metų",
      "Po 7 metų"
    ],
    "correct": 1
  }
];

var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;

function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Uždavinys ' + (qi+1) + ' iš ' + QUESTIONS.length + '</div>';
    html += '<div class="question-text">' + q.text + '</div><div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}

function sel(qi, oi) {
  if (submitted) return; answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if(e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a = answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width = (a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent = 'Atsakyta: '+a+' / '+QUESTIONS.length;
}

function submitTest() {
  var a = answers.filter(function(x){return x!==null;}).length;
  if (a < QUESTIONS.length && !confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?')) return;
  submitted = true; document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var s = answers[qi]; if (s===q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-'+qi+'-'+oi); el.classList.remove('selected');
      if (oi===q.correct) el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if (oi===s&&s!==q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent = pct+'%';
  document.getElementById('modal-score').className = 'modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent = correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
renderQuestions();
</script>
</body>
</html>

  <style>.test-header{margin-bottom:28px}.test-header h1{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:6px}.test-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}.test-meta-item{font-size:12px;color:var(--ink3)}.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}.question-num{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}.question-text{font-size:15px;color:var(--ink);line-height:1.75;margin-bottom:16px;font-weight:500}.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:.85em;line-height:1.1}.frac sup{border-bottom:1px solid currentColor;padding:0 2px}.frac sub{padding:0 2px}.options{display:flex;flex-direction:column;gap:8px}.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s;background:var(--bg);user-select:none}.option:hover{border-color:var(--accent);background:var(--accent-bg)}.option.selected{border-color:var(--accent);background:var(--accent-bg)}.option.correct{border-color:var(--green);background:var(--green-bg)}.option.wrong{border-color:var(--red);background:var(--red-bg)}.option.show-correct{border-color:var(--green);background:var(--green-bg)}.option-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}.option.selected .option-letter{background:var(--accent);color:#fff}.option.correct .option-letter{background:var(--green);color:#fff}.option.wrong .option-letter{background:var(--red);color:#fff}.option.show-correct .option-letter{background:var(--green);color:#fff}.option-text{font-size:14px;color:var(--ink2);line-height:1.5}.option.selected .option-text{color:var(--accent)}.option.correct .option-text{color:var(--green)}.option.wrong .option-text{color:var(--red)}.option.show-correct .option-text{color:var(--green)}.submit-area{margin-top:28px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}.submit-btn{padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}.submit-btn:hover{background:#1e40af}.submit-btn:disabled{background:var(--ink3);cursor:not-allowed}.answered-count{font-size:13px;color:var(--ink3)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px 40px;max-width:480px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}.modal-score{font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}.modal-score.excellent{color:var(--green)}.modal-score.good{color:var(--accent)}.modal-score.poor{color:var(--red)}.modal-label{font-size:14px;color:var(--ink3);margin-bottom:20px}.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:16px;background:var(--bg3);border-radius:var(--radius)}.modal-stat-val{font-size:22px;font-weight:600;color:var(--ink)}.modal-stat-key{font-size:11px;color:var(--ink3);margin-top:2px}.modal-btns{display:flex;gap:10px;justify-content:center}.modal-feedback{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}</style>

<body>

        <div class="test-meta">
          <div class="test-meta-item">📝 10 klausimų</div>
          <div class="test-meta-item">📚 T1 · T2 · T3</div>

</div>

  <div class="modal">
    <div class="modal-score" id="modal-score"></div>

    <div class="modal-stats">
      <div><div class="modal-stat-val" id="stat-correct"></div><div class="modal-stat-key">Teisingi</div></div>
      <div><div class="modal-stat-val" id="stat-wrong"></div><div class="modal-stat-key">Neteisingi</div></div>

    </div>

</div>
<script src="../../../../js/main.js"></script>
<script>var QUESTIONS=[{"text": "Kas yra geometrinė progresija?", "options": ["Seka, kurioje prie kiekvieno nario pridedamas pastovus skaičius", "Seka, kurioje kiekvienas narys gaunamas ankstesnį dauginant iš pastovaus skaičiaus q", "Seka, kurioje visi nariai vienodi", "Seka, kurioje nariai kinta atsitiktinai"], "correct": 1}, {"text": "Ką žymi simbolis q geometrinėje progresijoje?", "options": ["Pirmąjį narį", "Narių sumą", "Vardiklį — skaičių, iš kurio dauginamas kiekvienas narys", "Paskutinįjį narį"], "correct": 2}, {"text": "Kokia yra geometrinės progresijos n-tojo nario formulė?", "options": ["bₙ = b₁ + q · (n−1)", "bₙ = b₁ · qⁿ", "bₙ = b₁ · qⁿ⁻¹", "bₙ = b₁ · (n−1) · q"], "correct": 2}, {"text": "Geometrinė progresija: 2, 6, 18, 54, ... Koks jos vardiklis q?", "options": ["q = 2", "q = 3", "q = 4", "q = 6"], "correct": 1}, {"text": "Geometrinė progresija: 4, 8, 16, 32, ... Koks 6-asis narys?", "options": ["b₆ = 96", "b₆ = 128", "b₆ = 64", "b₆ = 256"], "correct": 1}, {"text": "Nykstamoji geometrinė progresija yra, kai:", "options": ["q > 1", "q = 1", "|q| < 1", "q < 0"], "correct": 2}, {"text": "Begalinės geometrinės progresijos sumos formulė (kai |q| < 1):", "options": ["S = <span class=\"frac\"><sup>b₁</sup><sub>1 + q</sub></span>", "S = <span class=\"frac\"><sup>b₁</sup><sub>1 − q</sub></span>", "S = b₁ · q", "S = <span class=\"frac\"><sup>b₁ · q</sup><sub>1 − q</sub></span>"], "correct": 1}, {"text": "Geometrinės progresijos vidurio savybė teigia, kad:", "options": ["bₙ = bₙ₋₁ + bₙ₊₁", "bₙ = <span class=\"frac\"><sup>bₙ₋₁ + bₙ₊₁</sup><sub>2</sub></span>", "bₙ² = bₙ₋₁ · bₙ₊₁", "bₙ = bₙ₋₁ · bₙ₊₁"], "correct": 2}, {"text": "Geometrinė progresija: 81, 27, 9, 3, ... Koks jos vardiklis q?", "options": ["q = <span class=\"frac\"><sup>1</sup><sub>4</sub></span>", "q = <span class=\"frac\"><sup>1</sup><sub>3</sub></span>", "q = 3", "q = −<span class=\"frac\"><sup>1</sup><sub>3</sub></span>"], "correct": 1}, {"text": "Kada begalinės geometrinės progresijos suma NEEGZISTUOJA?", "options": ["Kai q = 0", "Kai |q| < 1", "Kai |q| ≥ 1", "Kai b₁ > 0"], "correct": 2}];
var answers = new Array(QUESTIONS.length).fill(null);
var submitted = false;
function renderQuestions() {
  var html = '';
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi];
    html += '<div class="question-card"><div class="question-num">Klausimas ' + (qi+1) + ' iš ' + QUESTIONS.length + '</div>';
    html += '<div class="question-text">' + q.text + '</div><div class="options">';
    var L = ['A','B','C','D'];
    for (var oi = 0; oi < q.options.length; oi++) {
      html += '<div class="option" id="opt-'+qi+'-'+oi+'" onclick="sel('+qi+','+oi+')">';
      html += '<div class="option-letter">'+L[oi]+'</div><div class="option-text">'+q.options[oi]+'</div></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('questions').innerHTML = html;
}
function sel(qi, oi) {
  if (submitted) return; answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var e = document.getElementById('opt-'+qi+'-'+i); if(e) e.classList.remove('selected'); }
  document.getElementById('opt-'+qi+'-'+oi).classList.add('selected');
  var a = answers.filter(function(x){return x!==null;}).length;
  document.getElementById('progress').style.width = (a/QUESTIONS.length*100)+'%';
  document.getElementById('answered-count').textContent = 'Atsakyta: '+a+' / '+QUESTIONS.length;
}
function submitTest() {
  var a = answers.filter(function(x){return x!==null;}).length;
  if (a < QUESTIONS.length && !confirm('Dar neatsakyta '+(QUESTIONS.length-a)+' klausimai. Pateikti?')) return;
  submitted = true; document.getElementById('submit-btn').disabled = true;
  var correct = 0;
  for (var qi = 0; qi < QUESTIONS.length; qi++) {
    var q = QUESTIONS[qi]; var s = answers[qi]; if (s===q.correct) correct++;
    for (var oi = 0; oi < q.options.length; oi++) {
      var el = document.getElementById('opt-'+qi+'-'+oi); el.classList.remove('selected');
      if (oi===q.correct) el.classList.add(s===q.correct&&oi===s?'correct':'show-correct');
      if (oi===s&&s!==q.correct) el.classList.add('wrong');
    }
  }
  var pct = Math.round(correct/QUESTIONS.length*100);
  document.getElementById('modal-score').textContent = pct+'%';
  document.getElementById('modal-score').className = 'modal-score '+(pct>=80?'excellent':pct>=50?'good':'poor');
  document.getElementById('modal-feedback').textContent = pct>=90?'Puikiai! 🎉':pct>=70?'Gerai! 👍':pct>=50?'Neblogai, dar pasikartok':'Reikia pasimokyti 📖';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = QUESTIONS.length-correct;
  document.getElementById('stat-pct').textContent = correct+'/'+QUESTIONS.length;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
renderQuestions();
</script>
</body>

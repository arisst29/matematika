 text:"Apskai\u010diuokite sin(45\u00b0 + 30\u00b0) naudodami sud\u0117tinio kampo formul\u0119.",
 opts:["\u221a6/4 + \u221a2/4","(\u221a6 + \u221a2)/4","(\u221a3 + 1)/2","1/2"],

{type:"open2", pts:2,
 text:"Turiš 20% ir 50% druskos tirpalus. Kiek litrų kiekvieno reikia sumišyti, kad gauti 12 litrų 30% druskos tirpalo?",

{type:"open2", pts:2,
 text:"Lėktuvas skrenda 2400 km atstuą. Su vėju skrydis užtruko 6 valandas, prieiš vėją — 8 valandas. Raskite lėktuvo greįtį ramiame ore ir vėjo greįtį.",
 labels:["Lėktuvas:","Vėjas:"], sfx:["km/h","km/h"], answers:["350","50"]}

];
var MP=40;
var ans=QS.map(function(){return null;});
var multiSel={};
var done=false;

function render(){
  var h='';
  for(var qi=0;qi<QS.length;qi++){
    var q=QS[qi];var t2=q.pts===2;
    h+='<div class="q-card"><div class="q-header"><span class="q-num">'+(qi+1)+' klausimas iš '+QS.length+'</span>';
    h+='<span class="q-pts'+(t2?' t2':'')+'">'+q.pts+' taška'+(t2?'i':'s')+'</span></div>';
    h+='<div class="q-text">'+q.text+'</div>';
    if(q.type==='mcq'){
      h+='<div class="opts-radio">';
      for(var oi=0;oi<q.opts.length;oi++)
        h+='<div class="opt-r" id="r'+qi+'x'+oi+'" onclick="pickMCQ('+qi+','+oi+')"><div class="radio-icon"></div><div class="opt-rt">'+q.opts[oi]+'</div></div>';
      h+='</div>';
    }else if(q.type==='multi'){
      h+='<div class="multi-hint">\u2611 Pažmėkite būtent 2 atsakymus</div><div class="opts-check">';
      for(var oi=0;oi<q.opts.length;oi++)
        h+='<div class="opt-c" id="c'+qi+'x'+oi+'" onclick="pickMulti('+qi+','+oi+')"><div class="check-icon" id="ci'+qi+'x'+oi+'"></div><div class="opt-ct">'+q.opts[oi]+'</div></div>';
      h+='</div>';
    }else if(q.type==='open1'){
      h+='<div class="open-row"><span class="open-label">'+q.labels[0]+'</span>';
      h+='<input class="open-inp" id="i'+qi+'_0" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx&&q.sfx[0])h+='<span class="open-label">'+q.sfx[0]+'</span>';
      h+='</div><div class="fb" id="f'+qi+'"></div>';
    }else{
      h+='<div class="open-row"><span class="open-label">'+q.labels[0]+'</span>';
      h+='<input class="open-inp" id="i'+qi+'_0" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx&&q.sfx[0])h+='<span class="open-label">'+q.sfx[0]+'</span>';
      h+='<span class="open-label" style="margin-left:12px">'+q.labels[1]+'</span>';
      h+='<input class="open-inp" id="i'+qi+'_1" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx&&q.sfx[1])h+='<span class="open-label">'+q.sfx[1]+'</span>';
      h+='</div><div class="fb" id="f'+qi+'"></div>';
    }
    h+='</div>';
  }
  document.getElementById('qs').innerHTML=h;upd();
}

function pickMCQ(qi,oi){
  if(done)return;ans[qi]=oi;
  for(var i=0;i<6;i++){var e=document.getElementById('r'+qi+'x'+i);if(e)e.classList.remove('sel');}
  document.getElementById('r'+qi+'x'+oi).classList.add('sel');upd();
}

function pickMulti(qi,oi){
  if(done)return;if(!multiSel[qi])multiSel[qi]=[];
  var idx=multiSel[qi].indexOf(oi);
  var el=document.getElementById('c'+qi+'x'+oi);var ci=document.getElementById('ci'+qi+'x'+oi);
  if(idx>=0){multiSel[qi].splice(idx,1);el.classList.remove('sel');ci.textContent='';}
  else if(multiSel[qi].length<2){multiSel[qi].push(oi);el.classList.add('sel');ci.textContent='\u2713';}
  ans[qi]=multiSel[qi].length===2?multiSel[qi].slice().sort(function(a,b){return a-b;}):null;upd();
}

function typed(qi){
  if(done)return;var q=QS[qi];
  if(q.type==='open1'){ans[qi]=document.getElementById('i'+qi+'_0').value.trim()||null;}
  else{
    var v0=document.getElementById('i'+qi+'_0').value.trim();
    var v1=document.getElementById('i'+qi+'_1').value.trim();
    ans[qi]=(v0||v1)?[v0,v1]:null;
  }
  upd();
}

function upd(){
  var n=ans.filter(function(x){return x!==null;}).length;
  document.getElementById('pf').style.width=(n/QS.length*100)+'%';
  document.getElementById('ac').textContent='Atsakyta: '+n+' / '+QS.length;
}

function chk(v,a){
  if(v===null||v===undefined||v==='')return false;
  var vv=String(v).trim().replace(',','.').toLowerCase().replace(/\s+/g,'');
  var aa=String(a).trim().replace(',','.').toLowerCase().replace(/\s+/g,'');
  if(vv===aa)return true;
  var nv=parseFloat(vv),na=parseFloat(aa);
  if(!isNaN(nv)&&!isNaN(na)&&Math.abs(nv-na)<=0.5)return true;
  return false;
}

function submitExam(){
  var n=ans.filter(function(x){return x!==null;}).length;
  if(n<QS.length&&!confirm('Dar neatsakyta '+(QS.length-n)+' klausimų. Pateikti?'))return;
  done=true;document.getElementById('sb').disabled=true;var pts=0;
  for(var qi=0;qi<QS.length;qi++){
    var q=QS[qi];var s=ans[qi];
    if(q.type==='mcq'){
      var ok=(s===q.correct);if(ok)pts+=1;
      for(var oi=0;oi<q.opts.length;oi++){
        var el=document.getElementById('r'+qi+'x'+oi);if(!el)continue;
        el.classList.remove('sel');
        if(oi===q.correct)el.classList.add(ok&&oi===s?'ok':'show');
        else if(oi===s&&!ok)el.classList.add('bad');
      }
    }else if(q.type==='multi'){
      var cor=q.correct.slice().sort(function(a,b){return a-b;});var got=s?s.slice():[];
      var ok2=(got.length===2&&got[0]===cor[0]&&got[1]===cor[1]);if(ok2)pts+=2;
      for(var oi=0;oi<q.opts.length;oi++){
        var el=document.getElementById('c'+qi+'x'+oi);var ci=document.getElementById('ci'+qi+'x'+oi);if(!el)continue;
        el.classList.remove('sel');
        if(cor.indexOf(oi)>=0){el.classList.add(ok2?'ok':'show');ci.textContent='\u2713';}
        else if(got.indexOf(oi)>=0){el.classList.add('bad');ci.textContent='\u2717';}
        else ci.textContent='';
      }
    }else if(q.type==='open1'){
      var inp=document.getElementById('i'+qi+'_0');var fb=document.getElementById('f'+qi);
      var ok3=chk(s,q.answers[0]);
      if(ok3){pts+=1;inp.classList.add('ci');fb.textContent='Teisingai \u2713';fb.className='fb show ok';}
      else{inp.classList.add('wi');fb.textContent='Atsakymas: '+q.answers[0];fb.className='fb show bad';}
      inp.disabled=true;
    }else{
      var inp0=document.getElementById('i'+qi+'_0');var inp1=document.getElementById('i'+qi+'_1');var fb=document.getElementById('f'+qi);
      var v0=s?s[0]:'';var v1=s?s[1]:'';
      var ok0=chk(v0,q.answers[0]);var ok1=chk(v1,q.answers[1]);
      if(ok0&&ok1){pts+=2;fb.textContent='Teisingai \u2713';fb.className='fb show ok';}
      else{fb.textContent='Atsakymai: '+q.answers[0]+' ir '+q.answers[1];fb.className='fb show bad';}
      inp0.classList.add(ok0?'ci':'wi');inp0.disabled=true;
      inp1.classList.add(ok1?'ci':'wi');inp1.disabled=true;
    }
  }
  var pct=Math.round(pts/MP*100);
  document.getElementById('mpct').textContent=pct+'%';
  document.getElementById('mpct').className='mp '+(pct>=85?'ex':pct>=50?'good':'poor');
  document.getElementById('mf').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasimokyti';
  document.getElementById('ms').textContent='Surinkta: '+pts+' iš '+MP+' taškų';
  document.getElementById('sc').textContent=pts;document.getElementById('sw').textContent=MP-pts;document.getElementById('sp').textContent=pct+'%';
  document.getElementById('mbg').classList.add('open');
}
function closeM(){document.getElementById('mbg').classList.remove('open');}
render();
</script>
</body>
</html>

<script>
var QS = [

// REIŠKINIAI — naujos temos: laipsniai, kubas, išskaidymas
{type:"mcq", pts:1,
 text:"Apskai\u010diuokite: (0,04)^(\u22123/2).",

 correct:0},

{type:"mcq", pts:1,
 text:"Kam lygus rei\u0161kinys \u00b3\u221a(x+2)\u00b3 + \u2074\u221a(3\u2212x)\u2074, kai x < 3?",
 opts:["5","x + 5","2x \u2212 1","|2x \u2212 1|"],
 correct:0},

{type:"mcq", pts:1,
 text:"Nustatykite rei\u0161kinio \u221a(x+3) / \u221a(5\u2212x) apibr\u0117\u017eimo srit\u012f.",
 opts:["[\u22123; 5)","(\u22123; 5]","(\u22123; 5)","[\u22123; 5]"],

{type:"open1", pts:1,
 text:"Apskai\u010diuokite: log\u2083(5) \u00b7 log\u2085(7) \u00b7 log\u2087(9).",

// SEKOS
{type:"open1", pts:1,
 text:"Aritmetin\u0117s progresijos a\u2081 = 1, d = 2. Apskai\u010diuokite S\u2081\u2080\u2080.",

{type:"mcq", pts:1,

// FUNKCIJOS — grandininis logaritmas, atvirkštinė, sudėtinė
{type:"open2", pts:2,
 text:"I\u0161spr\u0119skite lygt\u012f: 3^(2x) \u2212 12 \u00b7 3\u02e3 + 27 = 0. Raskite abu sprendinius.",
 labels:["x\u2081 =","x\u2082 ="], answers:["1","2"]},

{type:"open1", pts:1,
 text:"Funkcija f(x) = 2x \u2212 1. Apskai\u010diuokite f\u207b\u00b9(3).",
 labels:["f\u207b\u00b9(3) ="], answers:["2"]},

{type:"mcq", pts:1,
 text:"Kokio \u017eenklo yra funkcija f(x) = x\u00b2 \u2212 4x + 3 intervale (1; 3)?",

 correct:1},

{type:"mcq", pts:1,
 text:"I\u0161spr\u0119skite nelygyb\u0119: 4^(x+1) &gt; 8\u02e3.",
 opts:["x &gt; 4","x &lt; 4","x &gt; 2","x &lt; 2"],
 correct:0},

// TRIGONOMETRIJA — naujos: cos lygtis, arccos, nelygybė
{type:"open2", pts:2,
 text:"I\u0161spr\u0119skite lygt\u012f cos x = 1/2 intervale [\u2212180\u00b0; 180\u00b0]. Raskite abu sprendinius laipsniais.",
 labels:["x\u2081 =","x\u2082 ="], sfx:["\u00b0","\u00b0"], answers:["-60","60"]},

{type:"mcq", pts:1,
 text:"Apskai\u010diuokite arccos(cos(5\u03c0/3)) laipsniais.",

{type:"open1", pts:1,
 text:"Duota cos\u03b1 = 5/13, \u03b1 \u2208 IV ketv. Apskai\u010diuokite sin\u03b1. \u012era\u0161ykite formatu skaitiklis/vardiklis.",
 labels:["sin\u03b1 ="], answers:["-12/13"]},

{type:"mcq", pts:1,
 text:"f(x) = tg x reik\u0161mi\u0173 sritis yra:",
 opts:["(\u2212\u221e; +\u221e)","[\u22121; 1]","(0; +\u221e)","[\u22121; 0) \u222a (0; 1]"],
 correct:0},

// VEKTORIAI — statmenumas, kolinearumas, naujos temos
{type:"mcq", pts:1,
 text:`Ar vektoriai <span class="vec">a</span> = (\u22121; 3) ir <span class="vec">b</span> = (3; 1) yra statmeni?`,
 opts:["Taip, nes <span class=\"vec\">a</span> \u00b7 <span class=\"vec\">b</span> = 0","Ne, nes <span class=\"vec\">a</span> \u00b7 <span class=\"vec\">b</span> \u2260 0","Taip, nes jie kolinear\u016bs","Ne, nes |<span class=\"vec\">a</span>| \u2260 |<span class=\"vec\">b</span>|"],
 correct:0},

{type:"mcq", pts:1,
 text:"Ta\u0161kai A(1; 1), B(3; 5), C(5; 9). Koks j\u0173 tarpusavio ryšys?",
 opts:["Jie vienoje tiesėje","Sudaro stačiakamp\u012f trikamp\u012f","Sudaro lygiakrat\u012f trikamp\u012f","Jie nesusiję"],
 correct:0},

{type:"open1", pts:1,
 text:`Duota |<span class="vec">a</span> + <span class="vec">b</span>|\u00b2 = 45, |<span class="vec">a</span>| = 4, |<span class="vec">b</span>| = 5. Apskai\u010diuokite <span class="vec">a</span> \u00b7 <span class="vec">b</span>.`,
 labels:[`<span class="vec">a</span> \u00b7 <span class="vec">b</span> =`], answers:["2"]},

{type:"open2", pts:2,
 text:`Rombo ABCD kra\u0161tin\u0117 lygi 6 cm, kampas A = 120\u00b0. Apskai\u010diuokite abi \u012fstraiagon\u0117s: ilgesn\u0105j\u0105 d\u2081 ir trumpesni\u0105j\u0105 d\u2082.`,
 labels:["d\u2081 =","d\u2082 ="], sfx:["cm","cm"], answers:["6","6"]},

// PLANIMETRIJA — naujos: stygos, Talio, R
{type:"mcq", pts:1,
 text:`Apskritime dvi stygos AB ir CD kertasi taške E. AE = 4, EB = 9, CE = 6. Apskai\u010diuokite ED.
<div class="fig"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:200px;height:auto">
  <circle cx="100" cy="100" r="80" fill="#f0f6ff" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="30" y1="60" x2="175" y2="145" stroke="#1d4ed8" stroke-width="1.8"/>
  <line x1="25" y1="150" x2="180" y2="60" stroke="#dc2626" stroke-width="1.8"/>
  <circle cx="97" cy="98" r="3" fill="#374151"/>
  <text x="100" y="93" font-size="11" fill="#374151" font-weight="600">E</text>
  <text x="18" y="58" font-size="11" fill="#1d4ed8" font-weight="700">A</text>
  <text x="176" y="150" font-size="11" fill="#1d4ed8" font-weight="700">B</text>
  <text x="18" y="155" font-size="11" fill="#dc2626" font-weight="700">C</text>
  <text x="181" y="58" font-size="11" fill="#dc2626" font-weight="700">D</text>
  <text x="52" y="87" font-size="10" fill="#1d4ed8">AE=4</text>
  <text x="130" y="130" font-size="10" fill="#1d4ed8">EB=9</text>
  <text x="42" y="130" font-size="10" fill="#dc2626">CE=6</text>
  <text x="125" y="72" font-size="10" fill="#dc2626">ED=?</text>
</svg></div>`,
 opts:["6","4","8","9"],
 correct:0},

{type:"open1", pts:1,
 text:"Trikampyje MN \u2225 BC, AM = 4, MB = 6, BC = 25 cm. Apskai\u010diuokite MN.",
 labels:["MN ="], answers:["10"]},

{type:"mcq", pts:1,
 text:"Stačiojo trikampio katetai AC = 6 cm ir BC = 8 cm. Apskai\u010diuokite apibr\u0117\u017etojo apskritimo spindul\u012f R.",
 opts:["5 cm","4 cm","10 cm","6 cm"],
 correct:0},

{type:"open1", pts:1,
 text:"Lygiašonio trikampio kraštinės 10, 10 ir 12 cm. Apskaičiuokite trikampio plotą.",
 labels:["S ="], answers:["48"]},

// LYGTYS — naujos: kartotinis sprendinys, dviguba nelygybė, stačiakampis
{type:"mcq", pts:1,
 text:"Su kuriomis k reik\u0161m\u0117mis lygtis x\u00b2 + kx + 9 = 0 turi vien\u0105 kartotini\u012f sprendini?",
 opts:["k = \u00b16","k = \u00b13","k = \u00b19","k = 0"],

{type:"mcq", pts:1,
 text:"I\u0161spr\u0119skite dvigun\u0105j\u0105 nelygyb\u0119: \u22123 &lt; 5 \u2212 2x \u2264 9.",
 opts:["x \u2208 [\u22122; 4)","x \u2208 (\u22122; 4]","x \u2208 [\u22124; 2)","x \u2208 (\u22124; 2]"],

{type:"open2", pts:2,

{type:"multi", pts:2,
 text:"Kurie teiginiai yra teisingi? Pa\u017em\u0117kite <strong>du</strong> teisingus atsakymus.",

{type:"mcq", pts:1,

{type:"mcq", pts:1,

{type:"mcq", pts:1,

{type:"mcq", pts:1,

{type:"open1", pts:1,

// ── SUNKŪS — PASKUTINIAI ──
{type:"open2", pts:2,
 text:"Dvie\u017enklio skai\u010diaus skaitmen\u0173 suma lygi 11. Pradinis skai\u010dius yra 45 didesnis u\u017e skai\u010di\u0173, gautą apvert\u0173s jo skaitmenis tvarką. Raskite pradinius skaitmenis.",

{type:"open2", pts:2,
 text:"Du b\u0117gikai vienu metu i\u0161b\u0117ga i\u0161 to paties ta\u0161ko priei\u0161ingomis kryptimis. Pirmasis b\u0117ga 8 km/h greiu, antrasis \u2014 12 km/h. Po kiek valand\u0173 atstumas tarp j\u0173 bus 40 km? Koks atstumas tarp j\u0173 bus po 3 valand\u0173?",

];

var MP=40;
var ans=QS.map(function(){return null;});
var multiSel={};
var done=false;

function render(){
  var h='';
  for(var qi=0;qi<QS.length;qi++){
    var q=QS[qi];var t2=q.pts===2;
    h+='<div class="q-card"><div class="q-header"><span class="q-num">'+(qi+1)+' klausimas iš '+QS.length+'</span>';
    h+='<span class="q-pts'+(t2?' t2':'')+'">'+q.pts+' taška'+(t2?'i':'s')+'</span></div>';
    h+='<div class="q-text">'+q.text+'</div>';
    if(q.type==='mcq'){
      h+='<div class="opts-radio">';
      for(var oi=0;oi<q.opts.length;oi++)
        h+='<div class="opt-r" id="r'+qi+'x'+oi+'" onclick="pickMCQ('+qi+','+oi+')"><div class="radio-icon"></div><div class="opt-rt">'+q.opts[oi]+'</div></div>';
      h+='</div>';
    }else if(q.type==='multi'){
      h+='<div class="multi-hint">\u2611 Pa\u017em\u0117kite b\u016btent 2 atsakymus</div><div class="opts-check">';
      for(var oi=0;oi<q.opts.length;oi++)
        h+='<div class="opt-c" id="c'+qi+'x'+oi+'" onclick="pickMulti('+qi+','+oi+')"><div class="check-icon" id="ci'+qi+'x'+oi+'"></div><div class="opt-ct">'+q.opts[oi]+'</div></div>';
      h+='</div>';
    }else if(q.type==='open1'){
      h+='<div class="open-row"><span class="open-label">'+q.labels[0]+'</span>';
      h+='<input class="open-inp" id="i'+qi+'_0" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx&&q.sfx[0])h+='<span class="open-label">'+q.sfx[0]+'</span>';
      h+='</div><div class="fb" id="f'+qi+'"></div>';
    }else{
      h+='<div class="open-row"><span class="open-label">'+q.labels[0]+'</span>';
      h+='<input class="open-inp" id="i'+qi+'_0" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx&&q.sfx[0])h+='<span class="open-label">'+q.sfx[0]+'</span>';
      h+='<span class="open-label" style="margin-left:12px">'+q.labels[1]+'</span>';
      h+='<input class="open-inp" id="i'+qi+'_1" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx&&q.sfx[1])h+='<span class="open-label">'+q.sfx[1]+'</span>';
      h+='</div><div class="fb" id="f'+qi+'"></div>';
    }
    h+='</div>';
  }
  document.getElementById('qs').innerHTML=h;upd();
}

function pickMCQ(qi,oi){
  if(done)return;ans[qi]=oi;
  for(var i=0;i<6;i++){var e=document.getElementById('r'+qi+'x'+i);if(e)e.classList.remove('sel');}
  document.getElementById('r'+qi+'x'+oi).classList.add('sel');upd();
}

function pickMulti(qi,oi){
  if(done)return;if(!multiSel[qi])multiSel[qi]=[];
  var idx=multiSel[qi].indexOf(oi);
  var el=document.getElementById('c'+qi+'x'+oi);var ci=document.getElementById('ci'+qi+'x'+oi);
  if(idx>=0){multiSel[qi].splice(idx,1);el.classList.remove('sel');ci.textContent='';}
  else if(multiSel[qi].length<2){multiSel[qi].push(oi);el.classList.add('sel');ci.textContent='\u2713';}
  ans[qi]=multiSel[qi].length===2?multiSel[qi].slice().sort(function(a,b){return a-b;}):null;upd();
}

function typed(qi){
  if(done)return;var q=QS[qi];
  if(q.type==='open1'){ans[qi]=document.getElementById('i'+qi+'_0').value.trim()||null;}
  else{
    var v0=document.getElementById('i'+qi+'_0').value.trim();
    var v1=document.getElementById('i'+qi+'_1').value.trim();
    ans[qi]=(v0||v1)?[v0,v1]:null;
  }
  upd();
}

function upd(){
  var n=ans.filter(function(x){return x!==null;}).length;
  document.getElementById('pf').style.width=(n/QS.length*100)+'%';
  document.getElementById('ac').textContent='Atsakyta: '+n+' / '+QS.length;
}

function chk(v,a){
  if(v===null||v===undefined||v==='')return false;
  var vv=String(v).trim().replace(',','.').toLowerCase().replace(/\s+/g,'');
  var aa=String(a).trim().replace(',','.').toLowerCase().replace(/\s+/g,'');
  if(vv===aa)return true;
  var nv=parseFloat(vv),na=parseFloat(aa);
  if(!isNaN(nv)&&!isNaN(na)&&Math.abs(nv-na)<=0.5)return true;
  return false;
}

function submitExam(){
  var n=ans.filter(function(x){return x!==null;}).length;
  if(n<QS.length&&!confirm('Dar neatsakyta '+(QS.length-n)+' klausimų. Pateikti?'))return;
  done=true;document.getElementById('sb').disabled=true;var pts=0;
  for(var qi=0;qi<QS.length;qi++){
    var q=QS[qi];var s=ans[qi];
    if(q.type==='mcq'){
      var ok=(s===q.correct);if(ok)pts+=1;
      for(var oi=0;oi<q.opts.length;oi++){
        var el=document.getElementById('r'+qi+'x'+oi);if(!el)continue;
        el.classList.remove('sel');
        if(oi===q.correct)el.classList.add(ok&&oi===s?'ok':'show');
        else if(oi===s&&!ok)el.classList.add('bad');
      }
    }else if(q.type==='multi'){
      var cor=q.correct.slice().sort(function(a,b){return a-b;});var got=s?s.slice():[];
      var ok2=(got.length===2&&got[0]===cor[0]&&got[1]===cor[1]);if(ok2)pts+=2;
      for(var oi=0;oi<q.opts.length;oi++){
        var el=document.getElementById('c'+qi+'x'+oi);var ci=document.getElementById('ci'+qi+'x'+oi);if(!el)continue;
        el.classList.remove('sel');
        if(cor.indexOf(oi)>=0){el.classList.add(ok2?'ok':'show');ci.textContent='\u2713';}
        else if(got.indexOf(oi)>=0){el.classList.add('bad');ci.textContent='\u2717';}
        else ci.textContent='';
      }
    }else if(q.type==='open1'){
      var inp=document.getElementById('i'+qi+'_0');var fb=document.getElementById('f'+qi);
      var ok3=chk(s,q.answers[0]);
      if(ok3){pts+=1;inp.classList.add('ci');fb.textContent='Teisingai \u2713';fb.className='fb show ok';}
      else{inp.classList.add('wi');fb.textContent='Atsakymas: '+q.answers[0];fb.className='fb show bad';}
      inp.disabled=true;
    }else{
      var inp0=document.getElementById('i'+qi+'_0');var inp1=document.getElementById('i'+qi+'_1');var fb=document.getElementById('f'+qi);
      var v0=s?s[0]:'';var v1=s?s[1]:'';
      var ok0=chk(v0,q.answers[0]);var ok1=chk(v1,q.answers[1]);
      if(ok0&&ok1){pts+=2;fb.textContent='Teisingai \u2713';fb.className='fb show ok';}
      else{fb.textContent='Atsakymai: '+q.answers[0]+' ir '+q.answers[1];fb.className='fb show bad';}
      inp0.classList.add(ok0?'ci':'wi');inp0.disabled=true;
      inp1.classList.add(ok1?'ci':'wi');inp1.disabled=true;
    }
  }
  var pct=Math.round(pts/MP*100);
  document.getElementById('mpct').textContent=pct+'%';
  document.getElementById('mpct').className='mp '+(pct>=85?'ex':pct>=50?'good':'poor');
  document.getElementById('mf').textContent=pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasimokyti';
  document.getElementById('ms').textContent='Surinkta: '+pts+' iš '+MP+' taškų';
  document.getElementById('sc').textContent=pts;document.getElementById('sw').textContent=MP-pts;document.getElementById('sp').textContent=pct+'%';
  document.getElementById('mbg').classList.add('open');
}
function closeM(){document.getElementById('mbg').classList.remove('open');}
render();
</script>

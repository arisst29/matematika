  <style>
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif}
.exam-top{border-bottom:3px solid #1d4ed8;padding-bottom:20px;margin-bottom:32px}
.exam-top h1{font-size:22px;font-weight:700;color:#1a1a2e;margin:0 0 6px}
.meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.meta span{font-size:12px;color:#555;background:#f1f5f9;padding:3px 10px;border-radius:20px}
.progress-bar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:28px}
.progress-fill{height:100%;background:#1d4ed8;border-radius:3px;transition:width .3s;width:0%}
.q-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-num{font-size:11px;font-weight:700;color:#64748b;letter-spacing:.06em;text-transform:uppercase}
.q-pts{font-size:12px;font-weight:700;padding:2px 10px;border-radius:12px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.q-pts.t2{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.q-text{font-size:15px;color:#1a1a2e;line-height:1.8;margin-bottom:12px;font-weight:500}

/* MCQ — apvalūs radiobutton stiliaus */
.opts-radio{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.opt-r{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;background:#fff;user-select:none}
.opt-r:hover{border-color:#1d4ed8;background:#eff6ff}
.opt-r.sel{border-color:#1d4ed8;background:#eff6ff}
.opt-r.ok{border-color:#16a34a;background:#f0fdf4}
.opt-r.bad{border-color:#dc2626;background:#fef2f2}
.opt-r.show{border-color:#16a34a;background:#f0fdf4}
.radio-icon{width:20px;height:20px;border-radius:50%;border:2px solid #cbd5e1;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.opt-r.sel .radio-icon{border-color:#1d4ed8;background:#1d4ed8}
.opt-r.sel .radio-icon::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.opt-r.ok .radio-icon{border-color:#16a34a;background:#16a34a}
.opt-r.ok .radio-icon::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.opt-r.bad .radio-icon{border-color:#dc2626;background:#dc2626}
.opt-r.bad .radio-icon::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.opt-r.show .radio-icon{border-color:#16a34a;background:#16a34a}
.opt-r.show .radio-icon::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.opt-rt{font-size:14px;color:#334155;line-height:1.5}

/* Multi-select — kvadratiniai checkbox stiliaus */
.multi-hint{font-size:12px;color:#7c3aed;background:#f3e8ff;border:1px solid #c4b5fd;border-radius:6px;padding:4px 10px;display:inline-block;margin-bottom:8px}
.opts-check{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.opt-c{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;background:#fff;user-select:none}
.opt-c:hover{border-color:#7c3aed;background:#f3e8ff}
.opt-c.sel{border-color:#7c3aed;background:#f3e8ff}
.opt-c.ok{border-color:#16a34a;background:#f0fdf4}
.opt-c.bad{border-color:#dc2626;background:#fef2f2}
.opt-c.show{border-color:#16a34a;background:#f0fdf4}
.check-icon{width:20px;height:20px;border-radius:4px;border:2px solid #cbd5e1;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;transition:all .12s}
.opt-c.sel .check-icon{border-color:#7c3aed;background:#7c3aed;color:#fff}
.opt-c.ok .check-icon{border-color:#16a34a;background:#16a34a;color:#fff}
.opt-c.bad .check-icon{border-color:#dc2626;background:#dc2626;color:#fff}
.opt-c.show .check-icon{border-color:#16a34a;background:#16a34a;color:#fff}
.opt-ct{font-size:14px;color:#334155;line-height:1.5}

/* Atviri laukeliai */
.open-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:10px}
.open-label{font-size:14px;color:#334155;font-style:italic}
.open-inp{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;font-family:inherit;width:90px;outline:none;text-align:center}
.open-inp:focus{border-color:#1d4ed8}
.open-inp.ci{border-color:#16a34a;background:#f0fdf4;color:#16a34a;font-weight:700}
.open-inp.wi{border-color:#dc2626;background:#fef2f2;color:#dc2626}
.fb{font-size:13px;font-weight:600;margin-top:6px;display:none}
.fb.show{display:block}.fb.ok{color:#16a34a}.fb.bad{color:#dc2626}

/* SVG wrapper */
.fig{margin:12px 0;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;display:inline-block}
.vec{position:relative;display:inline-block;margin-right:2px}
.vec::after{content:'→';position:absolute;top:-0.52em;left:50%;transform:translateX(-50%);font-size:0.62em;line-height:1;font-style:normal}


.submit-row{margin-top:32px;padding-top:20px;border-top:2px solid #e2e8f0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.sub-btn{padding:12px 32px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.sub-btn:disabled{background:#94a3b8;cursor:not-allowed}
.ai{font-size:13px;color:#64748b}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:44px 48px;max-width:520px;width:92%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mp{font-size:72px;font-weight:800;line-height:1;margin-bottom:4px}
.mp.ex{color:#16a34a}.mp.good{color:#1d4ed8}.mp.poor{color:#dc2626}
.mf{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.ms{font-size:13px;color:#64748b;margin-bottom:20px}
.mst{display:flex;justify-content:center;gap:28px;padding:16px;background:#f8fafc;border-radius:10px;margin-bottom:20px}
.msv{font-size:24px;font-weight:700;color:#1a1a2e}
.msk{font-size:11px;color:#94a3b8;margin-top:2px;text-transform:uppercase}
.mbtns{display:flex;gap:10px;justify-content:center}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#334155}
.btn.p{background:#1d4ed8;color:#fff;border-color:#1d4ed8}

<script>var QS = [

{type:"open2", pts:2,
 text:`Vektorių koordinatės: <span class="vec">a</span> = (1; √3) ir <span class="vec">b</span> = (2; 0). Apskaičiuokite vektoriaus <span class="vec">a</span> ilgį ir vektorių tarpusavio kampą α laipsniais.`,
 labels:[`|<span class="vec">a</span>| =`,"α ="], sfx:["","°"], answers:["2","60"]},

{type:"open2", pts:2,
 text:"Išspręskite lygtį sin x = √2/2 intervale [0°; 360°]. Atsakymą įrašykite laipsniais.",
 labels:["x₁ =","x₂ ="], sfx:["°","°"], answers:["45","135"]},

{type:"mcq", pts:1,
 text:`Apskaičiuokite trikampio ABC plotą.
<div class="fig"><svg viewBox="0 0 270 210" xmlns="http://www.w3.org/2000/svg" style="width:270px;height:auto">
  <polygon points="30,178 250,178 100,48" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.8"/>

  <text x="12" y="183" font-size="12" fill="#1a1a2e" font-weight="700">C</text>
  <circle cx="250" cy="178" r="2.5" fill="#1d4ed8"/>
  <text x="254" y="183" font-size="12" fill="#1a1a2e" font-weight="700">B</text>
  <circle cx="100" cy="48" r="2.5" fill="#1d4ed8"/>
  <text x="100" y="40" font-size="12" fill="#1a1a2e" font-weight="700" text-anchor="middle">A</text>
  <!-- Side labels -->
  <text x="52" y="118" font-size="12" fill="#1d4ed8" font-weight="600">b = 8</text>

  <text x="65" y="162" font-size="11" fill="#f59e0b" font-weight="700">30°</text>
</svg></div>`,
 opts:["12 cm²","24 cm²","6√3 cm²","48 cm²"],
 correct:0},

{type:"mcq", pts:1,
 text:"Išspręskite nelygybę x² − 5x + 4 &lt; 0. Pažymėkite teisingą atsakymą.",

 correct:0},

{type:"mcq", pts:1,
 text:"Kuris iš šių teiginių yra teisingas?",

{type:"mcq", pts:1,
 text:"Lygties √(3x + 4) = x sprendinys:",

 correct:1},

{type:"open1", pts:1,
 text:"Išspręskite lygtį: log₃(2x − 1) = 2.",
 labels:["x ="], answers:["5"]},

{type:"mcq", pts:1,
 text:"Geometrinės progresijos b₁ = 2, q = 3. Kuris narys lygus 486?",
 opts:["5-asis","6-asis","7-asis","8-asis"],
 correct:1},

{type:"mcq", pts:1,
 text:"Pertvarkykite reiškinį ⁶√(x⁴), kai x &gt; 0.",

{type:"open1", pts:1,
 text:`Vektorių koordinatės: <span class="vec">a</span> = (2; 3) ir <span class="vec">b</span> = (4; −1). Apskaičiuokite skaliarinę sandaugą <span class="vec">a</span> · <span class="vec">b</span>.`,
 labels:[`<span class="vec">a</span> · <span class="vec">b</span> =`], answers:["5"]},

{type:"mcq", pts:1,
 text:`Nustatykite, kurios funkcijos grafiko eskizas pavaizduotas paveiksle.
<div class="fig"><svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" style="width:200px;height:auto">

  <line x1="20" y1="155" x2="185" y2="155" stroke="#64748b" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="80" y1="170" x2="80" y2="10" stroke="#64748b" stroke-width="1.4" marker-end="url(#ah)"/>

  <line x1="77" y1="107" x2="83" y2="107" stroke="#64748b" stroke-width="1"/>

  <line x1="116" y1="107" x2="116" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- y = x³ curve: passes through (0,0), goes negative x→negative y, steep rise -->
  <path d="M 28,170 C 45,160 65,145 80,107 C 95,68 110,28 150,12" fill="none" stroke="#1d4ed8" stroke-width="2.2"/>
</svg></div>`,
 opts:["y = ³√x","y = x³","y = log₃ x","y = 3ˣ"],
 correct:1},

{type:"mcq", pts:1,
 text:"Nelygybės x² − x − 12 ≤ 0 sprendiniai:",
 opts:["x ∈ [−3; 4]","x ∈ (−∞; −3] ∪ [4; +∞)","x ∈ (−3; 4)","x ∈ [−4; 3]"],

{type:"open1", pts:1,
 text:`Trikampio kraštinės a = 5 cm, b = 8 cm, kampas C = 60°. Raskite kraštinę c.
<div class="fig"><svg viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg" style="width:240px;height:auto">

  <text x="4" y="160" font-size="11" fill="#1a1a2e" font-weight="700">C</text>
  <circle cx="220" cy="155" r="2.5" fill="#1d4ed8"/>
  <text x="224" y="160" font-size="11" fill="#1a1a2e" font-weight="700">B</text>

  <text x="184" y="100" font-size="11" fill="#1d4ed8" font-weight="600">a = 5</text>

  <text x="52" y="141" font-size="11" fill="#f59e0b" font-weight="700">60°</text>
</svg></div>`,
 labels:["c ="], answers:["7"]},

{type:"mcq", pts:1,
 text:`Paveiksle pavaizduotas vektorius <span class="vec">AB</span>. Nustatykite vektoriaus <span class="vec">AB</span> koordinates.

 text:"Nustatykite funkcijos f(x) = √(log₂(x + 4)) apibrėžimo sritį.",

{type:"multi", pts:2,
 text:"Kurie teiginiai yra teisingi? Pažymėkite <strong>du</strong> teisingus atsakymus.",

 correct:[0,1]},

{type:"mcq", pts:1,
 text:"Su kuriomis k reikšmėmis lygtis x² + kx + k + 3 = 0 turi du skirtingus realiuosius sprendinius?",
 opts:["k ∈ (−∞; −2) ∪ (6; +∞)","k ∈ (−2; 6)","k ∈ [−2; 6]","k ∈ (−∞; 2) ∪ (−6; +∞)"],
 correct:0},

{type:"mcq", pts:1,
 text:`Vektorių koordinatės: <span class="vec">a</span> = (3; −1) ir <span class="vec">b</span> = (−1; 4). Apskaičiuokite <span class="vec">a</span> + 2<span class="vec">b</span>.`,

 correct:0},

{type:"mcq", pts:1,
 text:`Iš išorinio taško F nubrėžta liestinė FB prie apskritimo. Apskaičiuokite FB ilgį.
<div class="fig"><svg viewBox="0 0 210 185" xmlns="http://www.w3.org/2000/svg" style="width:210px;height:auto">
  <!-- Circle centered at O, radius 50px = 5 units -->
  <circle cx="50" cy="130" r="50" fill="#f0f6ff" stroke="#1d4ed8" stroke-width="1.8"/>
  <!-- Center O -->

var MP = 40;
var ans = QS.map(function(){ return null; });
var multiSel = {};
var done = false;

function numAns(qi){
  return ans[qi] !== null && ans[qi] !== undefined;
}

function render(){
  var h = '';
  for(var qi=0; qi<QS.length; qi++){
    var q = QS[qi];
    var t2 = q.pts === 2;
    h += '<div class="q-card" id="qc'+qi+'">';
    h += '<div class="q-header"><span class="q-num">'+(qi+1)+' klausimas iš '+QS.length+'</span>';
    h += '<span class="q-pts'+(t2?' t2':'')+'">'+q.pts+' taška'+(t2?'i':'s')+'</span></div>';
    h += '<div class="q-text">'+q.text+'</div>';

    if(q.type === 'mcq'){
      h += '<div class="opts-radio">';
      for(var oi=0; oi<q.opts.length; oi++){
        h += '<div class="opt-r" id="r'+qi+'x'+oi+'" onclick="pickMCQ('+qi+','+oi+')">';
        h += '<div class="radio-icon" id="ri'+qi+'x'+oi+'"></div>';
        h += '<div class="opt-rt">'+q.opts[oi]+'</div></div>';
      }
      h += '</div>';

    } else if(q.type === 'multi'){
      h += '<div class="multi-hint">☑ Pažymėkite būtent 2 atsakymus</div>';
      h += '<div class="opts-check">';
      for(var oi=0; oi<q.opts.length; oi++){
        h += '<div class="opt-c" id="c'+qi+'x'+oi+'" onclick="pickMulti('+qi+','+oi+')">';
        h += '<div class="check-icon" id="ci'+qi+'x'+oi+'"></div>';
        h += '<div class="opt-ct">'+q.opts[oi]+'</div></div>';
      }
      h += '</div>';

    } else if(q.type === 'open1'){
      h += '<div class="open-row">';
      h += '<span class="open-label">'+q.labels[0]+'</span>';
      h += '<input class="open-inp" id="i'+qi+'_0" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx && q.sfx[0]) h += '<span class="open-label">'+q.sfx[0]+'</span>';
      h += '</div>';
      h += '<div class="fb" id="f'+qi+'"></div>';

    } else if(q.type === 'open2'){
      h += '<div class="open-row">';
      h += '<span class="open-label">'+q.labels[0]+'</span>';
      h += '<input class="open-inp" id="i'+qi+'_0" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx && q.sfx[0]) h += '<span class="open-label">'+q.sfx[0]+'</span>';
      h += '<span class="open-label" style="margin-left:16px">'+q.labels[1]+'</span>';
      h += '<input class="open-inp" id="i'+qi+'_1" type="text" placeholder="..." oninput="typed('+qi+')">';
      if(q.sfx && q.sfx[1]) h += '<span class="open-label">'+q.sfx[1]+'</span>';
      h += '</div>';
      h += '<div class="fb" id="f'+qi+'"></div>';
    }
    h += '</div>';
  }
  document.getElementById('qs').innerHTML = h;
  upd();
}

function pickMCQ(qi,oi){
  if(done) return;
  ans[qi] = oi;
  for(var i=0; i<6; i++){
    var el = document.getElementById('r'+qi+'x'+i);
    if(el) el.classList.remove('sel');
  }
  document.getElementById('r'+qi+'x'+oi).classList.add('sel');
  upd();
}

function pickMulti(qi,oi){
  if(done) return;
  if(!multiSel[qi]) multiSel[qi] = [];
  var idx = multiSel[qi].indexOf(oi);
  var el = document.getElementById('c'+qi+'x'+oi);
  var ci = document.getElementById('ci'+qi+'x'+oi);
  if(idx >= 0){
    multiSel[qi].splice(idx,1);
    el.classList.remove('sel');
    ci.textContent = '';
  } else if(multiSel[qi].length < 2){
    multiSel[qi].push(oi);
    el.classList.add('sel');
    ci.textContent = '✓';
  }
  ans[qi] = multiSel[qi].length === 2 ? multiSel[qi].slice().sort(function(a,b){return a-b;}) : null;
  upd();
}

function typed(qi){
  if(done) return;
  var q = QS[qi];
  if(q.type === 'open1'){
    var v = document.getElementById('i'+qi+'_0').value.trim();
    ans[qi] = v || null;
  } else {
    var v0 = document.getElementById('i'+qi+'_0').value.trim();
    var v1 = document.getElementById('i'+qi+'_1').value.trim();
    ans[qi] = (v0 || v1) ? [v0, v1] : null;
  }
  upd();
}

function upd(){
  var n = ans.filter(function(x){ return x !== null; }).length;
  document.getElementById('pf').style.width = (n/QS.length*100)+'%';
  document.getElementById('ac').textContent = 'Atsakyta: '+n+' / '+QS.length;
}

function chkNum(v, a){
  if(!v && v !== '0') return false;
  var vv = String(v).trim().replace(',','.').toLowerCase().replace(/\s+/g,'');
  var aa = String(a).trim().replace(',','.').toLowerCase().replace(/\s+/g,'');
  if(vv === aa) return true;
  var nv = parseFloat(vv), na = parseFloat(aa);
  if(!isNaN(nv) && !isNaN(na) && Math.abs(nv-na) <= 0.01) return true;
  return false;
}

function submitExam(){
  var n = ans.filter(function(x){ return x !== null; }).length;
  if(n < QS.length && !confirm('Dar neatsakyta '+(QS.length-n)+' klausimų. Pateikti?')) return;
  done = true;
  document.getElementById('sb').disabled = true;
  var pts = 0;

  for(var qi=0; qi<QS.length; qi++){
    var q = QS[qi];
    var s = ans[qi];

    if(q.type === 'mcq'){
      var ok = (s === q.correct);
      if(ok) pts += 1;
      for(var oi=0; oi<q.opts.length; oi++){
        var el = document.getElementById('r'+qi+'x'+oi);
        if(!el) continue;
        el.classList.remove('sel');
        if(oi === q.correct) el.classList.add(ok && oi===s ? 'ok' : 'show');
        else if(oi === s && !ok) el.classList.add('bad');
      }

    } else if(q.type === 'multi'){
      var cor = q.correct.slice().sort(function(a,b){return a-b;});
      var got = s ? s.slice() : [];
      var ok2 = (got.length===2 && got[0]===cor[0] && got[1]===cor[1]);
      if(ok2) pts += 2;
      for(var oi=0; oi<q.opts.length; oi++){
        var el = document.getElementById('c'+qi+'x'+oi);
        var ci = document.getElementById('ci'+qi+'x'+oi);
        if(!el) continue;
        el.classList.remove('sel');
        if(cor.indexOf(oi) >= 0){
          el.classList.add(ok2 ? 'ok' : 'show');
          ci.textContent = '✓';
        } else if(got.indexOf(oi) >= 0){
          el.classList.add('bad');
          ci.textContent = '✗';
        } else {
          ci.textContent = '';
        }
      }

    } else if(q.type === 'open1'){
      var inp = document.getElementById('i'+qi+'_0');
      var fb = document.getElementById('f'+qi);
      var ok3 = chkNum(s, q.answers[0]);
      if(ok3){ pts += 1; inp.classList.add('ci'); fb.textContent = 'Teisingai ✓'; fb.className = 'fb show ok'; }
      else { inp.classList.add('wi'); fb.textContent = 'Atsakymas: '+q.answers[0]; fb.className = 'fb show bad'; }
      inp.disabled = true;

    } else if(q.type === 'open2'){
      var inp0 = document.getElementById('i'+qi+'_0');
      var inp1 = document.getElementById('i'+qi+'_1');
      var fb = document.getElementById('f'+qi);
      var v0 = s ? s[0] : '';
      var v1 = s ? s[1] : '';
      var ok0 = chkNum(v0, q.answers[0]);
      var ok1 = chkNum(v1, q.answers[1]);
      var allOk = ok0 && ok1;
      if(allOk){ pts += 2; fb.textContent = 'Teisingai ✓'; fb.className = 'fb show ok'; }
      else { fb.textContent = 'Atsakymai: '+q.answers[0]+' ir '+q.answers[1]; fb.className = 'fb show bad'; }
      inp0.classList.add(ok0 ? 'ci' : 'wi'); inp0.disabled = true;
      inp1.classList.add(ok1 ? 'ci' : 'wi'); inp1.disabled = true;
    }
  }

  var pct = Math.round(pts/MP*100);
  document.getElementById('mpct').textContent = pct+'%';
  document.getElementById('mpct').className = 'mp '+(pct>=85?'ex':pct>=50?'good':'poor');
  document.getElementById('mf').textContent = pct>=90?'Puikiai!':pct>=70?'Gerai!':pct>=50?'Neblogai':'Reikia pasimokyti';
  document.getElementById('ms').textContent = 'Surinkta: '+pts+' iš '+MP+' taškų';
  document.getElementById('sc').textContent = pts;
  document.getElementById('sw').textContent = MP-pts;
  document.getElementById('sp').textContent = pct+'%';
  document.getElementById('mbg').classList.add('open');
}

function closeM(){ document.getElementById('mbg').classList.remove('open'); }
render();
</script>
